<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Property Portfolio</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --border2: #CEC9BE;
  --text: #1A1916;
  --text2: #6B6760;
  --text3: #A09D98;
  --green: #2D5A27;
  --green-bg: #EAF2E8;
  --red: #8B2020;
  --red-bg: #F5EAEA;
  --amber: #7A4A0A;
  --amber-bg: #FAF0E0;
  --blue: #1A3A5C;
  --blue-bg: #E8F0F8;
  --purple: #3D2B6B;
  --purple-bg: #EEEAF5;
  --teal: #1A4A40;
  --teal-bg: #E6F2F0;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 15px; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
#header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); flex: 1; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); padding-bottom: calc(var(--nav-h) + 16px); }
#nav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; safe-area-inset-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--text3); padding: 8px 4px; transition: color .15s; }
.nav-btn.active { color: var(--text); }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; letter-spacing: .02em; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
.section-label { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 8px; }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-grey { background: var(--surface2); color: var(--text2); }
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.info-val { font-size: 14px; text-align: right; }
.prop-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; gap: 12px; align-items: center; transition: border-color .15s; }
.prop-item:hover, .prop-item:active { border-color: var(--border2); }
.prop-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.prop-name { font-size: 15px; font-weight: 500; }
.prop-addr { font-size: 13px; color: var(--text2); margin-top: 1px; }
.prop-certs { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.prop-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }
#prop-detail { position: fixed; inset: 0; z-index: 150; background: var(--bg); display: none; flex-direction: column; }
#prop-detail.open { display: flex; }
#detail-header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }
.back-btn { font-size: 15px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; }
#detail-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 32px; }
#login-screen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
#login-screen.visible { display: flex; }
.detail-tabs { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; margin-bottom: 16px; scrollbar-width: none; }
.detail-tabs::-webkit-scrollbar { display: none; }
.dtab { font-size: 13px; font-weight: 500; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.dtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.dtab-content { display: none; }
.dtab-content.active { display: block; }
.txn-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.txn-row:last-child { border-bottom: none; }
.txn-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.txn-body { flex: 1; min-width: 0; }
.txn-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.txn-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
.txn-income { color: var(--green); }
.txn-expense { color: var(--red); }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 28px 16px; text-align: center; cursor: pointer; background: var(--surface2); margin-bottom: 10px; }
.upload-zone p { font-size: 14px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.upload-zone span { font-size: 12px; color: var(--text3); }
.upload-input { display: none; }
.form-field { margin-bottom: 12px; }
.form-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  -webkit-appearance: none; appearance: none; outline: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--border2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 4px; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { padding: 20px; text-align: center; font-size: 14px; color: var(--text2); }
.cert-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.cert-info { flex: 1; min-width: 0; }
.cert-name { font-size: 14px; font-weight: 500; }
.cert-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.alert { background: var(--amber-bg); border: 1px solid #E8C878; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: var(--amber); }
.alert-red { background: var(--red-bg); border-color: #E8AAAA; color: var(--red); }
#modal { position: fixed; inset: 0; z-index: 300; display: none; flex-direction: column; justify-content: flex-end; }
#modal.open { display: flex; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
.modal-panel { position: relative; background: var(--surface); border-radius: 20px 20px 0 0; padding: 16px 16px 40px; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
.empty { text-align: center; padding: 32px 16px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.alert-strip { background: var(--red-bg); border: 1px solid #E8AAAA; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: var(--red); font-weight: 500; }
.alert-strip-amber { background: var(--amber-bg); border-color: #E8C878; color: var(--amber); }
.toggle-bar { display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; margin-bottom: 14px; }
.toggle-btn { flex: 1; padding: 7px; text-align: center; border-radius: 17px; font-size: 13px; font-weight: 500; border: none; background: none; color: var(--text2); cursor: pointer; transition: all .15s; }
.toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

@media (min-width: 600px) {
  #content { max-width: 680px; margin: 0 auto; }
  #nav { max-width: 680px; margin: 0 auto; }
  .metrics { grid-template-columns: repeat(4, 1fr); }
}
.label-xs { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em }
.label-xs-mb { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px }
.text-sm { font-size:12px;color:var(--text2) }
.icon-btn-sm { width:24px;height:24px;font-size:11px }

.fw5-13 { font-size:13px; font-weight:500 }
.fw5-14 { font-size:14px; font-weight:500 }
.fw5-11-blue { font-size:11px; color:var(--blue); font-weight:500 }
.btn-sm-edit { width:auto; padding:5px 12px; font-size:12px }
.flex-row { display:flex; justify-content:space-between; align-items:center }
.gap-8 { display:flex; gap:8px }
</style>
</head>
<body>

<div id="login-screen" class="visible">
  <div style="font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:8px;color:var(--text)">Property Portfolio</div>
  <div style="font-size:14px;color:var(--text2);margin-bottom:40px;text-align:center">Sign in to load and sync your data with Google Drive</div>
  <button id="signin-btn" onclick="signIn()" style="display:flex;align-items:center;gap:12px;padding:12px 24px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:15px;font-weight:500;color:var(--text)">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
    Sign in with Google
  </button>
  <div id="login-error" style="margin-top:16px;font-size:13px;color:var(--red);display:none;max-width:300px;text-align:center"></div>
  <div id="login-origin" style="margin-top:8px;font-size:11px;color:var(--text3);text-align:center;max-width:300px"></div>
  <div style="margin-top:48px;font-size:12px;color:var(--text3);text-align:center;max-width:280px">Your data is stored in your own Google Drive. Nothing is shared with third parties.</div>
</div>

<div id="toast" class="toast" style="position:fixed;bottom:calc(var(--nav-h)+8px);right:12px;z-index:90;font-size:11px;padding:6px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text2);pointer-events:none;opacity:0;transition:opacity 0.2s"></div>

<div id="app" style="display:none">
  <div id="header">
    <div id="header-title">Portfolio</div>
    <select id="prop-select" onchange="setFilterProp(this.value)" style="font-size:12px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0;max-width:110px;-webkit-appearance:none;appearance:none;text-align:center;outline:none">
      <option value="">All props</option>
    </select>
    <select id="owner-select" onchange="setOwnerMode(this.value)" style="font-size:12px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0;max-width:110px;-webkit-appearance:none;appearance:none;text-align:center;outline:none">
      <option value="">All owners</option>
    </select>
    <button onclick="signOut()" title="Sign out" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text2)">&#9211;</button>
  </div>
  <div id="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-properties" class="screen"></div>
    <div id="screen-finance" class="screen"></div>
    <div id="screen-maintenance" class="screen"></div>
    <div id="screen-docs" class="screen"></div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showScreen('dashboard',this)" data-screen="dashboard">
      <span class="nav-icon">⌂</span><span class="nav-label">Overview</span>
    </button>
    <button class="nav-btn" onclick="showScreen('properties',this)" data-screen="properties">
      <span class="nav-icon">⊞</span><span class="nav-label">Properties</span>
    </button>
    <button class="nav-btn" onclick="showScreen('finance',this)" data-screen="finance">
      <span class="nav-icon">£</span><span class="nav-label">Finance</span>
    </button>
    <button class="nav-btn" onclick="showScreen('maintenance',this)" data-screen="maintenance">
      <span class="nav-icon">🔧</span><span class="nav-label">Maintenance</span>
    </button>
    <button class="nav-btn" onclick="showScreen('docs',this)" data-screen="docs">
      <span class="nav-icon">📄</span><span class="nav-label">Documents</span>
    </button>
  </div>
</div>

<div id="prop-detail">
  <div id="detail-header">
    <button class="back-btn" onclick="closePropDetail()">← Back</button>
    <div style="flex:1;font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="detail-prop-name"></div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
