<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Property Portfolio</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://apis.google.com/js/api.js" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --border2: #CEC9BE;
  --text: #1A1916;
  --text2: #6B6760;
  --text3: #A09D98;
  --green: #2D5A27;
  --green-bg: #EAF2E8;
  --red: #8B2020;
  --red-bg: #F5EAEA;
  --amber: #7A4A0A;
  --amber-bg: #FAF0E0;
  --blue: #1A3A5C;
  --blue-bg: #E8F0F8;
  --purple: #3D2B6B;
  --purple-bg: #EEEAF5;
  --teal: #1A4A40;
  --teal-bg: #E6F2F0;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 15px; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
#header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); flex: 1; }

#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); padding-bottom: calc(var(--nav-h) + 16px); }
#nav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; safe-area-inset-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--text3); padding: 8px 4px; transition: color .15s; }
.nav-btn.active { color: var(--text); }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; letter-spacing: .02em; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }
#prop-sheet { position: fixed; inset: 0; z-index: 200; display: none; }
#prop-sheet.open { display: flex; flex-direction: column; justify-content: flex-end; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
.section-label { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 8px; }
h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 4px; }
h3 { font-size: 16px; font-weight: 500; }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-wide { grid-column: 1/-1; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-grey { background: var(--surface2); color: var(--text2); }
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.info-val { font-size: 14px; text-align: right; }
.prop-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; gap: 12px; align-items: center; transition: border-color .15s; }
.prop-item:hover, .prop-item:active { border-color: var(--border2); }
.prop-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.prop-name { font-size: 15px; font-weight: 500; }
.prop-addr { font-size: 13px; color: var(--text2); margin-top: 1px; }
.prop-certs { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.prop-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }
#prop-detail { position: fixed; inset: 0; z-index: 150; background: var(--bg); display: none; flex-direction: column; }
#prop-detail.open { display: flex; }
#detail-header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }
.back-btn { font-size: 15px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; }
#detail-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 32px; }
.detail-tabs { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; margin-bottom: 16px; scrollbar-width: none; }
.detail-tabs::-webkit-scrollbar { display: none; }
.dtab { font-size: 13px; font-weight: 500; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.dtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.dtab-content { display: none; }
.dtab-content.active { display: block; }
.txn-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.txn-row:last-child { border-bottom: none; }
.txn-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.txn-body { flex: 1; min-width: 0; }
.txn-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.txn-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
.txn-income { color: var(--green); }
.txn-expense { color: var(--red); }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 28px 16px; text-align: center; cursor: pointer; background: var(--surface2); margin-bottom: 10px; }
.upload-zone p { font-size: 14px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.upload-zone span { font-size: 12px; color: var(--text3); }
.upload-input { display: none; }
.form-field { margin-bottom: 12px; }
.form-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  -webkit-appearance: none; appearance: none; outline: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--border2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 4px; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { padding: 20px; text-align: center; font-size: 14px; color: var(--text2); }
.cert-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.cert-info { flex: 1; min-width: 0; }
.cert-name { font-size: 14px; font-weight: 500; }
.cert-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.alert { background: var(--amber-bg); border: 1px solid #E8C878; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: var(--amber); }
.alert-red { background: var(--red-bg); border-color: #E8AAAA; color: var(--red); }
#modal { position: fixed; inset: 0; z-index: 300; display: none; flex-direction: column; justify-content: flex-end; }
#modal.open { display: flex; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
.modal-panel { position: relative; background: var(--surface); border-radius: 20px 20px 0 0; padding: 16px 16px 40px; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
.empty { text-align: center; padding: 32px 16px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.alert-strip { background: var(--red-bg); border: 1px solid #E8AAAA; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: var(--red); font-weight: 500; }
.alert-strip-amber { background: var(--amber-bg); border-color: #E8C878; color: var(--amber); }
.toggle-bar { display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; margin-bottom: 14px; }
.toggle-btn { flex: 1; padding: 7px; text-align: center; border-radius: 17px; font-size: 13px; font-weight: 500; border: none; background: none; color: var(--text2); cursor: pointer; transition: all .15s; }
.toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

@media (min-width: 600px) {
  #content { max-width: 680px; margin: 0 auto; }
  #nav { max-width: 680px; margin: 0 auto; }
  .metrics { grid-template-columns: repeat(4, 1fr); }
}
.label-xs { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em }
.label-xs-mb { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px }
.text-sm { font-size:12px;color:var(--text2) }
.icon-btn-sm { width:24px;height:24px;font-size:11px }

.fw5-13 { font-size:13px; font-weight:500 }
.fw5-14 { font-size:14px; font-weight:500 }
.fw5-11-blue { font-size:11px; color:var(--blue); font-weight:500 }
.btn-sm-edit { width:auto; padding:5px 12px; font-size:12px }
.flex-row { display:flex; justify-content:space-between; align-items:center }
.gap-8 { display:flex; gap:8px }
</style>
</head>
<body>
<!-- Login overlay -->
<div id="login-screen" style="position:fixed;inset:0;z-index:999;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px">

    Sign in with Google

  <div style="margin-top:48px;font-size:12px;color:var(--text3);text-align:center;max-width:280px">Your data is stored in your own Google Drive. Nothing is shared with third parties.</div>
</div>
<!-- Sync status -->
<div id="sync-status" style="position:fixed;bottom:calc(var(--nav-h)+8px);right:12px;z-index:90;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text2);display:none;pointer-events:none"></div>
<div id="app">
  <div id="header">
    <div id="header-title">Portfolio</div>
    <select id="prop-select" onchange="setFilterProp(this.value)" style="font-size:12px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0;max-width:120px;-webkit-appearance:none;appearance:none;text-align:center;outline:none">
      <option value="">All props</option>
    </select>
    <select id="owner-select" onchange="setOwnerMode(this.value)" style="font-size:12px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0;max-width:120px;-webkit-appearance:none;appearance:none;text-align:center;outline:none">
      <option value="">All owners</option>
    </select>
    <button onclick="signOut()" title="Sign out" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text2)">⏻</button>
  </div>
  <div id="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-properties" class="screen"></div>
    <div id="screen-finance" class="screen"></div>
    <div id="screen-mtd" class="screen"></div>
    <div id="screen-maintenance" class="screen"></div>
    <div id="screen-docs" class="screen"></div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showScreen('dashboard',this)" data-screen="dashboard">
      <span class="nav-icon">⌂</span><span class="nav-label">Overview</span>
    </button>
    <button class="nav-btn" onclick="showScreen('properties',this)" data-screen="properties">
      <span class="nav-icon">⊞</span><span class="nav-label">Properties</span>
    </button>
    <button class="nav-btn" onclick="showScreen('finance',this)" data-screen="finance">
      <span class="nav-icon">£</span><span class="nav-label">Finance</span>
    </button>
    <button class="nav-btn" onclick="showScreen('maintenance',this)" data-screen="maintenance">
      <span class="nav-icon">🔧</span><span class="nav-label">Maintenance</span>
    </button>
    <button class="nav-btn" onclick="showScreen('docs',this)" data-screen="docs">
      <span class="nav-icon">↑</span><span class="nav-label">Upload</span>
    </button>
  </div>
</div>

<!-- Property detail overlay -->
<div id="prop-detail">
  <div id="detail-header">
    <button class="back-btn" onclick="closePropDetail()">← Back</button>
    <div style="flex:1;font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="detail-prop-name"></div>
  </div>
  <div id="detail-content"></div>
</div>

<!-- Modal (forms) -->
<div id="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

function showSync(msg, isError) {

}

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if(resp.error) {
        const err = document.getElementById('login-error');
        if(err) { err.textContent = 'Sign-in failed: ' + resp.error; err.style.display='block'; }
        return;
      }
      gAccessToken = resp.access_token;
      document.getElementById('login-screen').style.display = 'none';
      showSync('⟳ Loading from Drive…');
      await initDrive();
    }
  });
  client.requestAccessToken();
}

function signOut() {
  if(gAccessToken) google.accounts.oauth2.revoke(gAccessToken);
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = {};
  document.getElementById('login-screen').style.display = 'flex';
}

async function driveRequest(url, options={}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': 'Bearer ' + gAccessToken,
      ...(options.headers||{})
    }
  });
  if(!res.ok) {
    const text = await res.text();
    throw new Error(`Drive API ${res.status}: ${text}`);
  }
  return res.json();
}

async function findOrCreateFolder(name, parentId) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if(result.files && result.files.length > 0) return result.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function initDrive() {
  try {
    const rootId = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
    gDriveFolderIds.root = rootId;
    const q = `name='${DATA_FILENAME}' and '${rootId}' in parents and trashed=false`;
    const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);

    if(result.files && result.files.length > 0) {
      gDriveDataFileId = result.files[0].id;
      const data = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveDataFileId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + gAccessToken }
      }).then(r => r.json());
      const keys = ['props','txns','certs','appliances','maint','owners','rentHistory'];
      keys.forEach(k => { if(data[k]) state[k] = data[k]; });
      state.txns = state.txns.map(t=>({...t, cat: CAT_LEGACY[t.cat]||t.cat}));
      showSync('✓ Loaded from Drive');
    } else {
      showSync('✓ New portfolio created');
      await saveToDrive();
    }
  } catch(e) {
    console.error('Drive init error:', e);
    showSync('⚠ Drive error — using local data', true);
    await loadFromLocal();
  }
  renderAll();
}

async function saveToDrive() {
  if(!gAccessToken) return;
  const keys = ['props','txns','certs','appliances','maint','owners','rentHistory'];
  const data = {};
  keys.forEach(k => { data[k] = state[k]; });
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});

  try {
    if(gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({
        name: DATA_FILENAME,
        parents: [gDriveFolderIds.root || 'root']
      })], {type:'application/json'}));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      const created = await res.json();
      gDriveDataFileId = created.id;
    }
    showSync('✓ Saved to Drive');
  } catch(e) {
    console.error('Drive save error:', e);
    showSync('⚠ Save failed', true);
  }
}

async function uploadFileToDrive(base64Data, mimeType, filename, propName, category) {
  if(!gAccessToken) return null;
  try {
    if(!gDriveFolderIds.root) {
      gDriveFolderIds.root = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
    }
    const propKey = propName || 'General';
    if(!gDriveFolderIds[propKey]) {
      gDriveFolderIds[propKey] = await findOrCreateFolder(propKey, gDriveFolderIds.root);
    }
    const catKey = propKey + '/' + (category||'Documents');
    if(!gDriveFolderIds[catKey]) {
      gDriveFolderIds[catKey] = await findOrCreateFolder(category||'Documents', gDriveFolderIds[propKey]);
    }
    const byteChars = atob(base64Data);
    const bytes = new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
    const blob = new Blob([bytes], {type: mimeType});
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({
      name: filename,
      parents: [gDriveFolderIds[catKey]]
    })], {type:'application/json'}));
    form.append('file', blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gAccessToken },
      body: form
    });
    const created = await res.json();
    showSync('✓ Saved to Drive');
    return created.webViewLink;
  } catch(e) {
    console.error('Drive upload error:', e);
    showSync('⚠ Upload failed', true);
    return null;
  }
}
const DRIVE_MODE = false;

async function loadState() {
  if(DRIVE_MODE) {
    document.getElementById('login-screen').style.display = 'flex';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  try {
    const keys = ['props','txns','certs','appliances','maint','owners','rentHistory'];
    for(const k of keys) {
      try {
        const r = await window.storage.get('pf-' + k);
        if(r) state[k] = JSON.parse(r.value);
      } catch(e) {}
    }
    state.txns = state.txns.map(t=>({...t, cat: CAT_LEGACY[t.cat]||t.cat}));
    // Migrate tenancyDocs -> unified p.docs array
    state.props.forEach(p=>{
      if(!p.docs) p.docs = [];
      (p.tenancyDocs||[]).forEach(d=>{
        if(!p.docs.find(x=>x.id===d.id))
          p.docs.push({...d, section:'tenancy', label:d.type||'Tenancy'});
      });
    });
  } catch(e) {}
  renderAll();
}

function saveState(key) {
  if(DRIVE_MODE) {
    try { localStorage.setItem('pf-'+key, JSON.stringify(state[key])); } catch(e) {}
    clearTimeout(saveTimer);
    showSync('⟳ Saving…');
    saveTimer = setTimeout(saveToDrive, 1500);
    return;
  }
  try { window.storage.set('pf-' + key, JSON.stringify(state[key])); } catch(e) {}
}

function fmtMoney(n) { return '£' + Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) { if(!d||d==='—') return '—'; const p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function daysUntil(d) { return Math.round((new Date(d)-new Date())/(1000*60*60*24)); }
function certStatus(expiry) {
  if(!expiry) return 'grey';
  const d = daysUntil(expiry);
  if(d < 0) return 'red';
  if(d < 60) return 'amber';
  return 'green';
}
function certLabel(expiry) {
  if(!expiry) return 'No date';
  const d = daysUntil(expiry);
  if(d < 0) return 'Expired';
  if(d < 60) return d+'d left';
  return 'Valid';
}

function getOwnerShare(prop) {
  if(!state.shareMode || !state.selectedOwner) return 1;
  const ownerEntry = (prop.owners||[]).find(o=>o.ownerId===state.selectedOwner);
  if(ownerEntry) return ownerEntry.share/100;
  return (prop.ownershipShare??100)/100;
}
function shareOf(prop, value) {
  if(!state.shareMode) return value;
  return value * getOwnerShare(prop);
}
function txnShare(txn) {
  if(!state.shareMode) return txn.amount;
  const p = getProp(txn.prop);

function addGlobalOwner() {
  const el = document.getElementById('new-global-owner');
  const name = el?.value?.trim();
  if(!name) return;
  if(state.owners.find(o=>o.name.toLowerCase()===name.toLowerCase())) {
    const msg = document.getElementById('new-global-owner');
    if(msg) { msg.style.borderColor='var(--red)'; msg.placeholder='Name already exists'; msg.value=''; }
    setTimeout(()=>{ if(msg){msg.style.borderColor='';msg.placeholder='Owner name';} },2000);
    return;
  }
  state.owners.push({id:uid(), name});
  saveState('owners');
  el.value = '';
  openOwnerModal(); // re-render modal with new owner
  populateOwnerSelect();
}

function renameOwner(id, newName) {
  const o = state.owners.find(x=>x.id===id);
  if(o && newName.trim()) { o.name = newName.trim(); saveState('owners'); populateOwnerSelect(); }
}

function deleteOwner(id) {
  const o = state.owners.find(x=>x.id===id);
  if(!o) return;
  const shares = state.props
    .map(p => { const po = (p.owners||[]).find(x=>x.ownerId===id&&x.share>0); return po ? p.name : null; })
    .filter(Boolean);
  const warning = shares.length > 0
    ? `<div class="alert alert-red" style="margin-bottom:10px">This will also remove ${o.name} from: ${shares.join(', ')}</div>`
    : '';
  openModal(`
    <div class="modal-title">Remove owner</div>
    ${warning}
    <p style="font-size:14px;margin-bottom:20px">Remove <strong>${o.name}</strong> from the owners list?</p>
    <div class="gap-8">
      <button class="btn btn-secondary" style="flex:1" onclick="openOwnerModal()">Cancel</button>
      <button class="btn" style="flex:1;background:var(--red-bg);color:var(--red)" onclick="confirmDeleteOwner('${id}')">Remove</button>
    </div>`);
}

function confirmDeleteOwner(id) {
  state.owners = state.owners.filter(o=>o.id!==id);
  if(state.selectedOwner===id) { state.shareMode=false; state.selectedOwner=null; }
  state.props.forEach(p=>{ if(p.owners) p.owners=p.owners.filter(o=>o.ownerId!==id); });
  saveState('owners');
  saveState('props');
  populateOwnerSelect();
  renderAll();
  openOwnerModal();
}

// ─── PERIOD HELPERS ──────────────────────────────────────────────────────────

function currentTaxYear() {
  const now = new Date();
  const y = now.getFullYear();
  return now >= new Date(y,3,6) ? y : y-1;
}

function taxQuarterBounds(taxY) {
  // UK tax year quarters: Q1=6Apr–5Jul, Q2=6Jul–5Oct, Q3=6Oct–5Jan, Q4=6Jan–5Apr
  return [
    { q:1, start:new Date(taxY,3,6),   end:new Date(taxY,6,5,23,59,59),   label:`6 Apr – 5 Jul` },
    { q:2, start:new Date(taxY,6,6),   end:new Date(taxY,9,5,23,59,59),   label:`6 Jul – 5 Oct` },
    { q:3, start:new Date(taxY,9,6),   end:new Date(taxY+1,0,5,23,59,59), label:`6 Oct – 5 Jan` },
    { q:4, start:new Date(taxY+1,0,6), end:new Date(taxY+1,3,5,23,59,59), label:`6 Jan – 5 Apr` },
  ];
}

function currentTaxQuarter() {
  const now = new Date();
  const taxY = currentTaxYear();
  return taxQuarterBounds(taxY).find(q => now >= q.start && now <= q.end) || taxQuarterBounds(taxY)[0];
}

function getPeriodRange(period) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const today = new Date(y,m,d,23,59,59);
  const taxY = currentTaxYear();
  let start, end, prevStart, prevEnd, label;

  if(period==='ytd') {
    start = new Date(y,0,1); end = today;
    prevStart = new Date(y-1,0,1); prevEnd = new Date(y-1,m,d,23,59,59);
    label = `YTD ${y} (1 Jan – today)`;

  } else if(period==='tytd') {
    start = new Date(taxY,3,6); end = today;
    prevStart = new Date(taxY-1,3,6); prevEnd = new Date(taxY-1,m,d,23,59,59);
    label = `Tax YTD ${taxY}/${String(taxY+1).slice(2)} (6 Apr – today)`;

  } else if(period==='curtaxq') {
    const q = currentTaxQuarter();
    const qEnd = q.end > today ? today : q.end;
    start = q.start; end = qEnd;
    // Prev = same quarter last tax year
    const prevQ = taxQuarterBounds(taxY-1)[q.q-1];
    prevStart = prevQ.start; prevEnd = prevQ.end;
    label = `Tax Q${q.q} (${q.label})`;

  } else if(period==='alltime') {
    const dates = state.txns.map(t=>t.date).filter(Boolean).sort();
    start = dates.length ? new Date(dates[0]) : new Date(y,0,1);
    end = today;
    prevStart = start; prevEnd = start; // no prev for all time
    label = 'All time';

  } else if(period==='custom') {
    // Dates set in state.customPeriod
    const cs = state.customPeriod?.start, ce = state.customPeriod?.end;
    start = cs ? new Date(cs) : new Date(y,0,1);
    end = ce ? new Date(ce+'T23:59:59') : today;
    // Prev = same length shifted back
    const len = end - start;
    prevEnd = new Date(start.getTime()-1);
    prevStart = new Date(prevEnd.getTime()-len);
    label = `${fmtDate(start.toISOString().slice(0,10))} – ${fmtDate(end.toISOString().slice(0,10))}`;

  } else {
    // Fallback — YTD
    start = new Date(y,0,1); end = today;
    prevStart = new Date(y-1,0,1); prevEnd = new Date(y-1,m,d,23,59,59);
    label = `YTD ${y}`;
  }

  return {start, end, prevStart, prevEnd, label};
}

// Apportion a transaction amount to a period, respecting periodStart/periodEnd
// If the transaction has no period dates, 100% falls on its date
// If its coverage period overlaps the target range, prorate accordingly
function apportionAmount(txn, rangeStart, rangeEnd) {
  if(!txn.periodStart || !txn.periodEnd) {
    // No period — full amount if date is in range
    const d = new Date(txn.date);
    return (d >= rangeStart && d <= rangeEnd) ? txn.amount : 0;
  }
  const ps = new Date(txn.periodStart);
  const pe = new Date(txn.periodEnd+'T23:59:59');
  const totalDays = (pe - ps) / 86400000 + 1;
  if(totalDays <= 0) return 0;
  // Overlap between [ps,pe] and [rangeStart,rangeEnd]
  const overlapStart = ps < rangeStart ? rangeStart : ps;
  const overlapEnd   = pe > rangeEnd   ? rangeEnd   : pe;
  if(overlapStart > overlapEnd) return 0;
  const overlapDays = (overlapEnd - overlapStart) / 86400000 + 1;
  return txn.amount * (overlapDays / totalDays);
}

function txnsInRange(start, end) {
  const fpIds = state.filterProp ? [state.filterProp] : state.props.map(p=>p.id);
  // Return all transactions that have ANY overlap with the range
  return state.txns.filter(t=>{
    if(!t.date || !fpIds.includes(t.prop)) return false;
    if(t.periodStart && t.periodEnd) {
      const ps = new Date(t.periodStart), pe = new Date(t.periodEnd+'T23:59:59');
      return ps <= end && pe >= start; // overlaps range
    }
    const d = new Date(t.date);
    return d >= start && d <= end;
  });
}

function apportionedAmount(txn, rangeStart, rangeEnd) {
  return apportionAmount(txn, rangeStart, rangeEnd);
}

function sumIncome(txns, start, end) {
  return txns.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t, apportionedAmount(t,start,end)),0);
}
function sumExpense(txns, start, end) {
  return txns.filter(t=>t.type==='expense').reduce((s,t)=>s+txnShare(t, apportionedAmount(t,start,end)),0);
}

// Override txnShare to accept optional pre-computed amount
const _txnShareOrig = txnShare;
function txnShare(txn, overrideAmount) {
  const amt = overrideAmount !== undefined ? overrideAmount : txn.amount;
  if(!state.shareMode) return amt;
  const p = getProp(txn.prop);
  return amt * getOwnerShare(p||{ownershipShare:100});
}


function deltaChip(curr, prev) {
  if(prev===0) return '';
  const diff = curr - prev;
  const pct = ((diff/prev)*100).toFixed(1);
  const up = diff >= 0;
  const color = up ? 'var(--green)' : 'var(--red)';
  const arrow = up ? '▲' : '▼';
  return `<span style="font-size:11px;color:${color}">${arrow} ${fmtMoney(Math.abs(diff))} (${Math.abs(pct)}%)</span>`;
}

function renderDashboard() {
  const fps = (state.filterProp ? state.props.filter(p=>p.id===state.filterProp) : state.props).filter(p=>state.showArchived||!p.archived);
  const period = state.dashPeriod || 'ytd';
  const {start,end,prevStart,prevEnd,label} = getPeriodRange(period);

  const currTxns = txnsInRange(start, end);
  const prevTxns = txnsInRange(prevStart, prevEnd);
  const income = sumIncome(currTxns, start, end);
  const expense = sumExpense(currTxns, start, end);
  const net = income - expense;
  const prevIncome = sumIncome(prevTxns, prevStart, prevEnd);
  const prevExpense = sumExpense(prevTxns, prevStart, prevEnd);
  const prevNet = prevIncome - prevExpense;
  const fullIncome = currTxns.filter(t=>t.type==='income').reduce((s,t)=>s+apportionedAmount(t,start,end),0);
  const fullExpense = currTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+apportionedAmount(t,start,end),0);
  const fullNet = fullIncome - fullExpense;
  const prevFullIncome = prevTxns.filter(t=>t.type==='income').reduce((s,t)=>s+apportionedAmount(t,prevStart,prevEnd),0);
  const prevFullExpense = prevTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+apportionedAmount(t,prevStart,prevEnd),0);
  const prevFullNet = prevFullIncome - prevFullExpense;

  const showShare = state.shareMode && state.selectedOwner;
  const selectedOwnerName = showShare ? (state.owners.find(o=>o.id===state.selectedOwner)?.name || '') : '';
  const fullRent = fps.filter(p=>p.status==='let').reduce((s,p)=>s+p.rent,0);
  const shareRent = fps.filter(p=>p.status==='let').reduce((s,p)=>s+shareOf(p,p.rent),0);
  const letCount = fps.filter(p=>p.status==='let').length;
  const avgYield = fps.filter(p=>p.value>0).length ? (fps.filter(p=>p.value>0).reduce((s,p)=>s+(p.rent*12/p.value*100),0)/fps.filter(p=>p.value>0).length).toFixed(1) : '—';

  const fpIds = fps.map(p=>p.id);
  const expiredCerts = state.certs.filter(c=>fpIds.includes(c.propId)&&certStatus(c.expiryDate)==='red');
  const warnCerts = state.certs.filter(c=>fpIds.includes(c.propId)&&certStatus(c.expiryDate)==='amber');
  const openMaint = state.maint.filter(m=>fpIds.includes(m.propId)&&m.status==='open');

  let certAlerts = '';
  if(expiredCerts.length) certAlerts += `<div class="alert-strip">⚠ ${expiredCerts.length} certificate${expiredCerts.length>1?'s':''} expired or overdue</div>`;
  if(warnCerts.length) certAlerts += `<div class="alert-strip alert-strip-amber">⏱ ${warnCerts.length} certificate${warnCerts.length>1?'s':''} expiring within 60 days</div>`;

  const periods = [
    {v:'ytd',l:'YTD'},{v:'tytd',l:'Tax YTD'},{v:'curtaxq',l:'Tax Q'},
    {v:'alltime',l:'All time'},{v:'custom',l:'Custom'}
  ];
  const customUI = period==='custom' ? `
    <div class="gap-8" style="margin-bottom:10px">
      <div class="form-field" style="margin-bottom:0;flex:1"><label>From</label><input type="date" id="cp-start" value="${state.customPeriod?.start||''}" onchange="setCustomPeriod()"></div>
      <div class="form-field" style="margin-bottom:0;flex:1"><label>To</label><input type="date" id="cp-end" value="${state.customPeriod?.end||''}" onchange="setCustomPeriod()"></div>
    </div>` : '';
  const periodBar = `<div class="toggle-bar" style="margin-bottom:8px;overflow-x:auto;flex-wrap:nowrap">
    ${periods.map(p=>`<button class="toggle-btn ${period===p.v?'active':''}" style="white-space:nowrap;padding:6px 10px" onclick="state.dashPeriod='${p.v}';renderDashboard()">${p.l}</button>`).join('')}
  </div>${customUI}`;

  const prevYear = prevStart.getFullYear();

  function metricTile(lbl, fullVal, shareVal, prevFull, prevShare, color, sub) {
    const valColor = color || 'var(--text)';
    const comparatorFull = prevFull > 0 ? deltaChip(fullVal, prevFull) : '';
    const comparatorShare = showShare && prevShare > 0 ? deltaChip(shareVal, prevShare) : '';

    if(showShare) {
      return `<div class="metric" style="padding:10px 12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">${lbl}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 6px">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Full</div>
          <div style="font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:.04em">${selectedOwnerName}</div>
          <div style="font-size:17px;font-weight:300;color:${valColor};letter-spacing:-.02em;line-height:1.2">${fmtMoney(fullVal)}</div>
          <div style="font-size:17px;font-weight:300;color:var(--blue);letter-spacing:-.02em;line-height:1.2">${fmtMoney(shareVal)}</div>
          ${comparatorFull||comparatorShare ? `
          <div style="font-size:10px;color:var(--text2);padding-top:2px;line-height:1.3">${comparatorFull}</div>
          <div style="font-size:10px;color:var(--blue);padding-top:2px;line-height:1.3">${comparatorShare}</div>` : ''}
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">${sub} · vs ${prevYear}</div>
      </div>`;
    }
    return `<div class="metric" style="padding:12px 14px">
      <div class="metric-label" style="margin-bottom:4px">${lbl}</div>
      <div style="font-size:22px;font-weight:300;color:${valColor};letter-spacing:-.02em;margin-bottom:3px">${fmtMoney(fullVal)}</div>
      <div class="text-sm">${sub}</div>
      ${comparatorFull ? `<div style="font-size:11px;color:var(--text2);margin-top:3px">${comparatorFull} vs ${prevYear}</div>` : ''}
    </div>`;
  }

  function rentTile() {
    const sub = `${letCount} of ${fps.length} let`;
    if(showShare) {
      return `<div class="metric" style="padding:10px 12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Rent pcm</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 6px">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Full</div>
          <div style="font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:.04em">${selectedOwnerName}</div>
          <div style="font-size:17px;font-weight:300;letter-spacing:-.02em;line-height:1.2">${fmtMoney(fullRent)}</div>
          <div style="font-size:17px;font-weight:300;color:var(--blue);letter-spacing:-.02em;line-height:1.2">${fmtMoney(shareRent)}</div>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">${sub} · ${label}</div>
      </div>`;
    }
    return `<div class="metric" style="padding:12px 14px">
      <div class="metric-label" style="margin-bottom:4px">Rent pcm</div>
      <div style="font-size:22px;font-weight:300;letter-spacing:-.02em;margin-bottom:3px">${fmtMoney(fullRent)}</div>
      <div class="text-sm">${sub} · ${label}</div>
    </div>`;
  }

  const propCards = fps.map(p => {
    const ownerShare = getOwnerShare(p);
    const fullRentP = p.rent;
    const shareRentP = shareOf(p, p.rent);
    const dispValue = p.value; // yield always on full value
    const yld = dispValue > 0 ? ((fullRentP*12)/dispValue*100).toFixed(1)+'%' : '—';

    const certRow = certBadgeRow(p.id);
    const propTxns = state.txns.filter(t=>t.prop===p.id&&t.date&&new Date(t.date)>=start&&new Date(t.date)<=end);
    const ptFullIncome = propTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const ptFullAgentFees = propTxns.filter(t=>t.type==='expense'&&t.cat==='professional').reduce((s,t)=>s+t.amount,0);
    const ptFullPremises = propTxns.filter(t=>t.type==='expense'&&t.cat==='premises').reduce((s,t)=>s+t.amount,0);
    const ptFullOther = propTxns.filter(t=>t.type==='expense'&&!['professional','premises'].includes(t.cat)).reduce((s,t)=>s+t.amount,0);
    const ptFullNet = ptFullIncome - ptFullAgentFees - ptFullPremises - ptFullOther;

    const ptShareIncome = ptFullIncome * ownerShare;
    const ptShareFees = ptFullAgentFees * ownerShare;
    const ptSharePremises = ptFullPremises * ownerShare;
    const ptShareOther = ptFullOther * ownerShare;
    const ptShareNet = ptShareIncome - ptShareFees - ptSharePremises - ptShareOther;

    const shareBadge = p.owners && p.owners.length>1 ? `<span class="badge badge-blue" style="margin-left:4px">${p.owners.length} owners</span>` : '';
    const rentDisplay = showShare && ownerShare < 1
      ? `<div class="fw5-14">${fmtMoney(fullRentP)}</div><div class="fw5-11-blue">${fmtMoney(shareRentP)} ${selectedOwnerName}</div>`
      : `<div class="fw5-14">${fmtMoney(fullRentP)}</div>`;
    function finRow(label, fullVal, shareVal, isIncome) {
      const color = isIncome ? 'var(--green)' : (fullVal > 0 ? 'var(--red)' : 'var(--text3)');
      const prefix = isIncome ? '' : (fullVal > 0 ? '-' : '');
      const sharePrefix = isIncome ? '' : '-';
      return `<div>
        <div class="label-xs-mb">${label}</div>
        <div style="font-size:13px;font-weight:500;color:${color}">${fullVal > 0 || isIncome ? prefix+fmtMoney(fullVal) : '—'}</div>
        ${showShare && ownerShare < 1 ? `<div class="fw5-11-blue">${fullVal > 0 || isIncome ? sharePrefix+fmtMoney(shareVal) : '—'}</div>` : ''}
      </div>`;
    }

    return `<div class="card" style="cursor:pointer" onclick="openPropDetail('${p.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap">${p.name}${shareBadge}</div>
          <div class="text-sm">${p.address}</div>
        </div>
        ${p.archived?'<span class="badge badge-grey">Archived</span>':propStatusBadge(p.status)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px">
        <div>
          <div class="label-xs-mb">Rent pcm${showShare&&ownerShare<1?' (full / share)':''}</div>
          ${rentDisplay}
        </div>
        <div><div class="label-xs-mb">Yield</div><div class="fw5-14">${yld}</div></div>
        ${finRow('Income', ptFullIncome, ptShareIncome, true)}
        ${finRow('Agent fees', ptFullAgentFees, ptShareFees, false)}
        ${finRow('Mgmt costs', ptFullPremises, ptSharePremises, false)}
        ${finRow('Other costs', ptFullOther, ptShareOther, false)}
        <div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:8px;margin-top:2px">
          <div class="label-xs-mb">Net income${showShare&&ownerShare<1?' (full / share)':''}</div>
          <div style="font-size:15px;font-weight:500;color:${ptFullNet>=0?'var(--green)':'var(--red)'}">${ptFullNet<0?'-':''}${fmtMoney(ptFullNet)}</div>
          ${showShare && ownerShare < 1 ? `<div style="font-size:12px;font-weight:500;color:var(--blue)">${ptShareNet<0?'-':''}${fmtMoney(ptShareNet)} ${selectedOwnerName}</div>` : ''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">${certRow}</div>
    </div>`;
  }).join('');

  // Net income % = (income - professional fees) / income * 100
  // Profit % = net / income * 100
  const fullAgentFees = currTxns.filter(t=>t.type==='expense'&&t.cat==='professional').reduce((s,t)=>s+apportionedAmount(t,start,end),0);
  const netIncomeVal = fullIncome - fullAgentFees;
  const netIncomePct = fullIncome > 0 ? ((netIncomeVal/fullIncome)*100).toFixed(1) : '—';
  const profitPct = fullIncome > 0 ? ((fullNet/fullIncome)*100).toFixed(1) : '—';

  document.getElementById('screen-dashboard').innerHTML = `
    ${periodBar}
    ${showShare ? `<div style="font-size:12px;color:var(--blue);background:var(--blue-bg);border:1px solid #B5D4F4;border-radius:var(--radius-sm);padding:6px 12px;margin-bottom:10px">Showing full · <strong>${selectedOwnerName}'s share</strong> in blue</div>` : ''}
    <div class="metrics" style="grid-template-columns:1fr 1fr 1fr">
      ${metricTile('Income', fullIncome, income, prevFullIncome, prevIncome, 'var(--green)', label)}
      ${metricTile('Expenses', fullExpense, expense, prevFullExpense, prevExpense, 'var(--red)', label)}
      ${metricTile('Net', fullNet, net, prevFullNet, prevNet, fullNet>=0?'var(--green)':'var(--red)', label)}
    </div>
    <div class="metrics" style="grid-template-columns:1fr 1fr 1fr 1fr;margin-top:0">
      ${rentTile()}
      <div class="metric" style="padding:10px 12px">
        <div class="metric-label" style="margin-bottom:4px">Net income %</div>
        <div style="font-size:20px;font-weight:300;color:${netIncomePct!=='—'&&parseFloat(netIncomePct)>=0?'var(--green)':'var(--red)'};letter-spacing:-.02em">${netIncomePct !== '—' ? netIncomePct+'%' : '—'}</div>
        <div class="text-sm">Income less agent fees</div>
      </div>
      <div class="metric" style="padding:10px 12px">
        <div class="metric-label" style="margin-bottom:4px">Profit %</div>
        <div style="font-size:20px;font-weight:300;color:${profitPct!=='—'&&parseFloat(profitPct)>=0?'var(--green)':'var(--red)'};letter-spacing:-.02em">${profitPct !== '—' ? profitPct+'%' : '—'}</div>
        <div class="text-sm">Net after all costs</div>
      </div>
      <div class="metric" style="padding:10px 12px">
        <div class="metric-label" style="margin-bottom:4px">Avg yield</div>
        <div style="font-size:20px;font-weight:300;letter-spacing:-.02em">${avgYield}${avgYield!=='—'?'%':''}</div>
        <div class="text-sm">Across ${fps.filter(p=>p.value>0).length} propert${fps.filter(p=>p.value>0).length===1?'y':'ies'}</div>

function renderProperties() {
  const allProps = (state.filterProp ? state.props.filter(p=>p.id===state.filterProp) : state.props);

  const archivedCount = allProps.filter(p=>p.archived).length;
  const period = state.dashPeriod || 'ytd';
  const {start, end, label} = getPeriodRange(period);
  const showShare = state.shareMode && state.selectedOwner;
  const selectedOwnerName = showShare ? (state.owners.find(o=>o.id===state.selectedOwner)?.name || '') : '';

  const expCatDefs = [
    ['premises','Premises costs'],
    ['repairs','Repairs & maintenance'],
    ['financial','Financial costs'],
    ['professional','Professional fees'],
    ['services','Cost of services'],
    ['travel','Travel costs'],
    ['other-allowable','Other allowable expenses'],

  const archiveToggle = archivedCount > 0 ? `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:10px;border:1px solid var(--border)">
    <span style="font-size:13px;color:var(--text2)">${archivedCount} archived propert${archivedCount===1?'y':'ies'}</span>
    <button class="btn btn-secondary" class="btn-sm-edit" onclick="state.showArchived=!state.showArchived;renderProperties()">
      ${state.showArchived?'Hide archived':'Show archived'}
    </button>
  </div>` : '';
  document.getElementById('screen-properties').innerHTML = archiveToggle + fps.map(p=>{
    const ownerShare = getOwnerShare(p);
    const fullRentP = p.rent;
    const shareRentP = shareOf(p, p.rent);
    const dispValue = p.value;
    const yield_pct = dispValue>0 ? ((fullRentP*12)/dispValue*100).toFixed(1) : '0.0';

    const catFull = txnCatTotals(p.id, start, end);
    const catShare = Object.fromEntries(Object.entries(catFull).map(([k,v])=>[k,v*ownerShare]));

    const fullIncome = catFull['rental-income'];
    const fullExpenses = Object.entries(catFull).filter(([k])=>k!=='rental-income').reduce((s,[,v])=>s+v,0);
    const fullNet = fullIncome - fullExpenses;
    const shareIncome = catShare['rental-income'];
    const shareExpenses = Object.entries(catShare).filter(([k])=>k!=='rental-income').reduce((s,[,v])=>s+v,0);
    const shareNet = shareIncome - shareExpenses;

    const certBadges = state.certs.filter(c=>c.propId===p.id).slice(0,3).map(c=>{
      const rating = c.type==='EPC'&&c.epcRating ? ` Band ${c.epcRating}` : '';
      return `<span class="badge badge-${certStatus(c.expiryDate)}">${c.type}${rating}</span>`;
    }).join('');
    const colHeader = showShare && ownerShare < 1 ? `
      <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;padding:4px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px">
        <span></span>
        <span style="font-size:10px;color:var(--text2);text-align:right;text-transform:uppercase;letter-spacing:.04em">Full</span>
        <span style="font-size:10px;color:var(--blue);text-align:right;text-transform:uppercase;letter-spacing:.04em">${selectedOwnerName}</span>
      </div>` : '';
    function catRow(label, fullVal, shareVal, isIncome) {
      const col = isIncome ? 'var(--green)' : (fullVal>0 ? 'var(--red)' : 'var(--text3)');
      const pre = isIncome ? '' : (fullVal>0 ? '-' : '');
      const hasVal = isIncome ? true : fullVal > 0;
      if(showShare && ownerShare < 1) {
        return `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
          <span class="text-sm">${label}</span>
          <span style="font-size:12px;font-weight:500;color:${col};text-align:right">${hasVal?pre+fmtMoney(fullVal):'—'}</span>
          <span style="font-size:12px;font-weight:500;color:var(--blue);text-align:right">${hasVal?(isIncome?'':pre)+fmtMoney(shareVal):'—'}</span>
        </div>`;
      }
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
        <span class="text-sm">${label}</span>
        <span style="font-size:12px;font-weight:500;color:${col}">${hasVal?pre+fmtMoney(fullVal):'—'}</span>
      </div>`;
    }

    const rentDisplay = showShare && ownerShare < 1
      ? `<div class="fw5-13">${fmtMoney(fullRentP)} <span class="fw5-11-blue">/ ${fmtMoney(shareRentP)} ${selectedOwnerName}</span></div>`

    const netRow = showShare && ownerShare < 1

          <span class="fw5-13">Net income</span>

          <span style="font-size:13px;font-weight:500;color:var(--blue);text-align:right">${shareNet<0?'-':''}${fmtMoney(shareNet)}</span>
        </div>`
      : `<div class="flex-row" style="padding:7px 0">
          <span class="fw5-13">Net income</span>
          <span style="font-size:14px;font-weight:500;color:${fullNet>=0?'var(--green)':'var(--red)'}">${fullNet<0?'-':''}${fmtMoney(fullNet)}</span>
        </div>`;

    const incomeRow = showShare && ownerShare < 1
      ? `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="fw5-13">Rental income</span>
          <span style="font-size:13px;font-weight:500;color:var(--green);text-align:right">${fmtMoney(fullIncome)}</span>
          <span style="font-size:13px;font-weight:500;color:var(--blue);text-align:right">${fmtMoney(shareIncome)}</span>
        </div>`
      : `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="fw5-13">Rental income</span>
          <span style="font-size:13px;font-weight:500;color:var(--green)">${fmtMoney(fullIncome)}</span>
        </div>`;

    return `<div class="prop-item" onclick="openPropDetail('${p.id}')" style="flex-direction:column;align-items:stretch;gap:0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="prop-dot" style="background:${p.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="prop-name">${p.name}</div>
          <div class="prop-addr">${p.address}</div>
        </div>
        <span class="badge badge-${p.status==='let'?'green':'amber'}">${p.status==='let'?'Let':'Vacant'}</span>
        <div class="prop-arrow">›</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px">
        <div>
          <div class="label-xs-mb">Rent pcm</div>
          ${rentDisplay}
        </div>
        <div><div class="label-xs-mb">Yield</div><div class="fw5-13">${yield_pct}%</div></div>
        <div><div class="label-xs-mb">Period</div><div class="text-sm">${label}</div></div>
      </div>
      <div>
        ${colHeader}
        ${incomeRow}
        ${expCatDefs.map(([k,l])=>catRow(l, catFull[k], catShare[k], false)).join('')}
        ${netRow}
      </div>
      ${certBadges?`<div class="prop-certs" style="margin-top:4px;padding-top:8px;border-top:1px solid var(--border)">${certBadges}</div>`:''}
    </div>`;
  }).join('') + `<button class="btn btn-secondary" style="margin-top:8px" onclick="openAddPropModal()">+ Add property</button>`;
}

    p.tenancyDocs.push({id:uid(), name:file.name, type:docType, date:new Date().toISOString().slice(0,10), docData:base64, docMime:mime});

    await saveDocCopy(filename, propId, docType);
    input.value = '';

function openTenancyDoc(propId, docId) {
  const p = getProp(propId);
  const doc = (p?.tenancyDocs||[]).find(d=>d.id===docId);
  if(!doc?.docData) return;
  try {
    const byteChars = atob(doc.docData);
    const bytes = new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
    const blob = new Blob([bytes],{type:doc.docMime||'application/pdf'});
    const url = URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),10000);
  } catch(e) { alert('Could not open document.'); }
}

function uploadPropDoc(propId, section, input) {
  const file = input.files[0]; if(!file) return;
  const dateEl = document.getElementById('docdate-'+section+'-'+propId);
  const labelEl = document.getElementById('doclabel-'+section+'-'+propId);
  const docDate = dateEl?.value || new Date().toISOString().slice(0,10);
  const docLabel = labelEl?.value?.trim() || '';
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const mime = file.type || 'application/pdf';
    const ext = mime.includes('pdf') ? '.pdf' : mime.includes('png') ? '.png' : '.jpg';
    // Filename: Maple_2504_Tenancy_AST.pdf
    const roadName = propFirstWord(propId);
    const d = new Date(docDate);
    const yymm = String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,'0');
    const secLabel = section.charAt(0).toUpperCase()+section.slice(1);
    const labelPart = docLabel ? '_'+docLabel.replace(/[^a-zA-Z0-9]+/g,'-') : '';
    const filename = `${roadName}_${yymm}_${secLabel}${labelPart}${ext}`;
    const p = getProp(propId);
    if(!p) return;
    if(!p.docs) p.docs = [];
    p.docs.push({id:uid(), section, name:filename, label:docLabel||secLabel, date:docDate, docData:base64, docMime:mime});
    saveState('props');
    // Save to Drive
    _lastUploadedBase64 = base64;
    _lastUploadedMime = mime;
    await saveDocCopy(filename, propId, secLabel);
    input.value = '';
    if(labelEl) labelEl.value = '';
    renderPropDetailContent(propId);
    showSync('✓ '+filename+' saved');
  };
  reader.readAsDataURL(file);
}

function getTaxYear(date) {
  const d = new Date(date);
  const y = d.getFullYear();
  const cutoff = new Date(y, 3, 6); // 6 April
  return d >= cutoff ? y : y - 1;
}
function getQuarter(date) {
  const d = new Date(date);
  const y = getTaxYear(date);
  const q1s = new Date(y, 3, 6), q1e = new Date(y, 6, 5);
  const q2s = new Date(y, 6, 6), q2e = new Date(y, 9, 5);
  const q3s = new Date(y, 9, 6), q3e = new Date(y+1, 0, 5);
  const q4s = new Date(y+1, 0, 6), q4e = new Date(y+1, 3, 5);
  if(d>=q1s&&d<=q1e) return {q:1,label:'Q1',period:'6 Apr – 5 Jul',due:'7 Aug'};
  if(d>=q2s&&d<=q2e) return {q:2,label:'Q2',period:'6 Jul – 5 Oct',due:'7 Nov'};
  if(d>=q3s&&d<=q3e) return {q:3,label:'Q3',period:'6 Oct – 5 Jan',due:'7 Feb'};
  if(d>=q4s&&d<=q4e) return {q:4,label:'Q4',period:'6 Jan – 5 Apr',due:'7 May'};
  return {q:0,label:'',period:'',due:''};
}

function renderMTD() {
  const taxYears = [];
  const currentYear = getTaxYear(new Date().toISOString().slice(0,10));
  for(let y = currentYear; y >= currentYear - 2; y--) taxYears.push(y);
  if(!state.mtdYear) state.mtdYear = currentYear;
  const yr = state.mtdYear;
  const start = new Date(yr, 3, 6);
  const end = new Date(yr+1, 3, 5, 23, 59);
  const yearTxns = state.txns.filter(t => {
    if(!t.date) return false;
    const d = new Date(t.date);
    return d >= start && d <= end;
  });

  const grossIncome = yearTxns.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t),0);
  const financeExpenses = yearTxns.filter(t=>t.type==='expense'&&t.cat==='financial').reduce((s,t)=>s+txnShare(t),0);
  const otherExpenses = yearTxns.filter(t=>t.type==='expense'&&t.cat!=='financial').reduce((s,t)=>s+txnShare(t),0);
  const totalExpenses = financeExpenses + otherExpenses;
  const netProfit = grossIncome - totalExpenses;

  const quarters = [1,2,3,4].map(q => {
    let qs, qe;
    if(q===1){qs=new Date(yr,3,6);qe=new Date(yr,6,5,23,59);}
    else if(q===2){qs=new Date(yr,6,6);qe=new Date(yr,9,5,23,59);}
    else if(q===3){qs=new Date(yr,9,6);qe=new Date(yr+1,0,5,23,59);}
    else{qs=new Date(yr+1,0,6);qe=new Date(yr+1,3,5,23,59);}
    const labels = ['Q1: 6 Apr – 5 Jul','Q2: 6 Jul – 5 Oct','Q3: 6 Oct – 5 Jan','Q4: 6 Jan – 5 Apr'];
    const dues = ['7 Aug','7 Nov','7 Feb','7 May'];
    const qt = yearTxns.filter(t=>{ const d=new Date(t.date); return d>=qs&&d<=qe; });
    const qIncome = qt.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t),0);
    const qFinance = qt.filter(t=>t.type==='expense'&&t.cat==='financial').reduce((s,t)=>s+txnShare(t),0);
    const qOther = qt.filter(t=>t.type==='expense'&&t.cat!=='financial').reduce((s,t)=>s+txnShare(t),0);
    const now = new Date();
    const isPast = qe < now;
    const isDue = qs <= now && qe >= now;
    return {q,label:labels[q-1],due:dues[q-1],income:qIncome,finance:qFinance,other:qOther,total:qIncome-qFinance-qOther,txCount:qt.length,isPast,isDue,qs,qe};
  });

  const yearOpts = taxYears.map(y=>`<option value="${y}"${y===yr?' selected':''}>${y}/${String(y+1).slice(2)} tax year</option>`).join('');

  const quarterCards = quarters.map(q => `
    <div class="card" style="margin-bottom:10px">
      <div class="flex-row" style="margin-bottom:10px">
        <div>
          <div class="fw5-14">${q.label}</div>
          <div class="text-sm">Due ${q.due} · ${q.txCount} transactions</div>
        </div>
        <span class="badge ${q.isDue?'badge-amber':q.isPast?'badge-green':'badge-grey'}">${q.isDue?'Current':q.isPast?'Past':'Upcoming'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px">
        <div><div class="label-xs" style="margin-bottom:3px">Gross income</div><div style="font-size:15px;font-weight:500;color:var(--green)">${fmtMoney(q.income)}</div></div>
        <div><div class="label-xs" style="margin-bottom:3px">Finance costs</div><div style="font-size:15px;font-weight:500;color:var(--red)">${fmtMoney(q.finance)}</div></div>
        <div><div class="label-xs" style="margin-bottom:3px">Other expenses</div><div style="font-size:15px;font-weight:500;color:var(--red)">${fmtMoney(q.other)}</div></div>
      </div>
      <div class="flex-row">
        <div style="font-size:13px;color:var(--text2)">Net: <strong style="color:${q.total>=0?'var(--green)':'var(--red)'}">${q.total<0?'-':''}${fmtMoney(q.total)}</strong></div>
        <div class="gap-8">
          <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;width:auto" onclick="exportQuarterCSV(${q.q},${yr})">CSV</button>
          <button class="btn btn-primary" style="padding:6px 12px;font-size:12px;width:auto" onclick="exportQuarterMTD(${q.q},${yr})">MTD summary</button>
        </div>
      </div>
    </div>`).join('');

  document.getElementById('screen-mtd').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">

function txnsForQuarter(q, yr) {
  let qs, qe;
  if(q===1){qs=new Date(yr,3,6);qe=new Date(yr,6,5,23,59);}
  else if(q===2){qs=new Date(yr,6,6);qe=new Date(yr,9,5,23,59);}
  else if(q===3){qs=new Date(yr,9,6);qe=new Date(yr+1,0,5,23,59);}
  else{qs=new Date(yr+1,0,6);qe=new Date(yr+1,3,5,23,59);}
  return state.txns.filter(t=>{ if(!t.date)return false; const d=new Date(t.date); return d>=qs&&d<=qe; });
}

function txnsForYear(yr) {
  const s=new Date(yr,3,6), e=new Date(yr+1,3,5,23,59);
  return state.txns.filter(t=>{ if(!t.date)return false; const d=new Date(t.date); return d>=s&&d<=e; });
}

function buildCSV(txns) {
  const rows = [['Date','Description','Property','Category','Type','Amount (£)','Finance cost (Y/N)']];
  txns.forEach(t => {
    const p = getProp(t.prop);
    rows.push([t.date, t.desc, p?p.name:t.prop, CAT_LABELS[t.cat]||t.cat, t.type==='income'?'Income':'Expense', t.type==='expense'?-t.amount:t.amount, t.cat==='financial'?'Y':'N']);
  });
  return rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
}

function downloadText(filename, content, mime) {
  const blob = new Blob([content],{type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportQuarterCSV(q, yr) {
  const txns = txnsForQuarter(q, yr);
  downloadText(`MTD_Q${q}_${yr}-${yr+1}.csv`, buildCSV(txns), 'text/csv');
}

function exportFullYearCSV(yr) {
  const txns = txnsForYear(yr);
  downloadText(`MTD_FullYear_${yr}-${yr+1}.csv`, buildCSV(txns), 'text/csv');
}

function buildMTDSummary(txns, label, yr) {
  const income = txns.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t),0);
  const finance = txns.filter(t=>t.type==='expense'&&t.cat==='financial').reduce((s,t)=>s+txnShare(t),0);
  const other = txns.filter(t=>t.type==='expense'&&t.cat!=='financial').reduce((s,t)=>s+txnShare(t),0);
  const net = income-finance-other;
  const catBreakdown = Object.entries(CAT_LABELS).map(([k,l])=>{
    const total = txns.filter(t=>t.type==='expense'&&t.cat===k).reduce((s,t)=>s+txnShare(t),0);
    return total>0?`  ${l}: £${total.toFixed(2)}`:'';
  }).filter(Boolean).join('\n');

  return `PROPERTY PORTFOLIO – MTD FOR INCOME TAX
${label} | Tax year ${yr}/${yr+1}
Generated: ${new Date().toLocaleDateString('en-GB')}
${'─'.repeat(48)}

UK PROPERTY INCOME
  Gross rental income:          £${income.toFixed(2)}

ALLOWABLE EXPENSES
  Residential finance costs
  (financial costs – Section 24 finance costs): £${finance.toFixed(2)}

  Other allowable expenses:     £${other.toFixed(2)}
${catBreakdown ? '\n  Breakdown:\n'+catBreakdown : ''}

SUMMARY
  Total expenses:               £${(finance+other).toFixed(2)}
  Net profit / (loss):          £${net.toFixed(2)}

${'─'.repeat(48)}
TRANSACTION COUNT: ${txns.length} (${txns.filter(t=>t.type==='income').length} income, ${txns.filter(t=>t.type==='expense').length} expense)

NOTE: Finance costs (mortgage interest) must always be
reported separately under MTD for ITSA. Figures are on a
cash basis. This summary is for reference only — submit
via HMRC-approved MTD software for official filing.
`;
}

function exportQuarterMTD(q, yr) {
  const qLabels = ['','Q1 (6 Apr – 5 Jul)','Q2 (6 Jul – 5 Oct)','Q3 (6 Oct – 5 Jan)','Q4 (6 Jan – 5 Apr)'];
  const txns = txnsForQuarter(q, yr);
  downloadText(`MTD_Q${q}_${yr}-${yr+1}_summary.txt`, buildMTDSummary(txns, qLabels[q], yr), 'text/plain');
}

function exportFullYearMTD(yr) {
  const txns = txnsForYear(yr);
  downloadText(`MTD_FullYear_${yr}-${yr+1}_summary.txt`, buildMTDSummary(txns, 'Full tax year', yr), 'text/plain');
}

const EMAIL_PROMPT = `Extract maintenance issue details from this tenant email or message. Return ONLY a JSON object, no markdown:
{"description":"one-line summary of the issue","property":"property name or address if mentioned, else empty string","date":"YYYY-MM-DD date reported if found, else today","priority":"high|medium|low — high if urgent/emergency, medium if inconvenient, low otherwise","notes":"any additional relevant detail from the email","contractor":"any contractor or tradesperson mentioned, else empty string","confidence":"high or low"}`;

async function extractFromEmailText() {
  const text = document.getElementById('email-text').value.trim();
  if(!text){alert('Please paste some email text.');return;}
  document.getElementById('email-paste-area').style.display='none';
  document.getElementById('email-extracting').style.display='block';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:EMAIL_PROMPT+'\n\nEmail content:\n'+text}]})});
    const data = await res.json();
    const raw = data.content.map(c=>c.text||'').join('');
    let ex={}; try{ex=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){}
    showExtractedMaint(ex);
  } catch(err) { showExtractedMaint({description:'',notes:text,priority:'medium',confidence:'low'}); }
  document.getElementById('email-extracting').style.display='none';
}

async function extractFromEmailImage(input) {
  const file=input.files[0]; if(!file) return;
  document.getElementById('email-image-area').style.display='none';
  document.getElementById('email-extracting').style.display='block';
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const base64=e.target.result.split(',')[1];
    const mediaType=file.type||'image/jpeg';
    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[{type:mediaType==='application/pdf'?'document':'image',source:{type:'base64',media_type:mediaType,data:base64}},{type:'text',text:EMAIL_PROMPT}]}]})});
      const data=await res.json();
      const raw=data.content.map(c=>c.text||'').join('');
      let ex={}; try{ex=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){}
      showExtractedMaint(ex);
    } catch(err){ showExtractedMaint({description:'',priority:'medium',confidence:'low'}); }
    document.getElementById('email-extracting').style.display='none';
    input.value='';
  };
  reader.readAsDataURL(file);
}

let _lastUploadedFile = null;
let _lastUploadedBase64 = null;
let _lastUploadedMime = null;

async function handleDocUpload(input) {
  const file = input.files[0]; if(!file) return;
  _lastUploadedFile = file;
  _lastUploadedMime = file.type || 'application/pdf';
  const area = document.getElementById('doc-extract-area');
  area.innerHTML = '<div class="loading-box"><span class="spinner"></span> Extracting details…</div>';
  const reader = new FileReader();
  reader.onload = async (e) => {
    _lastUploadedBase64 = e.target.result.split(',')[1];
    const isTransaction = currentDocType === 'transaction';
    const prompt = isTransaction
      ? `Extract financial details from this document. Return ONLY a JSON object, no markdown:\n{"date":"YYYY-MM-DD","type":"income or expense","description":"short description","amount":numeric,"supplier":"supplier or payee name","category":"rental-income|premises|repairs|financial|professional|services|travel|other-allowable","confidence":"high or low"}`
      : `Extract certificate details from this document. Return ONLY a JSON object, no markdown:\n{"certType":"Gas Safety|EPC|EICR|PAT Testing|Legionella|Other","issueDate":"YYYY-MM-DD","expiryDate":"YYYY-MM-DD","issuer":"issuing company or engineer","epcRating":"A|B|C|D|E|F|G or empty string if not EPC","notes":"any relevant notes","confidence":"high or low"}`;
    let ex = null;
    let extractionFailed = false;
    let failureReason = '';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1000,
          messages:[{role:'user',content:[
            {type:_lastUploadedMime==='application/pdf'?'document':'image',source:{type:'base64',media_type:_lastUploadedMime,data:_lastUploadedBase64}},
            {type:'text',text:prompt}
          ]}]
        })
      });
      if(!res.ok) {
        const errData = await res.json().catch(()=>({}));
        extractionFailed = true;
        failureReason = errData?.error?.message || `API error ${res.status}`;
      } else {
        const data = await res.json();
        if(data.error) {
          extractionFailed = true;
          failureReason = data.error.message || 'API returned an error';
        } else {
          const text = data.content.map(c=>c.text||'').join('');
          try {
            ex = JSON.parse(text.replace(/```json|```/g,'').trim());
          } catch(e2) {
            ex = {};
            ex.confidence = 'low';
          }
        }
      }
    } catch(err) {
      extractionFailed = true;
      failureReason = err.message || 'Network error';
    }

    if(extractionFailed) {
      const warning = `<div class="alert alert-red" style="margin-bottom:10px">
        <strong>Extraction failed</strong> — the document could not be read automatically.
        ${failureReason ? `<div style="font-size:11px;margin-top:4px;opacity:.8">${failureReason}</div>` : ''}
        <div style="font-size:12px;margin-top:6px">Common causes: large/multi-page PDF, scanned without text layer, or encrypted file. Please fill in the details below.</div>
      </div>`;
      area.innerHTML = warning;
      if(isTransaction) showExtractedTxn({confidence:'low'});
      else showExtractedCert({confidence:'low'});
    } else {
      if(isTransaction) showExtractedTxn(ex);
      else showExtractedCert(ex);
    }
    input.value = '';
  };
  reader.readAsDataURL(file);
}

function propFirstWord(propId) {
  const p = getProp(propId);
  const fullName = p ? p.name : 'Unknown';
  const words = fullName.replace(/[^a-zA-Z0-9 ]/g,'').trim().split(/\s+/);
  return words.find(w => isNaN(w)) || words[0];
}

function buildDocFilename(propId, date, type, suffix) {
  const roadName = propFirstWord(propId);
  const d = date ? new Date(date) : new Date();
  const yymm = String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,'0');
  const detail = type.split(/[\s&\-_]+/).filter(Boolean)
    .map((w,i) => i===0 ? w.charAt(0).toUpperCase()+w.slice(1) : w.charAt(0).toUpperCase()+w.slice(1))
    .join('').replace(/[^a-zA-Z0-9]/g,'');
  const ext = _lastUploadedMime==='application/pdf' ? '.pdf' : (_lastUploadedMime.includes('png')?'.png':'.jpg');
  return `${roadName}_${yymm}_${detail}${suffix?'_'+suffix:''}${ext}`;
}

async function saveDocCopy(filename, propId, category) {
  if(!_lastUploadedBase64 || !_lastUploadedMime) return;
  const folderName = propFirstWord(propId); // e.g. "Maple" not "14 Maple Close"
  if(gAccessToken) {
    showSync('⟳ Uploading to Drive…');
    const link = await uploadFileToDrive(_lastUploadedBase64, _lastUploadedMime, filename, folderName, category||'Documents');
    if(link) return;
  }
  const byteChars = atob(_lastUploadedBase64);
  const bytes = new Uint8Array(byteChars.length);
  for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
  const blob = new Blob([bytes],{type:_lastUploadedMime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

  if(startVal && months > 0) {

    const endEl = document.getElementById('mt-period-end');

function openCertDoc(certId) {
  const c = state.certs.find(x=>x.id===certId);
  if(!c || !c.docData) return;
  try {
    const byteChars = atob(c.docData);
    const bytes = new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
    const blob = new Blob([bytes], {type: c.docMime||'application/pdf'});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
  } catch(e) {
    alert('Could not open document.');
  }
}

function npTickChanged() {
  const tickedExisting = state.owners.filter(o => document.getElementById('np-ck-'+o.id)?.checked);
  const tickedNewCount = [0,1,2,3].filter(i => document.getElementById('np-ck-new-'+i)?.checked).length;
  const totalTicked = tickedExisting.length + tickedNewCount;
  if(totalTicked > 0) {
    const each = +(100/totalTicked).toFixed(1);
    const last = +(100 - each*(totalTicked-1)).toFixed(1);
    let idx = 0;
    tickedExisting.forEach(o => {
      const el = document.getElementById('np-own-share-'+o.id);
      if(el) { el.value = idx===totalTicked-1 ? last : each; idx++; }
    });
    state.owners.filter(o => !document.getElementById('np-ck-'+o.id)?.checked).forEach(o => {
      const el = document.getElementById('np-own-share-'+o.id);
      if(el) el.value = '';
    });
    [0,1,2,3].forEach(i => {
      const el = document.getElementById('np-new-owner-share-'+i);
      if(el) {
        if(document.getElementById('np-ck-new-'+i)?.checked) {
          el.value = idx===totalTicked-1 ? last : each;
          idx++;
        } else {
          el.value = '';
        }
      }
    });
  } else {
    state.owners.forEach(o => { const el=document.getElementById('np-own-share-'+o.id); if(el) el.value=''; });
    [0,1,2,3].forEach(i => { const el=document.getElementById('np-new-owner-share-'+i); if(el) el.value=''; });
  }
  updateNewPropOwnerTotal();
}

function npOwnerEqualSplit() {
  state.owners.forEach(o => {
    const ck = document.getElementById('np-ck-'+o.id);
    if(ck) ck.checked = true;
  });
  [0,1,2,3].forEach(i => {
    const nm = document.getElementById('np-new-owner-name-'+i);
    const ck = document.getElementById('np-ck-new-'+i);
    if(nm && ck) ck.checked = nm.value.trim().length > 0;
  });
  npTickChanged();
}

function updateNewPropOwnerTotal() {
  let total = 0;
  state.owners.forEach(o => { total += parseFloat(document.getElementById('np-own-share-'+o.id)?.value||0); });
  [0,1,2,3].forEach(i => { total += parseFloat(document.getElementById('np-new-owner-share-'+i)?.value||0); });
  const msg = document.getElementById('np-owner-total-msg');
  if(!msg) return;
  if(total === 0) { msg.style.display='none'; return; }
  msg.style.display='block';
  const ok = Math.abs(total-100)<0.5;
  msg.textContent = `Total: ${total.toFixed(0)}%${ok?' ✓':' — must equal 100%'}`;
  msg.style.background = ok ? 'var(--green-bg)' : 'var(--amber-bg)';
  msg.style.color = ok ? 'var(--green)' : 'var(--amber)';
}

function npOwnerClear() {

function saveProp() {
  const s1 = window._newPropStep1;
  if(!s1 || !s1.name){ alert('Please enter a property name.'); return; }
  const propOwners = [];
  let totalShare = 0;
  state.owners.forEach(o => {
    const share = parseFloat(document.getElementById('np-own-share-'+o.id)?.value||0);
    if(share > 0) { propOwners.push({ownerId:o.id, share}); totalShare+=share; }
  });
  [0,1,2,3].forEach(i => {
    const nameEl = document.getElementById('np-new-owner-name-'+i);
    const shareEl = document.getElementById('np-new-owner-share-'+i);
    const name = nameEl?.value?.trim();
    const share = parseFloat(shareEl?.value||0);
    if(name) {
      let owner = state.owners.find(o=>o.name.toLowerCase()===name.toLowerCase());
      if(!owner) {
        owner = {id: uid(), name};
        state.owners.push(owner);
      }
      if(share > 0) { propOwners.push({ownerId:owner.id, share}); totalShare+=share; }
      else { propOwners.push({ownerId:owner.id, share:0}); }
    }
  });
  if(totalShare > 0 && Math.abs(totalShare-100) > 1) {
    alert(`Ownership shares add up to ${totalShare.toFixed(0)}% — they must total 100%. Please adjust.`);
    return;
  }
  if(propOwners.length > 0 && totalShare === 0) {
    const each = +(100/propOwners.length).toFixed(1);
    propOwners.forEach((o,i) => { o.share = i===propOwners.length-1 ? 100-(each*(propOwners.length-1)) : each; });
  }
  const myShare = propOwners.length > 0 ? (propOwners[0]?.share ?? 100) : 100;

  const idx = state.props.length % PROP_COLORS.length;
  state.props.push({
    id: uid(), name: s1.name, address: s1.addr,
    status: s1.status, color: PROP_COLORS[idx],
    ownershipShare: myShare,
    numOwners: propOwners.length || 1,
    owners: propOwners.length > 0 ? propOwners : [],
    tenant: s1.tenant||'—', leaseStart: s1.leaseStart||'—', leaseEnd:'—', deposit:'—',
    tenantEmail:'—', tenantPhone:'—',
    rent: parseFloat(s1.rent)||0,
    lastRentIncrease: '',
    lastRentAmount: 0,
    purchase: parseFloat(s1.purchase)||0,
    value: parseFloat(s1.value)||0,
    mortgage: parseFloat(s1.mortgage)||0,
    lender: s1.lender||'—',
    agent:'—', agentTel:'—', gasEngineer:'—', electrician:'—', solicitor:'—', insurance:'—',
    archived: false,
  });
  const newProp = state.props[state.props.length-1];
  if(newProp.rent > 0) {
    if(!state.rentHistory) state.rentHistory = [];
    state.rentHistory.push({
      id: uid(), propId: newProp.id,
      amount: newProp.rent,
      tenant: s1.tenant||'',
      startDate: new Date().toISOString().slice(0,10),
      endDate: null,
      notes: 'Initial rent (added with property)'
    });
    saveState('rentHistory');
  }

  saveState('props');
  saveState('owners');
  window._newPropStep1 = null;
  closeModal();
  populateOwnerSelect();
  renderProperties();
  renderDashboard();
}
