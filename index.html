<script>
// ============================================
// UTILITIES
// ============================================
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 8); }
function formatMoney(amount) { return '£' + Math.abs(amount).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function formatDate(dateStr) { if (!dateStr || dateStr === '—') return '—'; const d = new Date(dateStr); return d.toLocaleDateString('en-GB'); }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
function escapeJs(str) { if (!str) return ''; return String(str).replace(/['"\\]/g, '\\$&').replace(/\n/g, '\\n'); }

function showToast(msg, isError) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  if (isError) toast.style.background = 'var(--red)';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ============================================
// GOOGLE DRIVE - FIXED VERSION
// ============================================
let gAccessToken = null;
let gDriveDataFileId = null;
let gDriveFolderIds = { root: null };
let isGoogleReady = false;
let isGapiReady = false;

function gapiLoaded() {
  isGapiReady = true;
  console.log('GAPI loaded');
}

function checkGoogleReady() {
  return new Promise((resolve) => {
    const checkInterval = setInterval(() => {
      if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
        clearInterval(checkInterval);
        isGoogleReady = true;
        resolve(true);
      }
    }, 100);
    setTimeout(() => { clearInterval(checkInterval); resolve(false); }, 5000);
  });
}

async function signIn() {
  const btn = document.getElementById('signin-btn');
  const statusDiv = document.getElementById('login-status');
  
  if (btn) { btn.disabled = true; btn.textContent = 'Loading...'; }
  if (statusDiv) statusDiv.textContent = 'Loading Google services...';
  
  const ready = await checkGoogleReady();
  
  if (!ready) {
    if (statusDiv) statusDiv.textContent = 'Google library failed to load. Please refresh.';
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    return;
  }
  
  if (btn) btn.textContent = 'Signing in...';
  if (statusDiv) statusDiv.textContent = 'Opening sign-in window...';
  
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: '434046440829-4kr09lbdl6u5eu03h92g5obb12nc72fd.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: async (response) => {
        if (response.error) {
          if (statusDiv) statusDiv.textContent = 'Error: ' + response.error;
          if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
          showToast('Sign in failed: ' + response.error, true);
          return;
        }
        
        gAccessToken = response.access_token;
        document.getElementById('login-screen').style.display = 'none';
        showToast('✓ Signed in to Google Drive');
        
        await loadFromDrive();
        renderAll();
      }
    });
    client.requestAccessToken();
  } catch (error) {
    if (statusDiv) statusDiv.textContent = 'Error: ' + error.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    showToast('Sign in failed', true);
  }
}

function signOut() {
  if (gAccessToken && google.accounts) {
    google.accounts.oauth2.revoke(gAccessToken);
  }
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = { root: null };
  document.getElementById('login-screen').style.display = 'flex';
  showToast('Signed out of Google Drive');
}

async function driveRequest(url, options = {}) {
  const response = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers || {}) }
  });
  if (!response.ok) throw new Error(`Drive API ${response.status}`);
  return response.json();
}

async function findOrCreateFolder(name, parentId = 'root') {
  const query = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`);
  
  if (result.files && result.files.length > 0) {
    return result.files[0].id;
  }
  
  const metadata = {
    name: name,
    mimeType: 'application/vnd.google-apps.folder',
    parents: [parentId]
  };
  
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(metadata)
  });
  
  return created.id;
}

async function loadFromDrive() {
  if (!gAccessToken) return;
  
  try {
    showToast('Loading from Drive...');
    
    // Create or get root folder
    const rootId = await findOrCreateFolder('Property Portfolio');
    gDriveFolderIds.root = rootId;
    
    // Search for data file
    const query = `name='portfolio-data.json' and '${rootId}' in parents and trashed=false`;
    const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`);
    
    if (result.files && result.files.length > 0) {
      gDriveDataFileId = result.files[0].id;
      const fileResponse = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveDataFileId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + gAccessToken }
      });
      const data = await fileResponse.json();
      
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
      if (data.certificates) state.certificates = data.certificates;
      
      showToast('✓ Data loaded from Drive');
    } else {
      // Create new data file
      await saveToDrive();
      showToast('✓ New portfolio created in Drive');
    }
  } catch (error) {
    console.error('Load error:', error);
    showToast('⚠ Could not load from Drive - using local data', true);
  }
}

async function saveToDrive() {
  if (!gAccessToken) return;
  
  const data = {
    properties: state.properties,
    transactions: state.transactions,
    maintenance: state.maintenance,
    certificates: state.certificates || []
  };
  
  const jsonData = JSON.stringify(data, null, 2);
  const blob = new Blob([jsonData], { type: 'application/json' });
  
  try {
    if (!gDriveFolderIds.root) {
      gDriveFolderIds.root = await findOrCreateFolder('Property Portfolio');
    }
    
    if (gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const formData = new FormData();
      formData.append('metadata', new Blob([JSON.stringify({
        name: 'portfolio-data.json',
        parents: [gDriveFolderIds.root]
      })], { type: 'application/json' }));
      formData.append('file', blob);
      
      const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: formData
      });
      const result = await response.json();
      gDriveDataFileId = result.id;
    }
  } catch (error) {
    console.error('Save error:', error);
  }
}

async function uploadDocumentToDrive(file, propertyName, category = 'Documents') {
  if (!gAccessToken) return null;
  
  try {
    if (!gDriveFolderIds.root) {
      gDriveFolderIds.root = await findOrCreateFolder('Property Portfolio');
    }
    
    // Create property folder
    const propKey = propertyName || 'General';
    if (!gDriveFolderIds[propKey]) {
      gDriveFolderIds[propKey] = await findOrCreateFolder(propKey, gDriveFolderIds.root);
    }
    
    // Create category folder
    const catKey = propKey + '_' + category;
    if (!gDriveFolderIds[catKey]) {
      gDriveFolderIds[catKey] = await findOrCreateFolder(category, gDriveFolderIds[propKey]);
    }
    
    // Upload file
    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    const cleanProperty = propertyName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    const cleanCategory = category.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    const extension = file.name.split('.').pop();
    const fileName = `${cleanProperty}_${cleanCategory}_${timestamp}.${extension}`;
    
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify({
      name: fileName,
      parents: [gDriveFolderIds[catKey]]
    })], { type: 'application/json' }));
    formData.append('file', file);
    
    const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gAccessToken },
      body: formData
    });
    
    const result = await response.json();
    return result.webViewLink || `https://drive.google.com/file/d/${result.id}/view`;
  } catch (error) {
    console.error('Upload error:', error);
    showToast('Upload failed', true);
    return null;
  }
}

  ],
  certificates: []
};

function saveState() {
  localStorage.setItem('portfolio_data', JSON.stringify(state));
  if (gAccessToken) {
    saveToDrive().catch(e => console.error('Drive save error:', e));
  }
}

function loadLocalData() {
  try {
    const saved = localStorage.getItem('portfolio_data');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
      if (data.certificates) state.certificates = data.certificates;
    }
  } catch(e) { console.error('Load error:', e); }
}

}

  const income = state.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = state.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const activeMaintenance = state.maintenance.filter(m => m.status === 'open').length;
  
  document.getElementById('main-content').innerHTML = `
    <div class="quick-actions">

      <div class="quick-action" onclick="showQuickIncome()"><div class="quick-action-icon">📈</div><div class="quick-action-label">Income</div></div>
      <div class="quick-action" onclick="showQuickMaintenance()"><div class="quick-action-icon">🔧</div><div class="quick-action-label">Maintenance</div></div>
      <div class="quick-action" onclick="showAddProperty()"><div class="quick-action-icon">🏠</div><div class="quick-action-label">Property</div></div>
    </div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Monthly rent</div><div class="metric-value">${formatMoney(totalRent)}</div><div class="metric-label">${properties.filter(p=>p.status==='let').length}/${properties.length} let</div></div>
      <div class="metric-card"><div class="metric-label">Portfolio value</div><div class="metric-value">${formatMoney(totalValue)}</div></div>
      <div class="metric-card"><div class="metric-label">Net profit</div><div class="metric-value ${income - expenses >= 0 ? 'text-green' : 'text-red'}">${formatMoney(income - expenses)}</div></div>
      <div class="metric-card"><div class="metric-label">Active issues</div><div class="metric-value ${activeMaintenance > 0 ? 'text-red' : 'text-green'}">${activeMaintenance}</div></div>
    </div>
    <div class="card-header"><div class="card-title">Properties</div><button class="btn btn-secondary" style="width: auto; padding: 6px 12px;" onclick="navigate('properties')">View all →</button></div>
    ${properties.slice(0, 3).map(p => renderPropertyCard(p)).join('')}
  `;
}

function renderPropertyCard(property) {
  const yieldVal = property.currentValue ? (property.rent * 12 / property.currentValue * 100).toFixed(1) : 0;
  return `
    <div class="property-item" onclick="showPropertyDetail('${escapeJs(property.id)}')">
      <div class="property-header">
        <div class="property-color" style="background: ${property.color}"></div>
        <div class="property-name">${escapeHtml(property.name)}</div>
        <span class="property-status status-${property.status}">${property.status === 'let' ? 'Let' : 'Vacant'}</span>
      </div>
      <div class="property-stats">
        <div><div class="property-stat-label">Rent</div><div class="property-stat-value">${formatMoney(property.rent)}</div></div>
        <div><div class="property-stat-label">Yield</div><div class="property-stat-value">${yieldVal}%</div></div>
      </div>
    </div>
  `;
}
