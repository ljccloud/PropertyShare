/* ============================================
   COMPLETE CSS - All features included

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface2: #F2F2F5;
  --border: #E5E5EA;
  --border2: #D1D1D6;
  --text: #1C1C1E;
  --text2: #6C6C70;
  --text3: #8E8E93;
  --green: #28A745;
  --green-bg: #E8F5E9;
  --red: #DC3545;
  --red-bg: #FEE8E9;
  --amber: #FFC107;
  --amber-bg: #FFF8E1;
  --blue: #007AFF;
  --blue-bg: #E8F0FE;
  --purple: #5856D6;
  --purple-bg: #EEEEFF;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --nav-h: 64px;
}

body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* Header */
.app-header { position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
.app-header h1 { font-size: 20px; font-weight: 600; }
.header-actions { display: flex; gap: 8px; }
.icon-button { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--surface2); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
.icon-button:active { transform: scale(0.95); }

/* Bottom Navigation */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 0.5px solid var(--border); display: flex; padding: 8px 12px 20px; gap: 4px; z-index: 100; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border: none; background: none; cursor: pointer; border-radius: var(--radius-sm); color: var(--text3); transition: all 0.1s; }
.nav-item:active { transform: scale(0.95); }
.nav-item.active { color: var(--blue); background: var(--blue-bg); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 11px; font-weight: 500; }

/* Main Content */
.main-content { flex: 1; padding: 16px; padding-bottom: calc(var(--nav-h) + 16px); overflow-y: auto; -webkit-overflow-scrolling: touch; }

.card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 0.5px solid var(--border); transition: transform 0.1s; }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric-card { background: var(--surface); border-radius: var(--radius); padding: 14px; border: 0.5px solid var(--border); }
.metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }

.compliance-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }

.compliance-details { flex: 1; }
.compliance-name { font-weight: 500; font-size: 14px; }
.compliance-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.compliance-due { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }

.due-soon { background: var(--amber-bg); color: #856404; }

/* Calendar */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }

.comparison-table { width: 100%; font-size: 13px; border-collapse: collapse; }

.tenant-contact-name { font-weight: 500; font-size: 14px; }

/* Bottom Sheet */
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); z-index: 1000; max-height: 85vh; overflow-y: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }

.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; display: none; }

.form-input, .form-select, .form-textarea { width: 100%; padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; background: var(--surface); transition: border-color 0.1s; }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--blue); }

/* Buttons */
.btn { padding: 12px 20px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; border: none; cursor: pointer; width: 100%; transition: opacity 0.1s; }

.btn-primary { background: var(--blue); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }
.btn-danger { background: var(--red-bg); color: var(--red); }

/* Export Buttons */
.export-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }

/* Login Screen */
.login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 32px; }
.login-card { background: var(--surface); border-radius: 24px; padding: 40px 28px; text-align: center; max-width: 320px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }

.login-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.4; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 16px; right: 16px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: white; padding: 12px 16px; border-radius: 30px; text-align: center; font-size: 14px; font-weight: 500; z-index: 1500; animation: slideUp 0.3s ease; pointer-events: none; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Utility Classes */
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-blue { color: var(--blue); }
.flex { display: flex; }
.justify-between { justify-content: space-between; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.text-center { text-align: center; }

/* Responsive */
@media (min-width: 768px) {
  .main-content, .bottom-nav { max-width: 700px; margin: 0 auto; }

/* Safe area support */
@supports (padding: max(0px)) {
  .main-content { padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }

</style>

function checkGoogleReady() {
  if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
    googleReady = true;
    const btn = document.getElementById('signin-btn');
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    const statusDiv = document.getElementById('login-status');
    if (statusDiv) statusDiv.textContent = '';
  } else {
    setTimeout(checkGoogleReady, 200);
  }
}

async function signIn() {
  const btn = document.getElementById('signin-btn');
  const statusDiv = document.getElementById('login-status');
  
  if (!googleReady) {
    if (statusDiv) statusDiv.textContent = 'Google services loading, please wait...';
    setTimeout(signIn, 500);
    return;
  }
  
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
  if (statusDiv) statusDiv.textContent = 'Opening Google sign-in...';
  
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (response) => {
        if (response.error) {
          if (statusDiv) { statusDiv.textContent = 'Error: ' + response.error; statusDiv.style.color = 'var(--red)'; }
          if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
          showToast('Sign in failed: ' + response.error, true);
          return;
        }
        gAccessToken = response.access_token;
        document.getElementById('login-screen').style.display = 'none';
        showToast('✓ Signed in to Google Drive');
        await initDrive();
        renderAll();
      }
    });
    client.requestAccessToken();
  } catch (err) {
    if (statusDiv) statusDiv.textContent = 'Error: ' + err.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    showToast('Sign in failed', true);
  }
}

function signOut() {
  if (gAccessToken && google.accounts) google.accounts.oauth2.revoke(gAccessToken);
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = {};
  document.getElementById('login-screen').style.display = 'flex';
  showToast('Signed out');
}

async function driveRequest(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers || {}) }
  });
  if (!res.ok) throw new Error(`Drive API ${res.status}`);
  return res.json();
}

async function findOrCreateFolder(name, parentId = 'root') {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if (result.files && result.files.length > 0) return result.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function initDrive() {
  try {
    const rootId = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
    gDriveFolderIds.root = rootId;
    const q = `name='${DATA_FILENAME}' and '${rootId}' in parents and trashed=false`;
    const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
    
    if (result.files && result.files.length > 0) {
      gDriveDataFileId = result.files[0].id;
      const data = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveDataFileId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + gAccessToken }
      }).then(r => r.json());
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
      if (data.certificates) state.certificates = data.certificates;
      showToast('✓ Loaded from Drive');
    } else {
      showToast('✓ New portfolio created');
      await saveToDrive();
    }
  } catch (e) {
    console.error('Drive init error:', e);
    showToast('⚠ Drive error — using local data', true);
  }
  renderAll();
}

async function saveToDrive() {
  if (!gAccessToken) return;
  const data = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance, certificates: state.certificates };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  try {
    if (gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DATA_FILENAME, parents: [gDriveFolderIds.root || 'root'] })], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      const created = await res.json();
      gDriveDataFileId = created.id;
    }
  } catch (e) { console.error('Drive save error:', e); }
}

async function uploadDocumentToDrive(file, propertyName, category = 'Documents') {
  if (!gAccessToken) return null;
  try {
    if (!gDriveFolderIds.root) gDriveFolderIds.root = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
    const propKey = propertyName || 'General';
    if (!gDriveFolderIds[propKey]) gDriveFolderIds[propKey] = await findOrCreateFolder(propKey, gDriveFolderIds.root);
    const catKey = propKey + '_' + category;
    if (!gDriveFolderIds[catKey]) gDriveFolderIds[catKey] = await findOrCreateFolder(category, gDriveFolderIds[propKey]);
    
    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    const cleanProperty = propertyName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    const cleanCategory = category.replace(/[^a-z0-9]/gi, '_').toLowerCase();
    const extension = file.name.split('.').pop();
    const fileName = `${cleanProperty}_${cleanCategory}_${timestamp}.${extension}`;
    
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify({ name: fileName, parents: [gDriveFolderIds[catKey]] })], { type: 'application/json' }));
    formData.append('file', file);
    const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gAccessToken },
      body: formData
    });
    const result = await response.json();
    return result.webViewLink || `https://drive.google.com/file/d/${result.id}/view`;
  } catch (error) {
    console.error('Upload error:', error);
    showToast('Upload failed', true);
    return null;
  }
}

function renderAll() {
  if (currentScreen === 'overview') renderOverview();
  else if (currentScreen === 'properties') renderProperties();
  else if (currentScreen === 'compliance') renderCompliance();
  else if (currentScreen === 'calendar') renderCalendar();
  else if (currentScreen === 'finance') renderFinance();
}

function renderOverview() {

    const daysLeft = Math.ceil((new Date(c.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));

  document.getElementById('main-content').innerHTML = `

function renderPropertyCard(property) {
  const yieldVal = property.currentValue ? (property.rent * 12 / property.currentValue * 100).toFixed(1) : 0;
  const summary = state.transactions.filter(t => t.propertyId === property.id).reduce((s, t) => s + (t.type === 'income' ? t.amount : -t.amount), 0);
  return `
    <div class="property-item">
      <div class="property-header">
        <div class="property-color" style="background: ${property.color}"></div>
        <div class="property-name" onclick="showPropertyDetail('${escapeJs(property.id)}')">${escapeHtml(property.name)}</div>
        <span class="property-status status-${property.status}">${property.status === 'let' ? 'Let' : 'Vacant'}</span>
        <button class="icon-btn-sm" onclick="event.stopPropagation(); editProperty('${escapeJs(property.id)}')" title="Edit">✎</button>
      </div>
      <div class="property-stats" onclick="showPropertyDetail('${escapeJs(property.id)}')">
        <div><div class="property-stat-label">Rent</div><div class="property-stat-value">${formatMoney(property.rent)}</div></div>
        <div><div class="property-stat-label">Yield</div><div class="property-stat-value">${yieldVal}%</div></div>
        <div><div class="property-stat-label">Net</div><div class="property-stat-value ${summary >= 0 ? 'text-green' : 'text-red'}">${formatMoney(summary)}</div></div>
      </div>
    </div>
  `;
}

function renderProperties() {
  const properties = state.properties.filter(p => !p.archived);
  // Property comparison table
  const comparisonData = properties.map(p => ({
    name: p.name,
    rent: p.rent,
    yield: (p.rent * 12 / p.currentValue * 100).toFixed(1),
    roi: (state.transactions.filter(t => t.propertyId === p.id && t.type === 'income').reduce((s, t) => s + t.amount, 0) / p.purchasePrice * 100).toFixed(1),
    cashflow: p.rent - (p.mortgage || 0)
  })).sort((a, b) => parseFloat(b.yield) - parseFloat(a.yield));
  
  document.getElementById('main-content').innerHTML = `
    <div style="margin-bottom: 12px;"><button class="btn btn-primary" onclick="showAddProperty()">+ Add Property</button></div>

}

function showPropertyDetailByIndex(name) {

}

function renderCompliance() {
  const properties = state.properties.filter(p => !p.archived);
  const certs = state.certificates;
  
  const complianceItems = properties.map(property => {
    const propertyCerts = certs.filter(c => c.propertyId === property.id);
    const gasSafe = propertyCerts.some(c => c.type === 'Gas Safety' && new Date(c.expiryDate) > new Date());
    const eicr = propertyCerts.some(c => c.type === 'EICR' && new Date(c.expiryDate) > new Date());
    const epc = propertyCerts.some(c => c.type === 'EPC');
    const depositProtected = property.deposit > 0 && property.depositScheme;
    const rightToRent = property.rightToRentChecked || false;
    const howToRent = property.howToRentSent || false;
    const alarms = property.alarmsTested || false;
    
    const completed = [gasSafe, eicr, epc, depositProtected, rightToRent, howToRent, alarms].filter(Boolean).length;
    const score = (completed / 7) * 100;
    return { property, score, completed, gasSafe, eicr, epc, depositProtected, rightToRent, howToRent, alarms };
  });
  
  document.getElementById('main-content').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Overall Compliance</div><div class="metric-value">${(complianceItems.reduce((s, c) => s + c.score, 0) / complianceItems.length || 0).toFixed(0)}%</div><div class="metric-label">Portfolio average</div></div>
      <div class="metric-card"><div class="metric-label">Fully Compliant</div><div class="metric-value text-green">${complianceItems.filter(c => c.score === 100).length}</div><div class="metric-label">properties</div></div>
      <div class="metric-card"><div class="metric-label">Certificates</div><div class="metric-value">${certs.length}</div><div class="metric-label">total</div></div>
    </div>
    <div class="card-header"><div class="card-title">Certificates</div><button class="btn btn-secondary btn-sm" onclick="showAddCertificate()">+ Add Certificate</button></div>
    ${certs.map(cert => {
      const property = state.properties.find(p => p.id === cert.propertyId);
      const daysLeft = Math.ceil((new Date(cert.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
      const statusClass = daysLeft < 0 ? 'due-urgent' : daysLeft < 60 ? 'due-soon' : 'due-ok';
      const statusText = daysLeft < 0 ? 'Expired' : daysLeft < 60 ? `${daysLeft} days left` : 'Valid';
      return `
        <div class="compliance-item">
          <div class="compliance-status ${daysLeft > 0 ? 'ok' : 'missing'}">${daysLeft > 0 ? '✓' : '⚠'}</div>
          <div class="compliance-details">
            <div class="compliance-name">${escapeHtml(cert.type)} - ${property ? escapeHtml(property.name) : 'Unknown'}</div>
            <div class="compliance-meta">Issued: ${formatDate(cert.issueDate)} • Expires: ${formatDate(cert.expiryDate)} • ${escapeHtml(cert.issuer || '')}</div>
          </div>
          <div class="compliance-due ${statusClass}">${statusText}</div>
          <button class="icon-btn-sm" onclick="editCertificate('${escapeJs(cert.id)}')" title="Edit">✎</button>
          <button class="icon-btn-sm" onclick="deleteCertificate('${escapeJs(cert.id)}')" title="Delete">✕</button>
        </div>
      `;
    }).join('')}
    ${certs.length === 0 ? '<div class="text-center" style="padding: 20px;">No certificates added yet</div>' : ''}
    <div class="card-header mt-3"><div class="card-title">Property Compliance</div></div>
    ${complianceItems.map(({property, score, completed, gasSafe, eicr, epc, depositProtected, rightToRent, howToRent, alarms}) => `
      <div class="card">
        <div class="flex justify-between items-center mb-2">
          <div class="card-title">${escapeHtml(property.name)}</div>
          <div class="compliance-due ${score === 100 ? 'due-ok' : score >= 50 ? 'due-soon' : 'due-urgent'}">${score.toFixed(0)}%</div>
        </div>
        <div style="height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 12px;"><div style="width: ${score}%; height: 100%; background: ${score === 100 ? 'var(--green)' : score >= 50 ? 'var(--amber)' : 'var(--red)'}; transition: width 0.3s;"></div></div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px;">
          <div class="flex items-center gap-2"><div class="compliance-status ${gasSafe ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${gasSafe ? '✓' : '✗'}</div><span style="font-size: 13px;">Gas Safety</span></div>
          <div class="flex items-center gap-2"><div class="compliance-status ${eicr ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${eicr ? '✓' : '✗'}</div><span style="font-size: 13px;">EICR</span></div>
          <div class="flex items-center gap-2"><div class="compliance-status ${epc ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${epc ? '✓' : '✗'}</div><span style="font-size: 13px;">EPC</span></div>
          <div class="flex items-center gap-2"><div class="compliance-status ${depositProtected ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${depositProtected ? '✓' : '✗'}</div><span style="font-size: 13px;">Deposit</span></div>
          <div class="flex items-center gap-2"><div class="compliance-status ${rightToRent ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${rightToRent ? '✓' : '✗'}</div><span style="font-size: 13px;">Right to Rent</span></div>
          <div class="flex items-center gap-2"><div class="compliance-status ${howToRent ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${howToRent ? '✓' : '✗'}</div><span style="font-size: 13px;">How to Rent</span></div>
          <div class="flex items-center gap-2"><div class="compliance-status ${alarms ? 'ok' : 'missing'}" style="width: 24px; height: 24px; font-size: 12px;">${alarms ? '✓' : '✗'}</div><span style="font-size: 13px;">Smoke Alarms</span></div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderCalendar() {
  const today = new Date();
  const firstDay = new Date(currentCalendarYear, currentCalendarMonth, 1);
  const lastDay = new Date(currentCalendarYear, currentCalendarMonth + 1, 0);
  const startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
  const daysInMonth = lastDay.getDate();
  
  const events = [];
  state.certificates.forEach(cert => {
    if (cert.expiryDate) events.push({ date: cert.expiryDate, title: `${cert.type} expires`, property: state.properties.find(p => p.id === cert.propertyId)?.name });
  });
  state.properties.forEach(p => {
    if (p.leaseEnd && p.leaseEnd !== '—') events.push({ date: p.leaseEnd, title: 'Lease ends', property: p.name });
    if (p.lastInspection) {
      const next = new Date(p.lastInspection);
      next.setMonth(next.getMonth() + 6);
      events.push({ date: next.toISOString().split('T')[0], title: 'Inspection due', property: p.name });
    }
  });
  
  const days = [];
  for (let i = 0; i < startOffset; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) {
    const dateStr = `${currentCalendarYear}-${String(currentCalendarMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    days.push({ date: i, dateStr, hasEvent: events.some(e => e.date === dateStr) });
  }
  
  document.getElementById('main-content').innerHTML = `
    <div class="card">
      <div class="flex justify-between items-center mb-3">
        <div class="card-title" style="font-size: 18px; text-transform: none;">${new Date(currentCalendarYear, currentCalendarMonth).toLocaleString('default', { month: 'long', year: 'numeric' })}</div>
        <div class="flex gap-2"><button class="btn btn-secondary btn-sm" onclick="prevMonth()">←</button><button class="btn btn-secondary btn-sm" onclick="nextMonth()">→</button></div>
      </div>
      <div class="calendar-grid">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => `<div class="calendar-day">${d}</div>`).join('')}</div>
      <div class="calendar-grid">${days.map(day => day ? `<div class="calendar-date ${day.hasEvent ? 'has-event' : ''} ${day.date === today.getDate() && currentCalendarMonth === today.getMonth() && currentCalendarYear === today.getFullYear() ? 'today' : ''}" onclick="showDayEvents('${day.dateStr}')">${day.date}</div>` : `<div></div>`).join('')}</div>
    </div>
    <div class="card"><div class="card-title">Upcoming Events</div>${events.filter(e => new Date(e.date) >= new Date()).slice(0, 5).map(e => `<div class="compliance-item"><div class="compliance-status warning">📅</div><div class="compliance-details"><div class="compliance-name">${escapeHtml(e.title)}</div><div class="compliance-meta">${escapeHtml(e.property || '')} • ${formatDate(e.date)}</div></div></div>`).join('') || '<div class="text-center" style="padding: 20px;">No upcoming events</div>'}</div>
  `;
}

function showDayEvents(dateStr) {
  const events = [];
  state.certificates.forEach(cert => { if (cert.expiryDate === dateStr) events.push({ title: `${cert.type} expires`, property: state.properties.find(p => p.id === cert.propertyId)?.name }); });
  state.properties.forEach(p => { if (p.leaseEnd === dateStr) events.push({ title: 'Lease ends', property: p.name }); });
  showSheet(`Events for ${formatDate(dateStr)}`, events.map(e => `<div class="compliance-item"><div class="compliance-status warning">📅</div><div class="compliance-details"><div class="compliance-name">${escapeHtml(e.title)}</div><div class="compliance-meta">${escapeHtml(e.property || '')}</div></div></div>`).join('') || '<div class="text-center" style="padding: 20px;">No events</div>');
}

function prevMonth() { currentCalendarMonth--; if (currentCalendarMonth < 0) { currentCalendarMonth = 11; currentCalendarYear--; } renderAll(); }
function nextMonth() { currentCalendarMonth++; if (currentCalendarMonth > 11) { currentCalendarMonth = 0; currentCalendarYear++; } renderAll(); }

  const transactions = [...state.transactions].sort((a, b) => b.date.localeCompare(a.date));
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);

function showSheet(title, contentHtml, onConfirm = null) {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  const sheetContent = document.getElementById('sheet-content');
  if (!sheet || !overlay || !sheetContent) return;
  
  sheetContent.innerHTML = `<div class="sheet-title">${escapeHtml(title)}</div>${contentHtml}<div class="flex gap-2" style="margin-top: 20px;"><button class="btn btn-secondary" onclick="closeSheet()">Cancel</button>${onConfirm ? `<button class="btn btn-primary" id="sheet-confirm-btn">Confirm</button>` : ''}</div>`;
  sheet.classList.add('open');
  overlay.classList.add('open');
  if (onConfirm) {
    const confirmBtn = document.getElementById('sheet-confirm-btn');
    if (confirmBtn) confirmBtn.onclick = onConfirm;
  }
}

function closeSheet() {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  if (sheet) sheet.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
}

function navigate(screen) {
  currentScreen = screen;
  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.dataset.nav === screen) item.classList.add('active');
    else item.classList.remove('active');
  });
  renderAll();
}

  showSheet('Add Certificate', `
    <div class="form-group"><label class="form-label">Property</label><select id="cert-prop" class="form-select">${propOptions}</select></div>
    <div class="form-group"><label class="form-label">Certificate Type</label><select id="cert-type" class="form-select"><option value="Gas Safety">Gas Safety</option><option value="EPC">EPC</option><option value="EICR">EICR</option><option value="PAT Testing">PAT Testing</option><option value="Legionella">Legionella</option><option value="Other">Other</option></select></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Issue Date</label><input type="date" id="cert-issue" class="form-input"></div>
    <div class="form-group"><label class="form-label">Expiry Date</label><input type="date" id="cert-expiry" class="form-input"></div></div>
    <div class="form-group"><label class="form-label">Issuer</label><input type="text" id="cert-issuer" class="form-input"></div>
    <div id="cert-epc-wrap" style="display:none"><div class="form-group"><label class="form-label">EPC Rating</label><select id="cert-epc-rating" class="form-select"><option value="">— Select —</option>${['A','B','C','D','E','F','G'].map(r => `<option value="${r}">${r}</option>`).join('')}</select></div></div>
  `, () => {
    const type = document.getElementById('cert-type').value;
    state.certificates.push({ id: generateId(), propertyId: document.getElementById('cert-prop').value, type, issueDate: document.getElementById('cert-issue').value, expiryDate: document.getElementById('cert-expiry').value, issuer: document.getElementById('cert-issuer').value, epcRating: type === 'EPC' ? document.getElementById('cert-epc-rating').value : undefined });
    saveState();
    closeSheet();
    showToast('Certificate added');
    renderAll();
  });
  
  document.getElementById('cert-type').addEventListener('change', function() {
    const wrap = document.getElementById('cert-epc-wrap');
    if (wrap) wrap.style.display = this.value === 'EPC' ? 'block' : 'none';
  });
}

function showAddTransaction() { showQuickExpense(); }

function showPropertyDetail(id) {
  const p = state.properties.find(p => p.id === id);
  if (!p) return;
  const summary = state.transactions.filter(t => t.propertyId === id).reduce((s, t) => s + (t.type === 'income' ? t.amount : -t.amount), 0);
  const maintenance = state.maintenance.filter(m => m.propertyId === id && m.status === 'open');
  const certs = state.certificates.filter(c => c.propertyId === id);
  
  showSheet(p.name, `
    <div class="metrics-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="metric-card"><div class="metric-label">Monthly rent</div><div class="metric-value">${formatMoney(p.rent)}</div></div>
      <div class="metric-card"><div class="metric-label">Net income</div><div class="metric-value ${summary >= 0 ? 'text-green' : 'text-red'}">${formatMoney(summary)}</div></div>
    </div>
    <div class="card"><div class="card-title">Property Details</div>
      <div><strong>Address:</strong> ${escapeHtml(p.address)}</div>
      <div><strong>Tenant:</strong> ${escapeHtml(p.tenant)}</div>
      <div><strong>Lease:</strong> ${p.leaseStart} → ${p.leaseEnd}</div>
      <div><strong>Lender:</strong> ${escapeHtml(p.lender)}</div>
      <div><strong>Mortgage:</strong> ${formatMoney(p.mortgage)}/mo</div>
      ${p.deposit > 0 ? `<div><strong>Deposit:</strong> ${formatMoney(p.deposit)} (${p.depositScheme || 'No scheme'})</div>` : ''}
    </div>
    ${certs.length > 0 ? `<div class="card"><div class="card-title">Certificates</div>${certs.map(c => `<div class="flex justify-between items-center" style="padding: 8px 0;"><span>${escapeHtml(c.type)}</span><span>Expires: ${formatDate(c.expiryDate)}</span></div>`).join('')}</div>` : ''}
    ${maintenance.length > 0 ? `<div class="card"><div class="card-title">🔧 Open Issues</div>${maintenance.map(m => `<div class="flex justify-between items-center" style="padding: 8px 0;"><span>${escapeHtml(m.description)}</span><span class="compliance-due due-soon">${m.priority}</span></div>`).join('')}</div>` : ''}
    <div class="flex gap-2"><button class="btn btn-secondary" onclick="editProperty('${escapeJs(id)}'); closeSheet();">Edit Property</button><button class="btn btn-secondary" onclick="showQuickExpenseForProperty('${escapeJs(id)}'); closeSheet();">Add Expense</button></div>
  `);
}

function showQuickExpenseForProperty(propertyId) {
  setTimeout(() => {
    const propOptions = state.properties.map(p => `<option value="${p.id}" ${p.id === propertyId ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('');
    showSheet('Add Expense', `
      <div class="form-group"><label class="form-label">Property</label><select id="expense-prop" class="form-select">${propOptions}</select></div>
      <div class="form-group"><label class="form-label">Amount (£)</label><input type="number" id="expense-amount" class="form-input" step="0.01"></div>
      <div class="form-group"><label class="form-label">Description</label><input type="text" id="expense-desc" class="form-input"></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Date</label><input type="date" id="expense-date" class="form-input" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label class="form-label">Category</label><select id="expense-cat" class="form-select"><option value="repairs">Repairs</option><option value="insurance">Insurance</option><option value="other">Other</option></select></div></div>
    `, () => {
      const amount = parseFloat(document.getElementById('expense-amount').value);
      const description = document.getElementById('expense-desc').value;
      if (!amount || !description) { showToast('Fill all fields', true); return; }
      state.transactions.push({ id: generateId(), date: document.getElementById('expense-date').value, type: 'expense', description, propertyId, amount, category: document.getElementById('expense-cat').value });
      saveState();
      closeSheet();
      showToast('Expense added');
      renderAll();
    });
  }, 100);
}

function showSearch() {
  const properties = state.properties;
  showSheet('Search', `
    <div class="form-group"><input type="text" id="searchInput" class="form-input" placeholder="Search properties..." oninput="performSearch(this.value)"></div>
    <div id="searchResults">${properties.slice(0, 5).map(p => `<div class="property-item" style="margin-bottom: 8px; cursor: pointer;" onclick="showPropertyDetail('${escapeJs(p.id)}'); closeSheet();"><div style="padding: 12px;"><div class="property-name">${escapeHtml(p.name)}</div><div class="metric-label">${escapeHtml(p.address)}</div></div></div>`).join('')}</div>
  `);
}

function performSearch(query) {
  if (!query || !query.trim()) return;
  const results = state.properties.filter(p => p.name.toLowerCase().includes(query.toLowerCase()) || p.address.toLowerCase().includes(query.toLowerCase()));
  const resultsDiv = document.getElementById('searchResults');
  if (resultsDiv) {
    resultsDiv.innerHTML = results.map(p => `<div class="property-item" style="margin-bottom: 8px; cursor: pointer;" onclick="showPropertyDetail('${escapeJs(p.id)}'); closeSheet();"><div style="padding: 12px;"><div class="property-name">${escapeHtml(p.name)}</div><div class="metric-label">${escapeHtml(p.address)}</div></div></div>`).join('') || '<div class="text-center" style="padding: 20px;">No results found</div>';
  }
}

function showSettings() {
  showSheet('Settings', `
    <div class="card"><div class="card-title">Google Drive</div>
      ${!gAccessToken ? '<button class="btn btn-primary" onclick="signIn(); closeSheet();">🔐 Sign in to Drive</button>' : '<button class="btn btn-secondary" onclick="signOut(); closeSheet();">🚪 Sign out of Drive</button>'}
    </div>
    <div class="card"><div class="card-title">Data Management</div>
      <button class="btn btn-secondary mb-2" onclick="exportData()">📤 Export Data</button>
      <button class="btn btn-secondary mb-2" onclick="exportBackup()">💾 Create Backup</button>
      <button class="btn btn-danger" onclick="confirmReset()">⚠️ Reset All Data</button>
    </div>
    <div class="card"><div class="card-title">About</div>
      <div class="metric-label">Version 2.0 - Complete Edition</div>
      <div class="metric-label">Data stored locally and optionally in Google Drive</div>
    </div>
  `);
}

function showQuickActions() {
  showSheet('Quick Actions', `
    <button class="btn btn-primary mb-2" onclick="showQuickExpense(); closeSheet();">💰 Add Expense</button>
    <button class="btn btn-primary mb-2" onclick="showQuickIncome(); closeSheet();">📈 Add Income</button>
    <button class="btn btn-primary mb-2" onclick="showQuickMaintenance(); closeSheet();">🔧 Log Maintenance</button>
    <button class="btn btn-primary mb-2" onclick="showAddCertificate(); closeSheet();">📋 Add Certificate</button>
    <button class="btn btn-primary" onclick="showAddProperty(); closeSheet();">🏠 Add Property</button>
  `);
}

function exportData() {
  const dataToExport = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance, certificates: state.certificates };
  const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `portfolio-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Data exported');
}

function exportBackup() {
  const backup = { timestamp: new Date().toISOString(), version: '2.0', data: state };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Backup created');
}

function confirmReset() {
  closeSheet();
  setTimeout(() => {
    if (confirm('⚠️ WARNING: This will delete ALL your data.\n\nProperties, transactions, maintenance records, certificates, and all other data will be permanently deleted.\n\nThis action cannot be undone. Are you absolutely sure?')) {
      localStorage.clear();
      showToast('Data reset. Refreshing...');
      setTimeout(() => location.reload(), 1000);
    }
  }, 100);
}

// ============================================
// INITIALIZATION
// ============================================
window.onload = function() {
  loadLocalData();
  renderAll();
  checkGoogleReady();
  
  // Expose functions globally
  window.navigate = navigate;
  window.closeSheet = closeSheet;
  window.showQuickExpense = showQuickExpense;
  window.showQuickIncome = showQuickIncome;
  window.showQuickMaintenance = showQuickMaintenance;
  window.showAddProperty = showAddProperty;
  window.showAddTransaction = showAddTransaction;
  window.showAddCertificate = showAddCertificate;
  window.showPropertyDetail = showPropertyDetail;
  window.showSearch = showSearch;
  window.showSettings = showSettings;
  window.showQuickActions = showQuickActions;
  window.exportData = exportData;
  window.exportBackup = exportBackup;
  window.confirmReset = confirmReset;
  window.signIn = signIn;
  window.signOut = signOut;
  window.editProperty = editProperty;
  window.editTransaction = editTransaction;
  window.editMaintenance = editMaintenance;
  window.editCertificate = editCertificate;
  window.deleteProperty = deleteProperty;
  window.deleteTransaction = deleteTransaction;
  window.deleteMaintenance = deleteMaintenance;
  window.deleteCertificate = deleteCertificate;
  window.showQuickExpenseForProperty = showQuickExpenseForProperty;
  window.performSearch = performSearch;
  window.prevMonth = prevMonth;
  window.nextMonth = nextMonth;
  window.showDayEvents = showDayEvents;
};
</script>
