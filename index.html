<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface2: #F2F2F5;
  --border: #E5E5EA;
  --text: #1C1C1E;
  --text2: #6C6C70;
  --text3: #8E8E93;
  --green: #28A745;
  --green-bg: #E8F5E9;
  --red: #DC3545;
  --red-bg: #FEE8E9;
  --amber: #FFC107;
  --amber-bg: #FFF8E1;
  --blue: #007AFF;
  --blue-bg: #E8F0FE;
  --radius-sm: 10px;
  --radius: 14px;
  --nav-h: 70px;
}
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
#app { display: flex; flex-direction: column; min-height: 100vh; }
.app-header { position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
.app-header h1 { font-size: 22px; font-weight: 600; }
.header-actions { display: flex; gap: 12px; }
.icon-button { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--surface2); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.icon-button:active { transform: scale(0.94); }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 0.5px solid var(--border); display: flex; padding: 8px 16px 20px; gap: 8px; z-index: 100; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border: none; background: none; cursor: pointer; border-radius: 12px; color: var(--text3); transition: all 0.1s; }
.nav-item:active { transform: scale(0.94); background: var(--surface2); }
.nav-item.active { color: var(--blue); background: var(--blue-bg); }
.nav-icon { font-size: 24px; }
.nav-label { font-size: 11px; font-weight: 500; }
.main-content { flex: 1; padding: 16px; padding-bottom: calc(var(--nav-h) + 16px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 0.5px solid var(--border); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric-card { background: var(--surface); border-radius: var(--radius); padding: 14px; border: 0.5px solid var(--border); }
.metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
.quick-action { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; cursor: pointer; }
.quick-action:active { transform: scale(0.96); background: var(--surface2); }
.quick-action-icon { font-size: 24px; margin-bottom: 4px; }
.quick-action-label { font-size: 11px; font-weight: 500; }
.property-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; cursor: pointer; }
.property-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.property-color { width: 12px; height: 12px; border-radius: 50%; }
.property-name { flex: 1; font-weight: 600; font-size: 16px; }
.property-status { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.status-let { background: var(--green-bg); color: var(--green); }
.status-vacant { background: var(--amber-bg); color: #856404; }
.property-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
.property-stat-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.property-stat-value { font-size: 14px; font-weight: 600; }
.txn-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.txn-details { flex: 1; }
.txn-desc { font-weight: 500; font-size: 14px; }
.txn-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.txn-amount { font-weight: 600; font-size: 15px; margin-right: 12px; }
.txn-income { color: var(--green); }
.txn-expense { color: var(--red); }
.txn-actions { display: flex; gap: 8px; }
.icon-btn-sm { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); z-index: 1000; max-height: 85vh; overflow-y: auto; }
.bottom-sheet.open { transform: translateY(0); }
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; display: none; }
.sheet-overlay.open { display: block; }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto; }
.sheet-content { padding: 8px 20px 32px; }
.sheet-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.form-input, .form-select { width: 100%; padding: 14px; border: 0.5px solid var(--border); border-radius: 12px; font-size: 16px; font-family: inherit; background: var(--surface); }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; width: 100%; }
.btn:active { opacity: 0.7; transform: scale(0.98); }
.btn-primary { background: var(--blue); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }
.btn-danger { background: var(--red-bg); color: var(--red); }
.login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 32px; }
.login-card { background: var(--surface); border-radius: 24px; padding: 40px 28px; text-align: center; max-width: 320px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
.login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.login-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.toast { position: fixed; bottom: 80px; left: 16px; right: 16px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: white; padding: 12px 16px; border-radius: 30px; text-align: center; font-size: 14px; z-index: 1500; animation: slideUp 0.3s ease; pointer-events: none; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.flex { display: flex; }
.gap-2 { gap: 8px; }
.mt-2 { margin-top: 8px; }
.text-center { text-align: center; }
</style>

      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

<script>
// ============================================
// ORIGINAL WORKING OAuth PATTERN
// ============================================
const CLIENT_ID = '434046440829-4kr09lbdl6u5eu03h92g5obb12nc72fd.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DATA_FILENAME = 'portfolio-data.json';
const DRIVE_FOLDER_NAME = 'Property Portfolio';

let gAccessToken = null;
let gDriveDataFileId = null;
let gDriveFolderIds = {};

// ============================================
// UTILITIES
// ============================================
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 8); }
function formatMoney(amount) { return '£' + Math.abs(amount).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function formatDate(dateStr) { if (!dateStr || dateStr === '—') return '—'; const d = new Date(dateStr); return d.toLocaleDateString('en-GB'); }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
function escapeJs(str) { if (!str) return ''; return str.replace(/['"\\]/g, '\\$&'); }

function showToast(msg, isError) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  if (isError) toast.style.background = 'rgba(220,53,69,0.9)';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============================================
// GOOGLE DRIVE FUNCTIONS - ORIGINAL WORKING PATTERN
// ============================================
function signIn() {
  const btn = document.getElementById('signin-btn');
  const statusDiv = document.getElementById('login-status');
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
  if (statusDiv) statusDiv.textContent = '';
  
  if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
    if (statusDiv) { statusDiv.textContent = 'Google library not loaded. Refresh the page.'; statusDiv.style.color = 'var(--red)'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    return;
  }
  
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        if (statusDiv) { statusDiv.textContent = 'Error: ' + resp.error; statusDiv.style.color = 'var(--red)'; }
        if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
        showToast('Sign in failed: ' + resp.error, true);
        return;
      }
      gAccessToken = resp.access_token;
      document.getElementById('login-screen').style.display = 'none';
      showToast('Loading from Drive...');
      await initDrive();
      renderAll();
    }
  });
  client.requestAccessToken();
}

function signOut() {
  if (gAccessToken && google.accounts) google.accounts.oauth2.revoke(gAccessToken);
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = {};
  document.getElementById('login-screen').style.display = 'flex';
  showToast('Signed out');
}

async function driveRequest(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers || {}) }
  });
  if (!res.ok) throw new Error(`Drive API ${res.status}`);
  return res.json();
}

async function findOrCreateFolder(name, parentId) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if (result.files && result.files.length > 0) return result.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function initDrive() {
  try {
    const rootId = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
    gDriveFolderIds.root = rootId;
    const q = `name='${DATA_FILENAME}' and '${rootId}' in parents and trashed=false`;
    const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
    
    if (result.files && result.files.length > 0) {
      gDriveDataFileId = result.files[0].id;
      const data = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveDataFileId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + gAccessToken }
      }).then(r => r.json());
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
      showToast('✓ Loaded from Drive');
    } else {
      showToast('✓ New portfolio created');
      await saveToDrive();
    }
  } catch (e) {
    console.error('Drive init error:', e);
    showToast('⚠ Drive error — using local data', true);
  }
  renderAll();
}

async function saveToDrive() {
  if (!gAccessToken) return;
  const data = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  try {
    if (gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DATA_FILENAME, parents: [gDriveFolderIds.root || 'root'] })], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      const created = await res.json();
      gDriveDataFileId = created.id;
    }
  } catch (e) {
    console.error('Drive save error:', e);
  }
}

// ============================================
// DATA STATE
// ============================================
let state = {
  properties: [
    { id: 'p1', name: 'Maple Lodge', address: '14 Maple Close, Manchester', status: 'let', color: '#28A745', rent: 1450, purchasePrice: 215000, currentValue: 240000, mortgage: 680, lender: 'Nationwide', tenant: 'James Carter', tenantEmail: 'james@example.com', tenantPhone: '07891 123456', leaseStart: '2024-02-01', leaseEnd: '2025-01-31', deposit: 2175, depositScheme: 'DPS', agent: 'Kepler Lettings', agentPhone: '0161 900 1234', gasEngineer: 'Mike Bowen Gas', electrician: 'JS Electrical', createdAt: '2024-01-01', archived: false },
    { id: 'p2', name: 'Birchwood House', address: '7 Birchwood Ave, Manchester', status: 'let', color: '#007AFF', rent: 1800, purchasePrice: 285000, currentValue: 310000, mortgage: 920, lender: 'Halifax', tenant: 'Sunita Patel', tenantEmail: 'sunita@example.com', tenantPhone: '07834 987654', leaseStart: '2023-09-01', leaseEnd: '2024-08-31', deposit: 2700, depositScheme: 'TDS', agent: 'Direct let', agentPhone: '', gasEngineer: 'Greenfield Gas', electrician: 'NW Electric', createdAt: '2023-08-01', archived: false },
    { id: 'p3', name: 'Thornton House', address: '22 Thornton Rd, Salford', status: 'vacant', color: '#FFC107', rent: 1000, purchasePrice: 175000, currentValue: 195000, mortgage: 540, lender: 'Barclays', tenant: '—', tenantEmail: '', tenantPhone: '', leaseStart: '—', leaseEnd: '—', deposit: 0, depositScheme: '', agent: 'Salford Lettings Co', agentPhone: '0161 700 5678', gasEngineer: 'City Gas', electrician: 'PowerRight', createdAt: '2023-12-01', archived: false }
  ],
  transactions: [
    { id: 't1', date: '2025-04-01', type: 'income', description: 'Monthly rent - April', propertyId: 'p1', amount: 1450, category: 'rent' },
    { id: 't2', date: '2025-04-01', type: 'income', description: 'Monthly rent - April', propertyId: 'p2', amount: 1800, category: 'rent' },
    { id: 't3', date: '2025-04-04', type: 'expense', description: 'Leaking tap repair', propertyId: 'p1', amount: 120, category: 'repairs' },
    { id: 't4', date: '2025-03-25', type: 'expense', description: 'Buildings insurance', propertyId: 'p2', amount: 380, category: 'insurance' }
  ],
  maintenance: [
    { id: 'm1', propertyId: 'p1', description: 'Leaking bathroom tap', date: '2025-04-04', status: 'open', priority: 'medium', cost: 0 },
    { id: 'm2', propertyId: 'p2', description: 'Damp patch in bedroom', date: '2025-02-20', status: 'open', priority: 'high', cost: 0 }
  ],
  certificates: []
};

function saveState() {
  localStorage.setItem('portfolio_data', JSON.stringify(state));
  if (gAccessToken) saveToDrive();
}

function loadLocalData() {
  try {
    const saved = localStorage.getItem('portfolio_data');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
    }
  } catch(e) { console.error('Load error:', e); }
}

// ============================================
// EDIT FUNCTIONS
// ============================================
function editProperty(propertyId) {
  const property = state.properties.find(p => p.id === propertyId);
  if (!property) return;
  
  showSheet('Edit Property', `
    <div class="form-group"><label class="form-label">Property Name</label><input type="text" id="edit-prop-name" class="form-input" value="${escapeHtml(property.name)}"></div>
    <div class="form-group"><label class="form-label">Address</label><input type="text" id="edit-prop-addr" class="form-input" value="${escapeHtml(property.address)}"></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Rent (£/mo)</label><input type="number" id="edit-prop-rent" class="form-input" value="${property.rent}"></div>
    <div class="form-group"><label class="form-label">Status</label><select id="edit-prop-status" class="form-select"><option value="let" ${property.status === 'let' ? 'selected' : ''}>Let</option><option value="vacant" ${property.status === 'vacant' ? 'selected' : ''}>Vacant</option></select></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Purchase Price (£)</label><input type="number" id="edit-prop-purchase" class="form-input" value="${property.purchasePrice}"></div>
    <div class="form-group"><label class="form-label">Current Value (£)</label><input type="number" id="edit-prop-value" class="form-input" value="${property.currentValue}"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Mortgage (£/mo)</label><input type="number" id="edit-prop-mortgage" class="form-input" value="${property.mortgage}"></div>
    <div class="form-group"><label class="form-label">Lender</label><input type="text" id="edit-prop-lender" class="form-input" value="${escapeHtml(property.lender)}"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Tenant Name</label><input type="text" id="edit-prop-tenant" class="form-input" value="${escapeHtml(property.tenant)}"></div>

// ============================================
// UI RENDERER
// ============================================
let currentScreen = 'overview';

function renderAll() {
  if (currentScreen === 'overview') renderOverview();
  else if (currentScreen === 'properties') renderProperties();
  else if (currentScreen === 'finance') renderFinance();
}

function renderOverview() {
  const properties = state.properties.filter(p => !p.archived);
  const totalRent = properties.reduce((s, p) => s + p.rent, 0);
  const totalValue = properties.reduce((s, p) => s + p.currentValue, 0);
  const income = state.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = state.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const activeMaintenance = state.maintenance.filter(m => m.status === 'open').length;
  
  document.getElementById('main-content').innerHTML = `
    <div class="quick-actions">
      <div class="quick-action" onclick="showQuickExpense()"><div class="quick-action-icon">💰</div><div class="quick-action-label">Expense</div></div>
      <div class="quick-action" onclick="showQuickIncome()"><div class="quick-action-icon">📈</div><div class="quick-action-label">Income</div></div>
      <div class="quick-action" onclick="showQuickMaintenance()"><div class="quick-action-icon">🔧</div><div class="quick-action-label">Maintenance</div></div>
      <div class="quick-action" onclick="showAddProperty()"><div class="quick-action-icon">🏠</div><div class="quick-action-label">Property</div></div>
    </div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Monthly rent</div><div class="metric-value">${formatMoney(totalRent)}</div><div class="metric-label">${properties.filter(p=>p.status==='let').length}/${properties.length} let</div></div>
      <div class="metric-card"><div class="metric-label">Portfolio value</div><div class="metric-value">${formatMoney(totalValue)}</div></div>
      <div class="metric-card"><div class="metric-label">Net profit</div><div class="metric-value ${income - expenses >= 0 ? 'text-green' : 'text-red'}">${formatMoney(income - expenses)}</div></div>
      <div class="metric-card"><div class="metric-label">Active issues</div><div class="metric-value ${activeMaintenance > 0 ? 'text-red' : 'text-green'}">${activeMaintenance}</div></div>
    </div>
    <div class="card-header"><div class="card-title">Properties</div><button class="btn btn-secondary" style="width: auto; padding: 6px 12px;" onclick="navigate('properties')">View all →</button></div>
    ${properties.slice(0, 3).map(p => renderPropertyCard(p)).join('')}
  `;
}

function renderPropertyCard(property) {
  const yieldVal = property.currentValue ? (property.rent * 12 / property.currentValue * 100).toFixed(1) : 0;
  return `
    <div class="property-item">
      <div class="property-header">
        <div class="property-color" style="background: ${property.color}"></div>
        <div class="property-name" onclick="showPropertyDetail('${escapeJs(property.id)}')">${escapeHtml(property.name)}</div>
        <span class="property-status status-${property.status}">${property.status === 'let' ? 'Let' : 'Vacant'}</span>
        <button class="icon-btn-sm" onclick="event.stopPropagation(); editProperty('${escapeJs(property.id)}')" title="Edit">✎</button>
      </div>
      <div class="property-stats" onclick="showPropertyDetail('${escapeJs(property.id)}')">
        <div><div class="property-stat-label">Rent</div><div class="property-stat-value">${formatMoney(property.rent)}</div></div>
        <div><div class="property-stat-label">Yield</div><div class="property-stat-value">${yieldVal}%</div></div>
        <div><div class="property-stat-label">Net</div><div class="property-stat-value">${formatMoney(property.rent - (property.mortgage || 0))}</div></div>
      </div>
    </div>
  `;
}

function renderProperties() {
  const properties = state.properties.filter(p => !p.archived);
  document.getElementById('main-content').innerHTML = `
    <div style="margin-bottom: 12px;"><button class="btn btn-primary" onclick="showAddProperty()">+ Add Property</button></div>
    ${properties.map(p => renderPropertyCard(p)).join('')}
  `;
}

function renderFinance() {
  const transactions = [...state.transactions].sort((a, b) => b.date.localeCompare(a.date));
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  
  document.getElementById('main-content').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Total income</div><div class="metric-value text-green">${formatMoney(income)}</div></div>
      <div class="metric-card"><div class="metric-label">Total expenses</div><div class="metric-value text-red">${formatMoney(expenses)}</div></div>
      <div class="metric-card"><div class="metric-label">Net profit</div><div class="metric-value ${income - expenses >= 0 ? 'text-green' : 'text-red'}">${formatMoney(income - expenses)}</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Transactions</div><button class="btn btn-secondary" style="width: auto; padding: 6px 12px;" onclick="showAddTransaction()">+ Add</button></div>
      ${transactions.map(t => renderTransactionRow(t)).join('')}
      ${transactions.length === 0 ? '<div class="text-center" style="padding: 20px;">No transactions yet</div>' : ''}
    </div>
  `;
}

function renderTransactionRow(t) {
  const property = state.properties.find(p => p.id === t.propertyId);
  return `
    <div class="txn-item">
      <div class="txn-details">
        <div class="txn-desc">${escapeHtml(t.description)}</div>
        <div class="txn-meta">${formatDate(t.date)} • ${property ? escapeHtml(property.name) : 'Unknown'} • ${escapeHtml(t.category)}</div>
      </div>
      <div class="txn-amount ${t.type === 'income' ? 'txn-income' : 'txn-expense'}">${t.type === 'expense' ? '-' : ''}${formatMoney(t.amount)}</div>
      <div class="txn-actions">
        <button class="icon-btn-sm" onclick="editTransaction('${escapeJs(t.id)}')">✎</button>
        <button class="icon-btn-sm" onclick="deleteTransaction('${escapeJs(t.id)}')">✕</button>
      </div>
    </div>
  `;
}

// ============================================
// MODAL & ACTIONS
// ============================================
function showSheet(title, contentHtml, onConfirm = null) {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  const sheetContent = document.getElementById('sheet-content');
  if (!sheet || !overlay || !sheetContent) return;
  
  sheetContent.innerHTML = `<div class="sheet-title">${escapeHtml(title)}</div>${contentHtml}<div class="flex gap-2" style="margin-top: 20px;"><button class="btn btn-secondary" onclick="closeSheet()">Cancel</button>${onConfirm ? `<button class="btn btn-primary" id="sheet-confirm-btn">Confirm</button>` : ''}</div>`;
  sheet.classList.add('open');
  overlay.classList.add('open');
  if (onConfirm) {
    const confirmBtn = document.getElementById('sheet-confirm-btn');
    if (confirmBtn) confirmBtn.onclick = onConfirm;
  }
}

function closeSheet() {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  if (sheet) sheet.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
}

function navigate(screen) {
  currentScreen = screen;
  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.dataset.nav === screen) item.classList.add('active');
    else item.classList.remove('active');
  });
  renderAll();
}

      const description = document.getElementById('expense-desc').value;
      if (!amount || !description) { showToast('Fill all fields', true); return; }
      state.transactions.push({ id: generateId(), date: document.getElementById('expense-date').value, type: 'expense', description, propertyId, amount, category: document.getElementById('expense-cat').value });
      saveState();
      closeSheet();
      showToast('Expense added');
      renderAll();
    });
  }, 100);
}

function showSearch() {
  const properties = state.properties;
  showSheet('Search', `
    <div class="form-group"><input type="text" id="searchInput" class="form-input" placeholder="Search properties..." oninput="performSearch(this.value)"></div>
    <div id="searchResults">${properties.slice(0, 5).map(p => `<div class="property-item" style="margin-bottom: 8px; cursor: pointer;" onclick="showPropertyDetail('${escapeJs(p.id)}'); closeSheet();"><div style="padding: 12px;"><div class="property-name">${escapeHtml(p.name)}</div><div class="metric-label">${escapeHtml(p.address)}</div></div></div>`).join('')}</div>
  `);
}

function performSearch(query) {
  if (!query || !query.trim()) return;
  const results = state.properties.filter(p => p.name.toLowerCase().includes(query.toLowerCase()) || p.address.toLowerCase().includes(query.toLowerCase()));
  const resultsDiv = document.getElementById('searchResults');
  if (resultsDiv) {
    resultsDiv.innerHTML = results.map(p => `<div class="property-item" style="margin-bottom: 8px; cursor: pointer;" onclick="showPropertyDetail('${escapeJs(p.id)}'); closeSheet();"><div style="padding: 12px;"><div class="property-name">${escapeHtml(p.name)}</div><div class="metric-label">${escapeHtml(p.address)}</div></div></div>`).join('') || '<div class="text-center" style="padding: 20px;">No results found</div>';
  }
}

function showSettings() {
  showSheet('Settings', `
    <div class="card"><div class="card-title">Google Drive</div>
      ${!gAccessToken ? '<button class="btn btn-primary" onclick="signIn(); closeSheet();">🔐 Sign in to Drive</button>' : '<button class="btn btn-secondary" onclick="signOut(); closeSheet();">🚪 Sign out of Drive</button>'}
    </div>
    <div class="card"><div class="card-title">Data Management</div>
      <button class="btn btn-secondary mb-2" onclick="exportData()">📤 Export Data</button>
      <button class="btn btn-danger" onclick="confirmReset()">⚠️ Reset All Data</button>
    </div>
  `);
}

function showQuickActions() {
  showSheet('Quick Actions', `
    <button class="btn btn-primary mb-2" onclick="showQuickExpense(); closeSheet();">💰 Add Expense</button>
    <button class="btn btn-primary mb-2" onclick="showQuickIncome(); closeSheet();">📈 Add Income</button>
    <button class="btn btn-primary mb-2" onclick="showQuickMaintenance(); closeSheet();">🔧 Log Maintenance</button>
    <button class="btn btn-primary" onclick="showAddProperty(); closeSheet();">🏠 Add Property</button>
  `);
}

function exportData() {
  const dataToExport = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance, certificates: state.certificates };
  const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `portfolio-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Data exported');
}

function confirmReset() {
  closeSheet();
  setTimeout(() => {
    if (confirm('⚠️ WARNING: This will delete ALL your data.\n\nThis action cannot be undone. Are you absolutely sure?')) {
      localStorage.clear();
      showToast('Data reset. Refreshing...');
      setTimeout(() => location.reload(), 1000);
    }
  }, 100);
}

// ============================================
// INITIALIZATION
// ============================================
window.onload = function() {
  loadLocalData();
  renderAll();
  
  window.navigate = navigate;
  window.closeSheet = closeSheet;
  window.showQuickExpense = showQuickExpense;
  window.showQuickIncome = showQuickIncome;
  window.showQuickMaintenance = showQuickMaintenance;
  window.showAddProperty = showAddProperty;
  window.showAddTransaction = showAddTransaction;
  window.showPropertyDetail = showPropertyDetail;
  window.showSearch = showSearch;
  window.showSettings = showSettings;
  window.showQuickActions = showQuickActions;
  window.exportData = exportData;
  window.confirmReset = confirmReset;
  window.signIn = signIn;
  window.signOut = signOut;
  window.editProperty = editProperty;
  window.editTransaction = editTransaction;
  window.editMaintenance = editMaintenance;
  window.deleteProperty = deleteProperty;
  window.deleteTransaction = deleteTransaction;
  window.deleteMaintenance = deleteMaintenance;
  window.showQuickExpenseForProperty = showQuickExpenseForProperty;
  window.performSearch = performSearch;
};
</script>
</body>
</html>
