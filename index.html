// UNIFIED DOCUMENT MANAGEMENT (Main Docs Tab)
// ============================================
let pendingUploadData = null;

function renderUnifiedDocs() {
  const allDocs = [];
  state.props.forEach(prop => {
    if(prop.docs && prop.docs.length) {
      prop.docs.forEach(doc => {
        allDocs.push({ ...doc, propertyName: prop.name, propertyId: prop.id, source: 'prop' });
      });
    }
  });
  state.certs.forEach(cert => {
    if(cert.docData) {
      const prop = getProp(cert.propId);
      allDocs.push({ id: cert.id, name: `${cert.type} Certificate`, category: 'Certificates', date: cert.issueDate, propertyName: prop?.name || 'Unknown', propertyId: cert.propId, source: 'cert', fileData: cert.docData, fileMime: cert.docMime });
    }
  });
  allDocs.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  const grouped = {};
  allDocs.forEach(doc => {
    if(!grouped[doc.propertyId]) grouped[doc.propertyId] = { name: doc.propertyName, docs: [] };
    grouped[doc.propertyId].docs.push(doc);
  });
  const propertyOptions = state.props.filter(p => !p.archived).map(p => `<option value="${p.id}" ${state.filterProp === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
  const docListHtml = Object.keys(grouped).length === 0 ? '<div class="empty"><div class="empty-icon">📁</div>No documents yet</div>' : Object.values(grouped).map(group => `<div style="margin-bottom:20px"><div class="section-label" style="margin:0 0 8px 0">${group.name}</div>${group.docs.map(doc => `<div class="info-row" style="cursor:pointer" onclick="openUnifiedDoc('${doc.propertyId}', '${doc.id}', '${doc.source}')"><div><div class="cert-name">${doc.name || 'Document'}</div><div class="cert-meta">${doc.category || 'Document'} · ${fmtDate(doc.date)}</div></div><button class="icon-btn" onclick="event.stopPropagation();deleteUnifiedDoc('${doc.propertyId}', '${doc.id}', '${doc.source}')">✕</button></div>`).join('')}</div>`).join('');
  
  document.getElementById('screen-docs').innerHTML = `<div class="section-label">📄 Unified Document Management</div><div class="card"><div class="form-field"><label>Property</label><select id="doc-property">${propertyOptions}</select></div><div class="form-field"><label>Category</label><select id="doc-category"><option value="Tenancy">🏠 Tenancy</option><option value="Certificates">✅ Certificates</option><option value="Receipts">💰 Receipts</option><option value="Ownership">📋 Ownership</option><option value="Other">📁 Other</option></select></div><div class="form-field"><label>Document Date</label><input type="date" id="doc-date" value="${new Date().toISOString().slice(0,10)}"></div><div class="form-field"><label>Description (optional)</label><input type="text" id="doc-label" placeholder="e.g. Tenancy agreement"></div><div class="upload-zone" onclick="document.getElementById('doc-file-input').click()"><p>📎 Tap to choose a file</p><span>PDF, JPG, or PNG</span></div><input type="file" id="doc-file-input" class="upload-input" accept=".pdf,.jpg,.jpeg,.png" onchange="prepareUnifiedUpload()"><div id="upload-status"></div></div><div class="section-label">📂 Document Library</div><div id="document-list">${docListHtml}</div>`;
}

function prepareUnifiedUpload() {
  const file = document.getElementById('doc-file-input').files[0];
  if(!file) return;
  const statusDiv = document.getElementById('upload-status');
  statusDiv.innerHTML = '<div class="loading-box"><span class="spinner"></span> Processing...</div>';
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingUploadData = { base64: e.target.result.split(',')[1], mime: file.type || 'application/pdf', name: file.name };
    uploadUnifiedDoc();
  };
  reader.readAsDataURL(file);
}

async function uploadUnifiedDoc() {
  if(!pendingUploadData) return;
  const propId = document.getElementById('doc-property').value;
  const category = document.getElementById('doc-category').value;
  const docDate = document.getElementById('doc-date').value;
  const label = document.getElementById('doc-label').value.trim();
  const statusDiv = document.getElementById('upload-status');
  const prop = getProp(propId);
  const roadName = prop.name.split(' ')[0];
  const dateStr = docDate.replace(/-/g, '').slice(2);
  const ext = pendingUploadData.mime === 'application/pdf' ? '.pdf' : (pendingUploadData.mime.includes('png') ? '.png' : '.jpg');
  const filename = `${roadName}_${dateStr}_${category}${label ? '_' + label.replace(/[^a-z0-9]/gi, '-') : ''}${ext}`;
  if(!prop.docs) prop.docs = [];
  prop.docs.push({ id: uid(), name: filename, category: category, date: docDate, label: label, fileData: pendingUploadData.base64, fileMime: pendingUploadData.mime, propertyId: propId });
  saveState('props');
  if(gAccessToken && gDriveFolderIds.root) {
    try {
      const folderName = roadName;
      let propFolderId = await findOrCreateFolder(folderName, gDriveFolderIds.root);
      let catFolderId = await findOrCreateFolder(category, propFolderId);
      const bytes = atob(pendingUploadData.base64);
      const byteArray = new Uint8Array(bytes.length);
      for(let i = 0; i < bytes.length; i++) byteArray[i] = bytes.charCodeAt(i);
      const blob = new Blob([byteArray], { type: pendingUploadData.mime });
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [catFolderId] })], { type: 'application/json' }));
      form.append('file', blob);
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      showToast('✓ Saved to Drive');
    } catch(e) { console.warn('Drive save failed:', e); }
  }
  statusDiv.innerHTML = '<div class="alert" style="background:var(--green-bg);color:var(--green);margin-top:10px">✓ Uploaded to ' + category + '</div>';
  setTimeout(() => statusDiv.innerHTML = '', 2000);
  pendingUploadData = null;
  document.getElementById('doc-file-input').value = '';
  document.getElementById('doc-label').value = '';
  renderUnifiedDocs();
  if(document.getElementById('prop-detail').classList.contains('open')) {
    const propName = document.querySelector('#prop-detail #detail-prop-name')?.textContent;
    const currentProp = getPropByName(propName);
    if(currentProp) renderPropDetailContent(currentProp.id);
  }
}

function openUnifiedDoc(propId, docId, source) {
  const prop = getProp(propId);
  let doc = null;
  if(source === 'cert') { doc = state.certs.find(c => c.id === docId); }
  else { doc = prop?.docs?.find(d => d.id === docId); }
  if(!doc || !doc.fileData) { showToast('Document data not found', true); return; }
  try {
    const bytes = atob(doc.fileData);
    const byteArray = new Uint8Array(bytes.length);
    for(let i = 0; i < bytes.length; i++) byteArray[i] = bytes.charCodeAt(i);
    const blob = new Blob([byteArray], { type: doc.fileMime || 'application/pdf' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  } catch(e) { alert('Could not open document'); }
}

function deleteUnifiedDoc(propId, docId, source) {
  if(!confirm('Delete this document?')) return;
  if(source === 'cert') {
    state.certs = state.certs.filter(c => c.id !== docId);
    saveState('certs');
  } else {
    const prop = getProp(propId);
    if(prop) prop.docs = prop.docs?.filter(d => d.id !== docId) || [];
    saveState('props');
  }
  renderUnifiedDocs();
  if(document.getElementById('prop-detail').classList.contains('open')) renderPropDetailContent(propId);
  showToast('Document deleted');
}

    <div class="form-row"><div class="form-field"><label>Property name</label><input type="text" id="np-name"></div><div class="form-field"><label>Address</label><input type="text" id="np-addr"></div></div>
    <div class="form-row"><div class="form-field"><label>Status</label><select id="np-status"><option value="let">Let</option><option value="vacant">Vacant</option></select></div><div class="form-field"><label>Monthly rent (£)</label><input type="number" id="np-rent" step="1"></div></div>
    <div class="form-row"><div class="form-field"><label>Tenure</label><select id="np-tenure" onchange="toggleNewPropLeaseFields()"><option value="freehold">Freehold</option><option value="leasehold">Leasehold</option></select></div><div class="form-field"></div></div>
    <div id="np-leasehold-fields" style="display:none">
      <div class="form-row"><div class="form-field"><label>Lease commencement</label><input type="date" id="np-lease-commencement"></div><div class="form-field"><label>Lease length (years)</label><input type="number" id="np-lease-length" step="1"></div></div>
    </div>
    <div class="form-row"><div class="form-field"><label>Purchase price (£)</label><input type="number" id="np-purchase" step="1000"></div><div class="form-field"><label>Current value (£)</label><input type="number" id="np-value" step="1000"></div></div>
    <div class="form-row"><div class="form-field"><label>Mortgage/mo (£)</label><input type="number" id="np-mortgage" step="1"></div><div class="form-field"><label>Lender</label><input type="text" id="np-lender"></div></div>
    <div class="form-row"><div class="form-field"><label>Tenant name</label><input type="text" id="np-tenant"></div><div class="form-field"><label>Lease start</label><input type="date" id="np-lease-start"></div></div>
    <button class="btn btn-primary" onclick="openAddPropOwnerStep()">Next — Add owners →</button>

function openAddPropOwnerStep() {
  const name = document.getElementById('np-name')?.value?.trim();
  if(!name){ alert('Please enter a property name.'); return; }
  const s1 = { 
    name, addr: document.getElementById('np-addr').value, status: document.getElementById('np-status').value, 
    tenure: document.getElementById('np-tenure').value,
    leaseCommencement: document.getElementById('np-lease-commencement').value,
    leaseLength: document.getElementById('np-lease-length').value,
    rent: document.getElementById('np-rent').value, purchase: document.getElementById('np-purchase').value, 
    value: document.getElementById('np-value').value, mortgage: document.getElementById('np-mortgage').value, 
    lender: document.getElementById('np-lender').value, tenant: document.getElementById('np-tenant').value, 
    leaseStart: document.getElementById('np-lease-start').value 
  };
  window._newPropStep1 = s1;
  const existingRows = state.owners.map(o => `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><input type="checkbox" id="np-ck-${o.id}" style="width:18px;height:18px;cursor:pointer;flex-shrink:0" onchange="npTickChanged()"><label for="np-ck-${o.id}" style="flex:1;font-size:14px;cursor:pointer">${o.name}</label><input type="number" id="np-own-share-${o.id}" placeholder="%" min="0" max="100" step="1" style="width:64px;text-align:right;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px" oninput="updateNewPropOwnerTotal()"><span style="font-size:13px;color:var(--text2);flex-shrink:0">%</span></div>`).join('');
  const blankSlots = [0,1,2,3].map(i => `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><input type="checkbox" id="np-ck-new-${i}" style="width:18px;height:18px;cursor:pointer;flex-shrink:0" onchange="npTickChanged()"><input type="text" id="np-new-owner-name-${i}" placeholder="New owner name" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px" oninput="if(this.value.trim()){document.getElementById('np-ck-new-${i}').checked=true;}npTickChanged()"><input type="number" id="np-new-owner-share-${i}" placeholder="%" min="0" max="100" step="1" style="width:64px;text-align:right;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px" oninput="updateNewPropOwnerTotal()"><span style="font-size:13px;color:var(--text2);flex-shrink:0">%</span></div>`).join('');
  openModal(`<div class="modal-title">Add property</div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">Step 2 of 2 — Owners of <strong>${name}</strong></div><p style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5">Tick the owners, then tap <strong>Equal split</strong> to divide automatically, or enter shares manually. Leave all unticked if you're the sole owner.</p><div style="display:flex;align-items:center;padding:6px 0 6px 28px;margin-bottom:0"><span style="flex:1;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Owner</span><span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-right:24px">Share</span></div>${existingRows}${blankSlots}<div id="np-owner-total-msg" style="font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);background:var(--surface2);margin:10px 0 10px;display:none"></div><div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-primary" style="flex:1;font-size:13px" onclick="npOwnerEqualSplit()">Equal split</button><button class="btn btn-secondary" style="flex:1;font-size:13px" onclick="npOwnerClear()">Clear</button></div><button class="btn btn-primary" onclick="saveProp()">Save property</button><button class="btn btn-secondary" style="margin-top:8px" onclick="openAddPropModal()">← Back</button>`);
}

function npTickChanged() {
  const tickedExisting = state.owners.filter(o => document.getElementById('np-ck-'+o.id)?.checked);
  const tickedNewCount = [0,1,2,3].filter(i => document.getElementById('np-ck-new-'+i)?.checked).length;
  const totalTicked = tickedExisting.length + tickedNewCount;
  if(totalTicked > 0) {
    const each = +(100/totalTicked).toFixed(1);
    const last = +(100 - each*(totalTicked-1)).toFixed(1);
    let idx = 0;
    tickedExisting.forEach(o => { const el = document.getElementById('np-own-share-'+o.id); if(el) { el.value = idx===totalTicked-1 ? last : each; idx++; } });
    state.owners.filter(o => !document.getElementById('np-ck-'+o.id)?.checked).forEach(o => { const el = document.getElementById('np-own-share-'+o.id); if(el) el.value = ''; });
    [0,1,2,3].forEach(i => { const el = document.getElementById('np-new-owner-share-'+i); if(el) { if(document.getElementById('np-ck-new-'+i)?.checked) { el.value = idx===totalTicked-1 ? last : each; idx++; } else { el.value = ''; } } });
  } else {
    state.owners.forEach(o => { const el=document.getElementById('np-own-share-'+o.id); if(el) el.value=''; });
    [0,1,2,3].forEach(i => { const el=document.getElementById('np-new-owner-share-'+i); if(el) el.value=''; });
  }
  updateNewPropOwnerTotal();
}

function npOwnerEqualSplit() {
  state.owners.forEach(o => { const ck = document.getElementById('np-ck-'+o.id); if(ck) ck.checked = true; });
  [0,1,2,3].forEach(i => { const nm = document.getElementById('np-new-owner-name-'+i); const ck = document.getElementById('np-ck-new-'+i); if(nm && ck) ck.checked = nm.value.trim().length > 0; });
  npTickChanged();
}

function updateNewPropOwnerTotal() {
  let total = 0;
  state.owners.forEach(o => { total += parseFloat(document.getElementById('np-own-share-'+o.id)?.value||0); });
  [0,1,2,3].forEach(i => { total += parseFloat(document.getElementById('np-new-owner-share-'+i)?.value||0); });
  const msg = document.getElementById('np-owner-total-msg');
  if(!msg) return;
  if(total === 0) { msg.style.display='none'; return; }
  msg.style.display='block';
  const ok = Math.abs(total-100)<0.5;
  msg.textContent = `Total: ${total.toFixed(0)}%${ok?' ✓':' — must equal 100%'}`;
  msg.style.background = ok ? 'var(--green-bg)' : 'var(--amber-bg)';
  msg.style.color = ok ? 'var(--green)' : 'var(--amber)';
}

function npOwnerClear() {
  state.owners.forEach(o => { const ck=document.getElementById('np-ck-'+o.id); if(ck) ck.checked=false; const el=document.getElementById('np-own-share-'+o.id); if(el) el.value=''; });
  [0,1,2,3].forEach(i => { const ck=document.getElementById('np-ck-new-'+i); if(ck) ck.checked=false; const n=document.getElementById('np-new-owner-name-'+i); if(n) n.value=''; const s=document.getElementById('np-new-owner-share-'+i); if(s) s.value=''; });
  updateNewPropOwnerTotal();
}

function saveProp() {
  const s1 = window._newPropStep1;
  if(!s1 || !s1.name){ alert('Please enter a property name.'); return; }
  const propOwners = [];
  let totalShare = 0;
  state.owners.forEach(o => { const share = parseFloat(document.getElementById('np-own-share-'+o.id)?.value||0); if(share > 0) { propOwners.push({ownerId:o.id, share}); totalShare+=share; } });
  [0,1,2,3].forEach(i => { const nameEl = document.getElementById('np-new-owner-name-'+i); const shareEl = document.getElementById('np-new-owner-share-'+i); const name = nameEl?.value?.trim(); const share = parseFloat(shareEl?.value||0); if(name) { let owner = state.owners.find(o=>o.name.toLowerCase()===name.toLowerCase()); if(!owner) { owner = {id: uid(), name}; state.owners.push(owner); } if(share > 0) { propOwners.push({ownerId:owner.id, share}); totalShare+=share; } else { propOwners.push({ownerId:owner.id, share:0}); } } });
  if(totalShare > 0 && Math.abs(totalShare-100) > 1) { alert(`Ownership shares add up to ${totalShare.toFixed(0)}% — they must total 100%. Please adjust.`); return; }
  if(propOwners.length > 0 && totalShare === 0) { const each = +(100/propOwners.length).toFixed(1); propOwners.forEach((o,i) => { o.share = i===propOwners.length-1 ? 100-(each*(propOwners.length-1)) : each; }); }
  const myShare = propOwners.length > 0 ? (propOwners[0]?.share ?? 100) : 100;
  const idx = state.props.length % PROP_COLORS.length;
  state.props.push({ 
    id: uid(), name: s1.name, address: s1.addr, status: s1.status, color: PROP_COLORS[idx], 
    tenure: s1.tenure || 'freehold', leaseCommencement: s1.leaseCommencement || '', leaseLength: s1.leaseLength || '',
    ownershipShare: myShare, numOwners: propOwners.length || 1, owners: propOwners.length > 0 ? propOwners : [], 
    tenant: s1.tenant||'—', leaseStart: s1.leaseStart||'—', leaseEnd:'—', deposit:'—', tenantEmail:'—', tenantPhone:'—', 
    rent: parseFloat(s1.rent)||0, lastRentIncrease: '', lastRentAmount: 0, purchase: parseFloat(s1.purchase)||0, 
    value: parseFloat(s1.value)||0, mortgage: parseFloat(s1.mortgage)||0, lender: s1.lender||'—', 
    agent:'—', agentTel:'—', gasEngineer:'—', electrician:'—', solicitor:'—', insurance:'—', archived: false, docs: [] 
  });
  const newProp = state.props[state.props.length-1];
  if(newProp.rent > 0) { if(!state.rentHistory) state.rentHistory = []; state.rentHistory.push({ id: uid(), propId: newProp.id, amount: newProp.rent, tenant: s1.tenant||'', startDate: new Date().toISOString().slice(0,10), endDate: null, notes: 'Initial rent (added with property)' }); saveState('rentHistory'); }
  saveState('props'); saveState('owners');
  window._newPropStep1 = null;
  closeModal();
  populateOwnerSelect();
  renderProperties();
  renderDashboard();
}

function toggleArchiveProp(id) {
  const p = getProp(id);
  if(!p) return;
  p.archived = !p.archived;
  saveState('props');
  renderPropDetailContent(id);
  renderDashboard();
  renderProperties();
}

function openEditOwnershipModal(propId) {
  const p = getProp(propId);
  const propOwners = p.owners || [{ownerId:'o1',share:p.ownershipShare??100}];
  const ownerRows = state.owners.map(o=>{ const entry = propOwners.find(x=>x.ownerId===o.id); return `<div class="form-row" style="align-items:center;margin-bottom:6px"><div class="form-field" style="margin-bottom:0"><label style="margin-bottom:3px">${o.name}</label><input type="number" id="own-${o.id}" value="${entry?entry.share:0}" min="0" max="100" step="0.1" style="text-align:right" oninput="updateOwnerTotal()"></div><div style="padding-top:18px;color:var(--text2);font-size:14px;flex-shrink:0">%</div></div>`; }).join('');
  openModal(`<div class="modal-title">Ownership — ${p.name}</div><p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5">Enter each owner's share. Total must equal 100%.</p>${ownerRows}<div id="own-total-msg" style="font-size:12px;margin:8px 0 12px;padding:6px 10px;border-radius:var(--radius-sm);background:var(--surface2)"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px"><button class="btn btn-secondary" style="font-size:12px;padding:7px" onclick="setEqualSplit('${propId}')">Equal split</button><button class="btn btn-secondary" style="font-size:12px;padding:7px" onclick="clearOwnerShares()">Clear all</button></div><div style="border-top:1px solid var(--border);padding-top:10px;margin-bottom:8px"><div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px">Manage owners</div><div class="gap-8"><input type="text" id="new-owner-name" placeholder="New owner name" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px"><button class="btn btn-secondary" style="width:auto;padding:8px 12px;font-size:13px" onclick="addOwner()">Add</button></div></div><button class="btn btn-primary" onclick="saveOwnership('${propId}')">Save</button><button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
  updateOwnerTotal();
}

function setEqualSplit(propId) {
  const active = state.owners.filter(o => { const el = document.getElementById(`own-${o.id}`); return el && parseFloat(el.value || 0) > 0; });
  const n = active.length || state.owners.length;
  if(n === 0) return;
  const each = +(100 / n).toFixed(1);
  const targets = active.length ? active : state.owners;
  targets.forEach((o, i) => {
    const el = document.getElementById(`own-${o.id}`);
    if(el) el.value = i === n-1 ? (100 - (each * (n-1))).toFixed(1) : each;
  });
  updateOwnerTotal();
}

function clearOwnerShares() {
  state.owners.forEach(o => {
    const el = document.getElementById(`own-${o.id}`);
    if(el) el.value = 0;
  });
  updateOwnerTotal();
}

function addOwner() {
  const nameEl = document.getElementById('new-owner-name');
  const name = nameEl?.value?.trim();
  if(!name) return;
  if(state.owners.find(o => o.name.toLowerCase() === name.toLowerCase())) {
    showToast('Owner already exists', true);
    return;
  }
  state.owners.push({ id: uid(), name });
  saveState('owners');
  nameEl.value = '';
  const modalBody = document.getElementById('modal-body');
  const propIdMatch = modalBody?.innerHTML?.match(/saveOwnership\('([^']+)'\)/);
  if(propIdMatch) openEditOwnershipModal(propIdMatch[1]);
  populateOwnerSelect();
}

function updateOwnerTotal() {
  let total = 0;
  state.owners.forEach(o => {
    const val = parseFloat(document.getElementById(`own-${o.id}`)?.value || 0);
    if(!isNaN(val)) total += val;
  });
  const msg = document.getElementById('own-total-msg');
  if(!msg) return;
  const ok = Math.abs(total - 100) < 0.1;
  msg.innerHTML = `Total: ${total.toFixed(1)}%${ok ? ' ✓' : ' — must equal 100%'}`;
  msg.style.background = ok ? 'var(--green-bg)' : 'var(--amber-bg)';
  msg.style.color = ok ? 'var(--green)' : 'var(--amber)';
}

function saveOwnership(propId) {
  const p = getProp(propId);
  let total = 0;
  const owners = state.owners.map(o => {
    const share = parseFloat(document.getElementById(`own-${o.id}`)?.value || 0);
    if(!isNaN(share)) total += share;
    return { ownerId: o.id, share: isNaN(share) ? 0 : share };
  }).filter(x => x.share > 0);
  if(owners.length > 0 && Math.abs(total - 100) > 1) { alert(`Ownership shares add up to ${total.toFixed(0)}% — they must total 100%. Please adjust.`); return; }
  if(owners.length === 0 || total === 0) { p.owners = []; p.ownershipShare = 100; p.numOwners = 1; saveState('props'); closeModal(); renderPropDetailContent(propId); renderAll(); return; }
  p.owners = owners;
  const myOwner = state.selectedOwner ? owners.find(x=>x.ownerId===state.selectedOwner) : owners[0];
  p.ownershipShare = myOwner?.share ?? 100;
  p.numOwners = owners.length;
  saveState('props');
  closeModal();
  renderPropDetailContent(propId);
  renderAll();
}

  const propOpts = state.props.map(p=>`<option value="${p.id}"${p.id===propId?' selected':''}>${p.name}</option>`).join('');
  openModal(`<div class="modal-title">Add certificate</div>
    <div class="form-field"><label>Property</label><select id="mc-prop">${propOpts}</select></div>
    <div class="form-row"><div class="form-field"><label>Certificate type</label><select id="mc-type" onchange="toggleEpcRating(this.value);mcAutoSetDuration(this.value)">${CERT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="form-field" id="mc-epc-wrap" style="display:none"><label>EPC rating</label><select id="mc-epc-rating"><option value="">— Select —</option>${['A','B','C','D','E','F','G'].map(r=>`<option value="${r}">${r}</option>`).join('')}</select></div></div>
    <div class="form-row"><div class="form-field"><label>Issue date</label><input type="date" id="mc-issue" oninput="mcCalcExpiry()"></div><div class="form-field"><label>Duration</label><select id="mc-duration" onchange="mcCalcExpiry()"><option value="">— or enter expiry date below —</option><option value="12">1 year</option><option value="24">2 years</option><option value="36">3 years</option><option value="60">5 years</option><option value="84">7 years</option><option value="120">10 years</option></select></div></div>
    <div class="form-row"><div class="form-field"><label>Expiry date</label><input type="date" id="mc-expiry"></div><div id="mc-expiry-hint" style="display:flex;align-items:center;font-size:12px;color:var(--blue);padding-top:18px"></div></div>
    <div class="form-field"><label>Issuer / engineer</label><input type="text" id="mc-issuer"></div>
    <div class="form-field"><label>Notes</label><input type="text" id="mc-notes"></div>
    <div class="upload-zone" onclick="document.getElementById('cert-file-upload').click()" style="padding:12px;margin-top:8px"><p>📎 Attach document (optional)</p><span>PDF, JPG, or PNG</span></div>
    <input type="file" id="cert-file-upload" class="upload-input" accept=".pdf,.jpg,.jpeg,.png">
    <button class="btn btn-primary" onclick="saveManualCertWithDoc('${propId}')">Save</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
  mcAutoSetDuration('Gas Safety');
}

function mcAutoSetDuration(type) {
  const sel = document.getElementById('mc-duration');
  if(sel && CERT_DEFAULT_DURATIONS[type]) { sel.value = CERT_DEFAULT_DURATIONS[type]; mcCalcExpiry(); }
}

function mcCalcExpiry() {
  const issueVal = document.getElementById('mc-issue')?.value;
  const months = parseInt(document.getElementById('mc-duration')?.value||'0');
  const hint = document.getElementById('mc-expiry-hint');
  if(issueVal && months > 0) {
    const d = new Date(issueVal);
    d.setMonth(d.getMonth() + months);
    const expiry = d.toISOString().slice(0,10);
    const expiryEl = document.getElementById('mc-expiry');
    if(expiryEl) expiryEl.value = expiry;
    if(hint) hint.textContent = `Auto-calculated from ${months >= 12 ? months/12 + ' yr' : months + ' mo'}`;
  } else { if(hint) hint.textContent = ''; }
}

function toggleEpcRating(type) {
  const wrap = document.getElementById('mc-epc-wrap');
  if(wrap) wrap.style.display = type==='EPC' ? 'block' : 'none';
}

function saveManualCertWithDoc(origPropId) {
  const file = document.getElementById('cert-file-upload').files[0];
  const propId = document.getElementById('mc-prop').value;
  const type = document.getElementById('mc-type').value;
  const saveCert = (docData, docMime) => {
    state.certs.push({ id: uid(), propId, type, issueDate: document.getElementById('mc-issue').value, expiryDate: document.getElementById('mc-expiry').value, issuer: document.getElementById('mc-issuer').value, notes: document.getElementById('mc-notes').value, epcRating: type==='EPC' ? document.getElementById('mc-epc-rating').value : '', docData: docData || null, docMime: docMime || null });
    saveState('certs'); closeModal(); if(origPropId) renderPropDetailContent(propId); renderDashboard(); showToast('Certificate saved');
  };
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => { saveCert(e.target.result.split(',')[1], file.type || 'application/pdf'); };
    reader.onerror = () => { saveCert(null, null); showToast('Certificate saved without document (file read failed)', true); };
    reader.readAsDataURL(file);
  } else { saveCert(null, null); }
}

function openAddApplianceModal(propId) {
  openModal(`<div class="modal-title">Add appliance</div>
    <div class="form-field"><label>Property</label><select id="ma-prop" disabled><option value="${propId}">${getProp(propId)?.name}</option></select></div>
    <div class="form-row"><div class="form-field"><label>Appliance name</label><input type="text" id="ma-name" placeholder="e.g. Boiler"></div><div class="form-field"><label>Location</label><input type="text" id="ma-loc" placeholder="e.g. Kitchen"></div></div>
    <div class="form-row"><div class="form-field"><label>Make</label><input type="text" id="ma-make" placeholder="e.g. Bosch"></div><div class="form-field"><label>Model</label><input type="text" id="ma-model"></div></div>
    <div class="form-field"><label>Serial number</label><input type="text" id="ma-serial"></div>
    <div class="form-field"><label>Notes</label><input type="text" id="ma-notes" placeholder="e.g. Installed 2022, under warranty"></div>
    <button class="btn btn-primary" onclick="saveAppliance('${propId}')">Save</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>`);
}

function saveAppliance(origPropId) {
  const name = document.getElementById('ma-name').value;
  if(!name){alert('Please enter an appliance name.');return;}
  state.appliances.push({ id: uid(), propId: origPropId, name, location: document.getElementById('ma-loc').value, make: document.getElementById('ma-make').value, model: document.getElementById('ma-model').value, serial: document.getElementById('ma-serial').value, notes: document.getElementById('ma-notes').value });
  saveState('appliances'); closeModal(); renderPropDetailContent(origPropId);
}

function deleteAppliance(appId, propId) { 
  if(confirm('Delete this appliance?')) { 
    state.appliances = state.appliances.filter(a=>a.id!==appId); 
    saveState('appliances'); 
    renderPropDetailContent(propId); 
    showToast('Appliance deleted'); 
  } 
}

function deleteCert(certId, propId) { 
  if(confirm('Delete this certificate?')) { 
    state.certs = state.certs.filter(c=>c.id!==certId); 
    saveState('certs'); 
    renderPropDetailContent(propId); 
    renderDashboard(); 
    showToast('Certificate deleted'); 
  } 
}

function deleteTxn(tId, propId) { 
  if(confirm('Delete this transaction?')) { 
    state.txns = state.txns.filter(t=>t.id!==tId); 
    saveState('txns'); 
    renderPropDetailContent(propId); 
    renderDashboard(); 
    showToast('Transaction deleted'); 
  } 
}

function openCertDoc(certId) {
  const c = state.certs.find(x=>x.id===certId);
  if(!c || !c.docData) return;
  try {
    const bytes = atob(c.docData);
    const byteArray = new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) byteArray[i]=bytes.charCodeAt(i);
    const blob = new Blob([byteArray], {type: c.docMime||'application/pdf'});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
  } catch(e) { alert('Could not open document.'); }
}

function openModal(html) { document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
