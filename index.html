function updateOwnerTotal() {
  let total = 0;
  state.owners.forEach(o=>{ total += parseFloat(document.getElementById('own-'+o.id)?.value||0); });
  const msg = document.getElementById('own-total-msg');
  if(!msg) return;
  const ok = Math.abs(total-100)<0.1;
  msg.textContent = `Total: ${total.toFixed(1)}%${ok?' ✓':' — must equal 100%'}`;
  msg.style.background = ok ? 'var(--green-bg)' : 'var(--amber-bg)';
  msg.style.color = ok ? 'var(--green)' : 'var(--amber)';
}
function setEqualSplit(propId) {
  const active = state.owners.filter(o => {
    const el = document.getElementById('own-'+o.id);
    return el && parseFloat(el.value||0) > 0;
  });
  const n = active.length || state.owners.length;
  if(!n) return;
  const each = +(100/n).toFixed(1);
  const targets = active.length ? active : state.owners;
  targets.forEach((o,i)=>{
    const el = document.getElementById('own-'+o.id);
    if(el) el.value = i===n-1 ? (100-(each*(n-1))).toFixed(1) : each;
  });
  updateOwnerTotal();
}
function clearOwnerShares() {
  state.owners.forEach(o=>{ const el=document.getElementById('own-'+o.id); if(el) el.value=0; });
  updateOwnerTotal();
}
function addOwner() {
  const nameEl = document.getElementById('new-owner-name');
  const name = nameEl?.value?.trim();
  if(!name) return;
  let o = state.owners.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(!o) {
    o = {id:uid(),name};
    state.owners.push(o);
    saveState('owners');
  }
  nameEl.value='';
  const modal = document.getElementById('modal-body');
  const propIdMatch = modal?.innerHTML?.match(/saveOwnership\('([^']+)'\)/);
  if(propIdMatch) openEditOwnershipModal(propIdMatch[1]);
}
function saveOwnership(propId) {
  const p = getProp(propId);
  if(!p) return;
  let total = 0;
  const owners = state.owners.map(o=>{
    const share = parseFloat(document.getElementById('own-'+o.id)?.value||0);
    total += share;
    return {ownerId:o.id,share};
  }).filter(x=>x.share>0);
  if(owners.length > 0 && total > 0 && Math.abs(total-100)>1) {
    alert('Total ownership must equal 100%. Current total: ' + total.toFixed(0) + '%');
    return;
  }
  if(owners.length === 0 || total === 0) {
    p.owners = [];
    p.ownershipShare = 100;
    p.numOwners = 1;
    savePropAndRefresh(propId); renderAll();
    return;
  }
  p.owners = owners;
  const myOwner = state.selectedOwner ? owners.find(x=>x.ownerId===state.selectedOwner) : owners[0];
  p.ownershipShare = myOwner?.share ?? 100;
  p.numOwners = owners.length;
  saveState('props');
  closeModal();
  renderPropDetailContent(propId);
  renderAll();
}

    <div class="form-row">
      <div class="form-field"><label>Annual premium (£)</label><input type="number" id="ins-premium" value="${p.insurancePremium||''}" step="0.01"></div>
      <div class="form-field"><label>Renewal date</label><input type="date" id="ins-renewal" value="${p.insuranceRenewal||''}"></div>
    </div>
    <div class="form-field"><label>Contact / broker</label><input type="text" id="ins-contact" value="${p.insuranceContact||''}"></div>
    <div class="form-field"><label>Notes</label><input type="text" id="ins-notes" value="${p.insuranceNotes||''}"></div>
    <button class="btn btn-primary" onclick="saveInsurance('${propId}')">Save</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

function saveInsurance(propId) {
  const p = getProp(propId);
  if(!p) return;
  p.insuranceProvider = document.getElementById('ins-provider').value;
  p.insurancePolicyNo = document.getElementById('ins-policy').value;
  p.insuranceType = document.getElementById('ins-type').value;
  p.insurancePremium = parseFloat(document.getElementById('ins-premium').value)||0;
  p.insuranceRenewal = document.getElementById('ins-renewal').value;
  p.insuranceContact = document.getElementById('ins-contact').value;
  p.insuranceNotes = document.getElementById('ins-notes').value;
  saveState('props');
  closeModal();
  renderPropDetailContent(propId);
}

loadState();
</script>
</body>
</html>
