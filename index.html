<style>
/* Optimized CSS with performance improvements */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface2: #F2F2F5;
  --border: #E5E5EA;
  --border2: #D1D1D6;
  --text: #1C1C1E;
  --text2: #6C6C70;
  --text3: #8E8E93;
  --green: #28A745;
  --green-bg: #E8F5E9;
  --red: #DC3545;
  --red-bg: #FEE8E9;
  --amber: #FFC107;
  --amber-bg: #FFF8E1;
  --blue: #007AFF;
  --blue-bg: #E8F0FE;
  --radius-sm: 10px;
  --radius: 14px;
  --radius-lg: 18px;
  --nav-h: 70px;
}

/* Optimized rendering */
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  display: flex;
  flex-direction: column;

  min-height: -webkit-fill-available;
}

.app-header {

  backdrop-filter: blur(20px);

  border-bottom: 0.5px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}

.app-header h1 {
  font-size: 22px;
  font-weight: 640;
  letter-spacing: -0.3px;
}

.header-actions {
  display: flex;
  gap: 12px;
}

.icon-button {

.bottom-nav {

.nav-item {

  padding: 10px 6px;

}

.nav-item:active {

.nav-item.active {

/* Performance optimized - use transform instead of position changes */

  border-radius: var(--radius);

.card:active {

.card-title {

.metrics-grid {

.metric-card {

.btn {

.login-card {

.toast {

.text-green { color: var(--green); }

<script>
// ============================================
// OPTIMIZED UTILITIES
// ============================================
const Utils = {
  generateId: () => Date.now().toString(36) + Math.random().toString(36).substr(2, 8),
  
  formatMoney: (amount) => '£' + Math.abs(amount).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 }),
  
  formatDate: (dateStr) => {
    if (!dateStr || dateStr === '—') return '—';
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString('en-GB');
  },
  
  escapeHtml: (str) => {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, (m) => {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  },
  
  escapeJs: (str) => {
    if (!str) return '';
    return String(str).replace(/['"\\]/g, '\\$&').replace(/\n/g, '\\n');
  },
  
  showToast: (msg, isError) => {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    if (isError) toast.style.background = 'rgba(220, 53, 69, 0.9)';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  },
  
  // Debounce function for performance
  debounce: (func, wait) => {
    let timeout;
    return function executed(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }
};

// Make globally available
window.Utils = Utils;
window.showToast = Utils.showToast;

// ============================================
// OPTIMIZED GOOGLE DRIVE INTEGRATION
// ============================================
let gAccessToken = null;
let gDriveDataFileId = null;
let gDriveFolderIds = { root: null };
let googleInitialized = false;
let saveTimeout = null;

// Debounced save to Drive (prevents excessive API calls)
function debouncedSaveToDrive() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    if (gAccessToken) saveToDrive();
  }, 1000);
}

function waitForGoogle() {
  return new Promise((resolve) => {
    if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      resolve(true);
      return;
    }
    const checkInterval = setInterval(() => {
      if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
        clearInterval(checkInterval);
        resolve(true);
      }
    }, 100);
    setTimeout(() => {
      clearInterval(checkInterval);
      resolve(false);
    }, 5000);
  });
}

async function signIn() {
  const btn = document.getElementById('signin-btn');
  const statusDiv = document.getElementById('login-status');
  
  if (btn) { btn.disabled = true; btn.textContent = 'Loading...'; }
  if (statusDiv) statusDiv.textContent = 'Loading Google services...';
  
  const isReady = await waitForGoogle();
  
  if (!isReady) {
    if (statusDiv) statusDiv.textContent = 'Google services failed to load. Please refresh.';
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    Utils.showToast('Google services not loaded. Please refresh the page.', true);
    return;
  }
  
  if (btn) btn.textContent = 'Signing in...';
  if (statusDiv) statusDiv.textContent = 'Opening sign-in window...';
  
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: '434046440829-4kr09lbdl6u5eu03h92g5obb12nc72fd.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: async (response) => {
        if (response.error) {
          if (statusDiv) statusDiv.textContent = 'Error: ' + response.error;
          if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
          Utils.showToast('Sign in failed: ' + response.error, true);
          return;
        }
        
        gAccessToken = response.access_token;
        document.getElementById('login-screen').style.display = 'none';
        Utils.showToast('✓ Signed in to Google Drive');
        
        await loadFromDrive();
        renderAll();
      }
    });
    client.requestAccessToken();
  } catch (error) {
    if (statusDiv) statusDiv.textContent = 'Error: ' + error.message;
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
    Utils.showToast('Sign in failed', true);
  }
}

function signOut() {
  if (gAccessToken && google.accounts) {
    google.accounts.oauth2.revoke(gAccessToken);
  }
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = { root: null };
  document.getElementById('login-screen').style.display = 'flex';
  Utils.showToast('Signed out of Google Drive');
  renderAll();
}

async function driveRequest(url, options = {}) {
  const response = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers || {}) }
  });
  if (!response.ok) throw new Error(`Drive API ${response.status}`);
  return response.json();
}

async function findOrCreateFolder(name, parentId = 'root') {
  const query = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`);
  
  if (result.files && result.files.length > 0) {
    return result.files[0].id;
  }
  
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function loadFromDrive() {
  if (!gAccessToken) return;
  
  try {
    Utils.showToast('Loading from Drive...');
    
    const rootId = await findOrCreateFolder('Property Portfolio');
    gDriveFolderIds.root = rootId;
    
    const query = `name='portfolio-data.json' and '${rootId}' in parents and trashed=false`;
    const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`);
    
    if (result.files && result.files.length > 0) {
      gDriveDataFileId = result.files[0].id;
      const fileResponse = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveDataFileId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + gAccessToken }
      });
      const data = await fileResponse.json();
      
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
      if (data.certificates) state.certificates = data.certificates;
      
      Utils.showToast('✓ Data loaded from Drive');
    } else {
      await saveToDrive();
      Utils.showToast('✓ New portfolio created in Drive');
    }
  } catch (error) {
    console.error('Load error:', error);
    Utils.showToast('⚠ Could not load from Drive', true);
  }
}

async function saveToDrive() {
  if (!gAccessToken) return;
  
  const data = {
    properties: state.properties,
    transactions: state.transactions,
    maintenance: state.maintenance,
    certificates: state.certificates || []
  };
  
  const jsonData = JSON.stringify(data, null, 2);
  const blob = new Blob([jsonData], { type: 'application/json' });
  
  try {
    if (!gDriveFolderIds.root) {
      gDriveFolderIds.root = await findOrCreateFolder('Property Portfolio');
    }
    
    if (gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const formData = new FormData();
      formData.append('metadata', new Blob([JSON.stringify({
        name: 'portfolio-data.json',
        parents: [gDriveFolderIds.root]
      })], { type: 'application/json' }));
      formData.append('file', blob);
      
      const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: formData
      });
      const result = await response.json();
      gDriveDataFileId = result.id;
    }
  } catch (error) {
    console.error('Save error:', error);
  }
}

        <button class="icon-btn-sm" onclick="editTransaction('${Utils.escapeJs(transaction.id)}')" title="Edit">✎</button>
        <button class="icon-btn-sm" onclick="deleteTransaction('${Utils.escapeJs(transaction.id)}')" title="Delete">✕</button>
      </div>
    </div>
  `;
}

// ============================================
// OPTIMIZED MODAL & ACTIONS
// ============================================
function showSheet(title, contentHtml, onConfirm = null) {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  const sheetContent = document.getElementById('sheet-content');
  if (!sheet || !overlay || !sheetContent) return;
  
  sheetContent.innerHTML = `<div class="sheet-title">${Utils.escapeHtml(title)}</div>${contentHtml}<div class="flex gap-2" style="margin-top: 20px;"><button class="btn btn-secondary" onclick="closeSheet()">Cancel</button>${onConfirm ? `<button class="btn btn-primary" id="sheet-confirm-btn">Confirm</button>` : ''}</div>`;
  sheet.classList.add('open');
  overlay.classList.add('open');
  if (onConfirm) {
    const confirmBtn = document.getElementById('sheet-confirm-btn');
    if (confirmBtn) confirmBtn.onclick = onConfirm;
  }
}

function closeSheet() {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  if (sheet) sheet.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
}

function navigate(screen) {
  currentScreen = screen;
  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.dataset.nav === screen) item.classList.add('active');
    else item.classList.remove('active');
  });
  renderAll();
}

function showPropertyDetail(id) {
  const p = state.properties.find(p => p.id === id);
  if (!p) return;
  const propertyTransactions = state.transactions.filter(t => t.propertyId === id);
  const summary = propertyTransactions.reduce((s, t) => s + (t.type === 'income' ? t.amount : -t.amount), 0);
  const maintenance = state.maintenance.filter(m => m.propertyId === id && m.status === 'open');
  
  showSheet(p.name, `
    <div class="metrics-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="metric-card"><div class="metric-label">Monthly rent</div><div class="metric-value">${Utils.formatMoney(p.rent)}</div></div>
      <div class="metric-card"><div class="metric-label">Net income</div><div class="metric-value ${summary >= 0 ? 'text-green' : 'text-red'}">${Utils.formatMoney(summary)}</div></div>
    </div>
    <div class="card"><div class="card-title">Details</div>
      <div><strong>Address:</strong> ${Utils.escapeHtml(p.address)}</div>
      <div><strong>Tenant:</strong> ${Utils.escapeHtml(p.tenant)}</div>
      <div><strong>Lease:</strong> ${p.leaseStart} → ${p.leaseEnd}</div>
      <div><strong>Lender:</strong> ${Utils.escapeHtml(p.lender)}</div>

      ${p.deposit > 0 ? `<div><strong>Deposit:</strong> ${Utils.formatMoney(p.deposit)} (${p.depositScheme || 'No scheme'})</div>` : ''}
    </div>
    ${maintenance.length > 0 ? `<div class="card"><div class="card-title">🔧 Open issues</div>${maintenance.map(m => `<div class="txn-item"><div>${Utils.escapeHtml(m.description)}</div><div class="txn-amount">${m.priority}</div></div>`).join('')}</div>` : ''}

  `);
}

// Debounced search for performance
const debouncedSearch = Utils.debounce((query) => {
  performSearch(query);
}, 300);

function showSearch() {
  const properties = state.properties;
  showSheet('Search', `
    <div class="form-group"><input type="text" id="searchInput" class="form-input" placeholder="Search properties..." oninput="debouncedSearch(this.value)"></div>
    <div id="searchResults">${properties.slice(0, 5).map(p => `<div class="property-item" style="margin-bottom: 8px; cursor: pointer;" onclick="showPropertyDetail('${Utils.escapeJs(p.id)}'); closeSheet();"><div style="padding: 12px;"><div class="property-name">${Utils.escapeHtml(p.name)}</div><div class="metric-label">${Utils.escapeHtml(p.address)}</div></div></div>`).join('')}</div>
  `);
}

function performSearch(query) {
  if (!query || !query.trim()) return;
  const results = state.properties.filter(p => p.name.toLowerCase().includes(query.toLowerCase()) || p.address.toLowerCase().includes(query.toLowerCase()));
  const resultsDiv = document.getElementById('searchResults');
  if (resultsDiv) {
    resultsDiv.innerHTML = results.map(p => `<div class="property-item" style="margin-bottom: 8px; cursor: pointer;" onclick="showPropertyDetail('${Utils.escapeJs(p.id)}'); closeSheet();"><div style="padding: 12px;"><div class="property-name">${Utils.escapeHtml(p.name)}</div><div class="metric-label">${Utils.escapeHtml(p.address)}</div></div></div>`).join('') || '<div class="text-center" style="padding: 20px;">No results found</div>';
  }
}

  showSheet('Settings', `

      ${!gAccessToken ? '<button class="btn btn-primary" onclick="signIn(); closeSheet();">🔐 Sign in to Drive</button>' : '<button class="btn btn-secondary" onclick="signOut(); closeSheet();">🚪 Sign out of Drive</button>'}
    </div>
    <div class="card"><div class="card-title">Data Management</div>
      <button class="btn btn-secondary mb-2" onclick="exportData()">📤 Export Data</button>
      <button class="btn btn-danger" onclick="confirmReset()">⚠️ Reset All Data</button>
    </div>
  `);

  `);

function exportData() {
  const dataToExport = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance, certificates: state.certificates };
  const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `portfolio-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
  Utils.showToast('Data exported');
}

function confirmReset() {
  closeSheet();
  setTimeout(() => {
    if (confirm('⚠️ WARNING: This will delete ALL your data.\n\nProperties, transactions, maintenance records, and all other data will be permanently deleted.\n\nThis action cannot be undone. Are you absolutely sure?')) {
      localStorage.removeItem('portfolio_data_backup');
      if (gAccessToken && gDriveDataFileId) {
        // Optionally delete from Drive too
      }
      Utils.showToast('Data reset. Refreshing...');
      setTimeout(() => location.reload(), 1000);
    }
  }, 100);
}
