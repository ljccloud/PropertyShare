<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --border2: #CEC9BE;
  --text: #1A1916;
  --text2: #6B6760;
  --text3: #A09D98;
  --green: #2D5A27;
  --green-bg: #EAF2E8;
  --red: #8B2020;
  --red-bg: #F5EAEA;
  --amber: #7A4A0A;
  --amber-bg: #FAF0E0;
  --blue: #1A3A5C;
  --blue-bg: #E8F0F8;
  --purple: #3D2B6B;
  --purple-bg: #EEEAF5;
  --teal: #1A4A40;
  --teal-bg: #E6F2F0;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 15px; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
#header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); flex: 1; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); padding-bottom: calc(var(--nav-h) + 16px); }
#nav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; safe-area-inset-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--text3); padding: 8px 4px; transition: color .15s; }
.nav-btn.active { color: var(--text); }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; letter-spacing: .02em; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
.section-label { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 8px; }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-grey { background: var(--surface2); color: var(--text2); }
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.info-val { font-size: 14px; text-align: right; }
.prop-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; gap: 12px; align-items: center; transition: border-color .15s; }
.prop-item:hover, .prop-item:active { border-color: var(--border2); }
.prop-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.prop-name { font-size: 15px; font-weight: 500; }
.prop-addr { font-size: 13px; color: var(--text2); margin-top: 1px; }
.prop-certs { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.prop-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }
#prop-detail { position: fixed; inset: 0; z-index: 150; background: var(--bg); display: none; flex-direction: column; }
#prop-detail.open { display: flex; }
#detail-header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }
.back-btn { font-size: 15px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; }
#detail-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 32px; }
#login-screen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
#login-screen.visible { display: flex; }
.detail-tabs { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; margin-bottom: 16px; scrollbar-width: none; }
.detail-tabs::-webkit-scrollbar { display: none; }
.dtab { font-size: 13px; font-weight: 500; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.dtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.dtab-content { display: none; }
.dtab-content.active { display: block; }
.txn-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.txn-row:last-child { border-bottom: none; }
.txn-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.txn-body { flex: 1; min-width: 0; }
.txn-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.txn-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
.txn-income { color: var(--green); }
.txn-expense { color: var(--red); }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 28px 16px; text-align: center; cursor: pointer; background: var(--surface2); margin-bottom: 10px; }
.upload-zone p { font-size: 14px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.upload-zone span { font-size: 12px; color: var(--text3); }
.upload-input { display: none; }
.form-field { margin-bottom: 12px; }
.form-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  -webkit-appearance: none; appearance: none; outline: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--border2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 4px; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { padding: 20px; text-align: center; font-size: 14px; color: var(--text2); }
.cert-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.cert-info { flex: 1; min-width: 0; }
.cert-name { font-size: 14px; font-weight: 500; }
.cert-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.alert { background: var(--amber-bg); border: 1px solid #E8C878; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: var(--amber); }
.alert-red { background: var(--red-bg); border-color: #E8AAAA; color: var(--red); }
#modal { position: fixed; inset: 0; z-index: 300; display: none; flex-direction: column; justify-content: flex-end; }
#modal.open { display: flex; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
.modal-panel { position: relative; background: var(--surface); border-radius: 20px 20px 0 0; padding: 16px 16px 40px; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
.empty { text-align: center; padding: 32px 16px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.alert-strip { background: var(--red-bg); border: 1px solid #E8AAAA; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: var(--red); font-weight: 500; }
.alert-strip-amber { background: var(--amber-bg); border-color: #E8C878; color: var(--amber); }
.toggle-bar { display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; margin-bottom: 14px; }
.toggle-btn { flex: 1; padding: 7px; text-align: center; border-radius: 17px; font-size: 13px; font-weight: 500; border: none; background: none; color: var(--text2); cursor: pointer; transition: all .15s; }
.toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

@media (min-width: 600px) {
  #content { max-width: 680px; margin: 0 auto; }
  #nav { max-width: 680px; margin: 0 auto; }
  .metrics { grid-template-columns: repeat(4, 1fr); }
}
.label-xs { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em }
.label-xs-mb { font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px }
.text-sm { font-size:12px;color:var(--text2) }
.icon-btn-sm { width:24px;height:24px;font-size:11px }

.fw5-13 { font-size:13px; font-weight:500 }
.fw5-14 { font-size:14px; font-weight:500 }
.fw5-11-blue { font-size:11px; color:var(--blue); font-weight:500 }
.btn-sm-edit { width:auto; padding:5px 12px; font-size:12px }
.flex-row { display:flex; justify-content:space-between; align-items:center }
.gap-8 { display:flex; gap:8px }
</style>
</head>

</div>

<div id="app" style="display:none">
  <div id="header">
    <div id="header-title">Portfolio</div>
    <select id="prop-select" onchange="setFilterProp(this.value)" style="font-size:12px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0;max-width:110px;-webkit-appearance:none;appearance:none;text-align:center;outline:none">

  <div id="content">

    <div id="screen-maintenance" class="screen"></div>

  <div id="nav">

    </button>
    <button class="nav-btn" onclick="showScreen('properties',this)" data-screen="properties">

    </button>
    <button class="nav-btn" onclick="showScreen('finance',this)" data-screen="finance">

    </button>
    <button class="nav-btn" onclick="showScreen('maintenance',this)" data-screen="maintenance">

    </button>
    <button class="nav-btn" onclick="showScreen('docs',this)" data-screen="docs">
      <span class="nav-icon">📄</span><span class="nav-label">Documents</span>
    </button>
  </div>
</div>

<div id="prop-detail">
  <div id="detail-header">

    <div style="flex:1;font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="detail-prop-name"></div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function fmtMoney(n) { return '£' + Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) { if(!d||d==='—') return '—'; const p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function daysUntil(d) { return Math.round((new Date(d)-new Date())/(1000*60*60*24)); }
function certStatus(expiry) {
  if(!expiry) return 'grey';
  const d = daysUntil(expiry);
  if(d < 0) return 'red';
  if(d < 60) return 'amber';
  return 'green';
}
function certLabel(expiry) {
  if(!expiry) return 'No date';
  const d = daysUntil(expiry);
  if(d < 0) return 'Expired';
  if(d < 60) return d+'d left';
  return 'Valid';
}
function getProp(id) { return state.props.find(p=>p.id===id); }
function getPropByName(name) { 
  if(!name) return null;
  const trimmedName = name.trim();
  return state.props.find(p => p.name === trimmedName || p.name.toLowerCase() === trimmedName.toLowerCase());
}
function getOwnerShare(prop) {
  if(!state.shareMode || !state.selectedOwner) return 1;
  const ownerEntry = (prop.owners||[]).find(o=>o.ownerId===state.selectedOwner);
  if(ownerEntry) return ownerEntry.share/100;
  return (prop.ownershipShare??100)/100;
}
function shareOf(prop, value) {
  if(!state.shareMode) return value;
  return value * getOwnerShare(prop);
}
function txnShare(txn) {
  if(!state.shareMode) return txn.amount;
  const p = getProp(txn.prop);
  return txn.amount * getOwnerShare(p||{ownershipShare:100});
}

async function driveRequest(url, options={}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers||{}) }
  });
  if(!res.ok) throw new Error(`Drive API ${res.status}`);
  return res.json();
}

async function findOrCreateFolder(name, parentId) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if(result.files && result.files.length > 0) return result.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function findDataFile() {
  if(!gDriveFolderIds.root) return null;
  const q = `name='${DATA_FILENAME}' and '${gDriveFolderIds.root}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  return result.files && result.files.length > 0 ? result.files[0].id : null;
}

async function loadFromDrive() {
  const fileId = await findDataFile();
  if(!fileId) return false;
  gDriveDataFileId = fileId;
  const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { 'Authorization': 'Bearer ' + gAccessToken }
  });
  if(!response.ok) throw new Error('Failed to load file');
  const data = await response.json();
  if(data.props) state.props = data.props;
  if(data.txns) state.txns = data.txns;
  if(data.certs) state.certs = data.certs;
  if(data.appliances) state.appliances = data.appliances;
  if(data.maint) state.maint = data.maint;
  if(data.owners) state.owners = data.owners;
  if(data.rentHistory) state.rentHistory = data.rentHistory;
  return true;
}

async function saveToDriveWithRetry(attempt = 1) {
  if(!gAccessToken) return false;
  
  const data = {
    props: state.props, txns: state.txns, certs: state.certs,
    appliances: state.appliances, maint: state.maint, owners: state.owners,
    rentHistory: state.rentHistory, version: '2.0', lastSaved: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  
  try {
    if(gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({
        name: DATA_FILENAME,
        parents: [gDriveFolderIds.root || 'root']
      })], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      const created = await res.json();
      gDriveDataFileId = created.id;
    }
    showToast('✓ Saved to Drive');
    saveRetryCount = 0;
    return true;
  } catch(e) {
    if(attempt < MAX_SAVE_RETRIES) {
      const delay = Math.pow(2, attempt) * 1000;
      showToast(`⚠ Retry ${attempt}/${MAX_SAVE_RETRIES}...`, true);
      await new Promise(resolve => setTimeout(resolve, delay));
      return saveToDriveWithRetry(attempt + 1);
    }
    showToast('⚠ Save failed', true);
    return false;
  }
}

function debouncedSave() {
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    if(DRIVE_MODE && gAccessToken) saveToDriveWithRetry();
    else if(!DRIVE_MODE) {
      const keys = ['props','txns','certs','appliances','maint','owners','rentHistory'];
      keys.forEach(k => {
        try { localStorage.setItem('pf-'+k, JSON.stringify(state[k])); } catch(e) {}
      });
    }
  }, 2000);
}

function saveState(key) {
  if(DRIVE_MODE) {
    try { localStorage.setItem('pf-'+key, JSON.stringify(state[key])); } catch(e) {}
    debouncedSave();
    return;
  }
  try { localStorage.setItem('pf-' + key, JSON.stringify(state[key])); } catch(e) {}
}

function signIn() {
  const btn = document.getElementById('signin-btn');
  const errEl = document.getElementById('login-error');
  if(btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Signing in...'; }
  if(errEl) errEl.style.display='none';
  
  if(typeof google==='undefined' || !google.accounts || !google.accounts.oauth2) {
    if(errEl){
      errEl.textContent='Google sign-in library not loaded. Please refresh the page and try again.';
      errEl.style.display='block';
    }
    if(btn){btn.disabled=false; btn.innerHTML='Sign in with Google';}
    return;
  }
  
  try {
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp) => {
        if(resp.error) {
          if(errEl){
            errEl.textContent='Sign-in error: ' + (resp.error_description || resp.error);
            errEl.style.display='block';
          }
          if(btn){btn.disabled=false; btn.innerHTML='Sign in with Google';}
          return;
        }
        
        gAccessToken = resp.access_token;
        const loginScreen = document.getElementById('login-screen');
        if(loginScreen) loginScreen.classList.remove('visible');
        document.getElementById('app').style.display = 'flex';
        
        showToast('Connecting to Drive...');
        
        try {
          gDriveFolderIds.root = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
          const loaded = await loadFromDrive();
          if(!loaded) showToast('Creating new portfolio...');
          else showToast('✓ Loaded from Drive');
          renderAll();
        } catch(e) {
          console.error('Drive init error:', e);
          showToast('⚠ Using local data only', true);
          await loadFromLocal();
          renderAll();
        }
      },
    });
    
    tokenClient.requestAccessToken();
  } catch(e) {
    console.error('Token client error:', e);
    if(errEl){
      errEl.textContent='Failed to initialize sign-in. Please check your internet connection.';
      errEl.style.display='block';
    }
    if(btn){btn.disabled=false; btn.innerHTML='Sign in with Google';}
  }
}

function signOut() {
  if(gAccessToken) {
    try {
      google.accounts.oauth2.revoke(gAccessToken);
    } catch(e) {}
  }
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = {};
  
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.add('visible');
  showToast('Signed out');
}

async function loadFromLocal() {
  const keys = ['props','txns','certs','appliances','maint','owners','rentHistory'];
  keys.forEach(k=>{try{const v=localStorage.getItem('pf-'+k);if(v)state[k]=JSON.parse(v);}catch(e){}});
  state.txns=state.txns.map(t=>({...t,cat:CAT_LEGACY[t.cat]||t.cat}));
  state.props.forEach(p=>{
    if(!p.docs) p.docs=[];
    if(p.tenancyDocs) {
      p.tenancyDocs.forEach(d=>{
        if(!p.docs.find(x=>x.id===d.id)) p.docs.push({...d, section:'tenancy', label:d.type||'Tenancy', propertyId: p.id });
      });
      delete p.tenancyDocs;
    }
  });
}

async function loadState() {
  if(DRIVE_MODE) {
    document.getElementById('login-screen').classList.add('visible');
    const originEl = document.getElementById('login-origin');
    if(originEl) {
      const origin = window.location.origin;
      if(origin==='null'||origin.startsWith('file')) {
        originEl.innerHTML = '⚠ Running as local file - OAuth requires a hosted URL (localhost or HTTPS)';
        originEl.style.color='var(--red)';
      } else { originEl.textContent = 'URL: '+origin; }
    }
    return;
  }
  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('app').style.display = 'flex';
  await loadFromLocal();
  renderAll();
}

function currentTaxYear() {
  const now=new Date(), y=now.getFullYear();
  return now>=new Date(y,3,6)?y:y-1;
}

function taxQuarterBounds(taxY) {
  return [
    {q:1,start:new Date(taxY,3,6),end:new Date(taxY,6,5,23,59,59),label:'6 Apr - 5 Jul'},
    {q:2,start:new Date(taxY,6,6),end:new Date(taxY,9,5,23,59,59),label:'6 Jul - 5 Oct'},
    {q:3,start:new Date(taxY,9,6),end:new Date(taxY+1,0,5,23,59,59),label:'6 Oct - 5 Jan'},
    {q:4,start:new Date(taxY+1,0,6),end:new Date(taxY+1,3,5,23,59,59),label:'6 Jan - 5 Apr'},
  ];
}

function currentTaxQuarter() {
  const now=new Date(), taxY=currentTaxYear();
  return taxQuarterBounds(taxY).find(q=>now>=q.start&&now<=q.end)||taxQuarterBounds(taxY)[0];
}

function apportionAmount(txn, rangeStart, rangeEnd) {
  if(!txn.amount || txn.amount === 0) return 0;
  
  if(txn.periodStart && txn.periodEnd && txn.periodStart !== '' && txn.periodEnd !== '') {
    const ps = new Date(txn.periodStart);
    const pe = new Date(txn.periodEnd + 'T23:59:59');
    const totalDays = (pe - ps) / 86400000 + 1;
    if(totalDays <= 0) return 0;
    const oStart = ps < rangeStart ? rangeStart : ps;
    const oEnd = pe > rangeEnd ? rangeEnd : pe;
    if(oStart > oEnd) return 0;
    const daysInRange = (oEnd - oStart) / 86400000 + 1;
    return txn.amount * daysInRange / totalDays;
  }
  
  const d = new Date(txn.date);
  if(d >= rangeStart && d <= rangeEnd) {
    return txn.amount;
  }
  return 0;
}

function apportionedAmount(txn, start, end) { return apportionAmount(txn, start, end); }

function getPeriodRange(period) {
  const now = new Date(), y = now.getFullYear(), mo = now.getMonth(), d = now.getDate();
  const today = new Date(y, mo, d, 23, 59, 59), taxY = currentTaxYear();
  let start, end, prevStart, prevEnd, label;
  
  if(period === 'ytd') {
    start = new Date(y, 0, 1);
    end = today;
    prevStart = new Date(y-1, 0, 1);
    prevEnd = new Date(y-1, mo, d, 23, 59, 59);
    label = 'YTD ' + y;
  } else if(period === 'tytd') {
    start = new Date(taxY, 3, 6);
    end = today;
    prevStart = new Date(taxY-1, 3, 6);
    prevEnd = new Date(taxY-1, mo, d, 23, 59, 59);
    label = 'Tax YTD ' + taxY + '/' + String(taxY+1).slice(2);
  } else if(period === 'curtaxq') {
    const q = currentTaxQuarter();
    const qEnd = q.end > today ? today : q.end;
    start = q.start;
    end = qEnd;
    const pq = taxQuarterBounds(taxY-1)[q.q-1];
    prevStart = pq.start;
    prevEnd = pq.end;
    label = 'Tax Q' + q.q;
  } else if(period === 'alltime') {
    const dates = state.txns.map(t => t.date).filter(Boolean).sort();
    start = dates.length ? new Date(dates[0]) : new Date(y, 0, 1);
    end = today;
    prevStart = start;
    prevEnd = start;
    label = 'All time';
  } else if(period === 'custom') {
    const cs = state.customPeriod?.start, ce = state.customPeriod?.end;
    start = cs ? new Date(cs) : new Date(y, 0, 1);
    end = ce ? new Date(ce + 'T23:59:59') : today;
    const len = end - start;
    const prevE = new Date(start.getTime() - 1);
    prevStart = new Date(prevE.getTime() - len);
    prevEnd = prevE;
    label = fmtDate(start.toISOString().slice(0,10)) + ' - ' + fmtDate(end.toISOString().slice(0,10));
  } else {
    start = new Date(y, 0, 1);
    end = today;
    prevStart = new Date(y-1, 0, 1);
    prevEnd = new Date(y-1, mo, d, 23, 59, 59);
    label = 'YTD ' + y;
  }
  return { start, end, prevStart, prevEnd, label };
}

function setCustomPeriod() {
  const s = document.getElementById('cp-start')?.value, e = document.getElementById('cp-end')?.value;
  if(s && e) { state.customPeriod = { start: s, end: e }; renderDashboard(); renderFinance(); }
}

function txnsInRange(start, end) {
  const fpIds = state.filterProp ? [state.filterProp] : state.props.map(p => p.id);
  return state.txns.filter(t => {
    if(!t.date || !fpIds.includes(t.prop)) return false;
    if(t.periodStart && t.periodEnd && t.periodStart !== '' && t.periodEnd !== '') {
      const ps = new Date(t.periodStart);
      const pe = new Date(t.periodEnd + 'T23:59:59');
      return ps <= end && pe >= start;
    }
    const d = new Date(t.date);
    return d >= start && d <= end;
  });
}

function sumIncome(txns, start, end) {
  return txns.filter(t => t.type === 'income').reduce((s, t) => {
    const apportioned = apportionedAmount(t, start, end);
    const share = txnShare(t);
    return s + share * (apportioned / (t.amount || 1));
  }, 0);
}

function sumExpense(txns, start, end) {
  return txns.filter(t => t.type === 'expense').reduce((s, t) => {
    const apportioned = apportionedAmount(t, start, end);
    const share = txnShare(t);
    return s + share * (apportioned / (t.amount || 1));
  }, 0);
}

function deltaChip(curr, prev) {
  if(prev === 0) return '';
  const diff = curr - prev;
  const pct = ((diff / prev) * 100).toFixed(1);
  const up = diff >= 0;
  const color = up ? 'var(--green)' : 'var(--red)';
  const arrow = up ? '▲' : '▼';
  return `<span style="font-size:11px;color:${color}">${arrow} ${fmtMoney(Math.abs(diff))} (${Math.abs(pct)}%)</span>`;
}

function txnCatTotals(propId, start, end) {
  const txns = state.txns.filter(t => t.prop === propId);
  const totals = Object.fromEntries(Object.keys(CAT_LABELS).map(k => [k, 0]));
  txns.forEach(t => { if(t.cat in totals) totals[t.cat] += apportionedAmount(t, start, end); });
  return totals;
}

function certBadgeRow(propId) {
  return ['Gas Safety','EPC','EICR','Insurance'].map(key => {
    const p = getProp(propId);
    let st, expiry, extra = '';
    if(key === 'Insurance') {
      expiry = p?.insuranceRenewal ? fmtDate(p.insuranceRenewal) : '—';
      st = p?.insuranceRenewal ? certStatus(p.insuranceRenewal) : 'grey';
    } else {
      const c = state.certs.find(c => c.propId === propId && c.type === key);
      st = c ? certStatus(c.expiryDate) : 'grey';
      expiry = c ? fmtDate(c.expiryDate) : '—';
      if(key === 'EPC' && c?.epcRating) extra = ` · Band ${c.epcRating}`;
    }
    const lbl = key === 'Gas Safety' ? 'Gas' : key;
    return `<div style="flex:1;min-width:0">
      <div class="label-xs" style="margin-bottom:3px">${lbl}</div>
      <span class="badge badge-${st}" style="font-size:11px">${expiry}${extra}</span>
    </div>`;
  }).join('');
}

function txnRow(t, onDelete, showProp) {
  const p = getProp(t.prop);
  const cat = CAT_LABELS[t.cat] || t.cat;
  const badge = CAT_BADGES[t.cat] || 'badge-grey';
  const periodTag = t.periodStart ? ` <span style="color:var(--blue);font-size:11px">· ${fmtDate(t.periodStart)}–${fmtDate(t.periodEnd)}</span>` : '';
  const propTag = showProp ? ` · ${p ? p.name : '?'}` : '';
  return `<div class="txn-row">
    <div class="txn-icon" style="background:${t.type==='income'?'var(--green-bg)':'var(--red-bg)'}">
      <span style="font-size:13px">${t.type==='income'?'↓':'↑'}</span>
    </div>
    <div class="txn-body">
      <div class="txn-desc">${t.desc}</div>
      <div class="txn-meta">${fmtDate(t.date)}${propTag} · <span class="badge ${badge}">${cat}</span>${periodTag}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div class="txn-amount ${t.type==='income'?'txn-income':'txn-expense'}">${t.type==='expense'?'-':''}${fmtMoney(t.amount)}</div>
      ${onDelete ? `<button class="icon-btn icon-btn-sm" onclick="${onDelete}">✕</button>` : ''}
    </div>
  </div>`;
}

      : `<div class="fw5-13">${fmtMoney(fullRentP)}</div>`;

      ? `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:7px 0">
          <span class="fw5-13">Net income</span>
          <span style="font-size:13px;font-weight:500;color:${fullNet>=0?'var(--green)':'var(--red)'};text-align:right">${fullNet<0?'-':''}${fmtMoney(fullNet)}</span>
          <span style="font-size:13px;font-weight:500;color:var(--blue);text-align:right">${shareNet<0?'-':''}${fmtMoney(shareNet)}</span>
        </div>`
      : `<div class="flex-row" style="padding:7px 0">
          <span class="fw5-13">Net income</span>
          <span style="font-size:14px;font-weight:500;color:${fullNet>=0?'var(--green)':'var(--red)'}">${fullNet<0?'-':''}${fmtMoney(fullNet)}</span>
        </div>`;
    const incomeRow = showShare && ownerShare < 1
      ? `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="fw5-13">Rental income</span>
          <span style="font-size:13px;font-weight:500;color:var(--green);text-align:right">${fmtMoney(fullIncome)}</span>
          <span style="font-size:13px;font-weight:500;color:var(--blue);text-align:right">${fmtMoney(shareIncome)}</span>
        </div>`
      : `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="fw5-13">Rental income</span>
          <span style="font-size:13px;font-weight:500;color:var(--green)">${fmtMoney(fullIncome)}</span>
        </div>`;
    return `<div class="prop-item" onclick="openPropDetail('${p.id}')" style="flex-direction:column;align-items:stretch;gap:0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="prop-dot" style="background:${p.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="prop-name">${p.name}</div>
          <div class="prop-addr">${p.address}</div>
        </div>
        <span class="badge badge-${p.status==='let'?'green':'amber'}">${p.status==='let'?'Let':'Vacant'}</span>
        <div class="prop-arrow">›</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px">
        <div>
          <div class="label-xs-mb">Rent pcm</div>
          ${rentDisplay}
        </div>
        <div><div class="label-xs-mb">Yield</div><div class="fw5-13">${yield_pct}%</div></div>
        <div><div class="label-xs-mb">Period</div><div class="text-sm">${label}</div></div>
      </div>
      <div>
        ${colHeader}
        ${incomeRow}
        ${expCatDefs.map(([k,l])=>catRow(l, catFull[k], catShare[k], false)).join('')}
        ${netRow}
      </div>
      ${certBadges?`<div class="prop-certs" style="margin-top:4px;padding-top:8px;border-top:1px solid var(--border)">${certBadges}</div>`:''}
    </div>`;
  }).join('') + `<button class="btn btn-secondary" style="margin-top:8px" onclick="openAddPropModal()">+ Add property</button>`;
}

// ============================================
// PROPERTY DETAIL - Core functions
// ============================================
function openPropDetail(id) {
  const p = getProp(id);
  if(!p) return;
  document.getElementById('detail-prop-name').textContent = p.name;
  document.getElementById('prop-detail').classList.add('open');
  renderPropDetailContent(id);
}

function closePropDetail() { document.getElementById('prop-detail').classList.remove('open'); }

function switchDTab(name, btn, propId) {
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dtab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dtab-'+name).classList.add('active');
}

function renderPropDetailContent(id) {
  const p = getProp(id);
  const propCerts = state.certs.filter(c=>c.propId===id);
  const propApps = state.appliances.filter(a=>a.propId===id);
  const propMaint = state.maint.filter(m=>m.propId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const propTxns = state.txns.filter(t=>t.prop===id).sort((a,b)=>b.date.localeCompare(a.date));
  const rhRecords = [...(state.rentHistory||[]).filter(r=>r.propId===id)];
  if(p.lastRentIncrease && (p.lastRentAmount||0) > 0) {
    const exists = rhRecords.some(r=>r.startDate===p.lastRentIncrease && r.amount===p.lastRentAmount);
    if(!exists) rhRecords.push({id:'__legacy__',propId:id,amount:p.lastRentAmount,startDate:p.lastRentIncrease,endDate:null,tenant:p.tenant||'',notes:'From tenant record'});
  }
  rhRecords.sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||''));
  
  const tenantTab = `<div id="dtab-tenant" class="dtab-content active">
    <div class="card"><div class="flex-row" style="margin-bottom:10px"><div class="card-title" style="margin-bottom:0">Tenant details</div><button class="btn btn-secondary btn-sm-edit" onclick="openEditTenantModal('${id}')">Edit</button></div>
    ${infoRows([['Tenant', p.tenant||'—'],['Lease start', fmtDate(p.leaseStart)],['Lease end', fmtDate(p.leaseEnd)],['Deposit', p.deposit||'—'],['Email', p.tenantEmail||'—'],['Phone', p.tenantPhone||'—'],['Current rent', fmtMoney(p.rent)+'/mo'],['Last rent increase', p.lastRentIncrease ? fmtDate(p.lastRentIncrease) : '—'],['Previous rent', (p.lastRentAmount||0)>0 ? fmtMoney(p.lastRentAmount)+'/mo'+(p.rent&&p.lastRentAmount>0?' (+'+(((p.rent-p.lastRentAmount)/p.lastRentAmount)*100).toFixed(1)+'%)':'') : '—']])}</div>
    <div class="card"><div class="flex-row" style="margin-bottom:10px"><div class="card-title" style="margin-bottom:0">Letting agent</div><button class="btn btn-secondary btn-sm-edit" onclick="openEditAgentModal('${id}')">Edit</button></div>
    ${infoRows([['Agent name', p.agentName||p.agent||'—'],['Phone', p.agentTel||'—'],['Email', p.agentEmail||'—'],['Mgmt fee', p.mgmtFee ? fmtMoney(p.mgmtFee)+'/mo ex VAT' : '—'],['Incl. VAT', p.mgmtFeeVat ? fmtMoney(p.mgmtFeeVat)+'/mo' : '—']])}</div>
    ${rhRecords.length ? `<div class="section-label" style="margin-top:16px">Rent history</div><div class="card">${rhRecords.map((r,i)=>`<div class="info-row" style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center">${i===0?'<span style="font-size:10px;background:var(--green-bg);color:var(--green);padding:2px 5px;border-radius:4px">Current</span>':'<span></span>'}<span style="font-size:14px;font-weight:500;color:var(--green)">${fmtMoney(r.amount)}/mo</span><span class="text-sm">${fmtDate(r.startDate)}${r.endDate?' – '+fmtDate(r.endDate):' →'}</span>${r.id==='__legacy__'?'<span></span>':`<button class="icon-btn" style="width:24px;height:24px;font-size:11px" onclick="deleteRentHistory('${r.id}','${id}')">✕</button>`}</div>`).join('')}</div>` : ''}
    <button class="btn btn-secondary" style="margin-top:8px" onclick="openAddRentHistoryModal('${id}')">+ Add rent record</button>
  </div>`;
  
  const share = getOwnerShare(p);
  const dispRent = state.shareMode ? shareOf(p,p.rent) : p.rent;
  const dispValue = state.shareMode ? shareOf(p,p.value) : p.value;
  const dispPurch = state.shareMode ? shareOf(p,p.purchase) : p.purchase;
  const dispMort = state.shareMode ? shareOf(p,p.mortgage) : p.mortgage;
  const yld = dispValue>0 ? ((dispRent*12)/dispValue*100).toFixed(1)+'%' : '—';
  const ownerList = (p.owners&&p.owners.length) ? p.owners.map(o=>{ const ow=state.owners.find(x=>x.id===o.ownerId); return (ow?ow.name:'?')+': '+o.share+'%'; }).join(', ') : (p.ownershipShare||100)+'% (you)';
  const sfx = state.shareMode?' (your share)':'';
  const leaseholdFields = p.tenure === 'leasehold' ? [['Lease commencement', fmtDate(p.leaseCommencement)], ['Lease length', p.leaseLength ? p.leaseLength + ' years' : '—']] : [];
  
  const propDetailsTab = `<div id="dtab-propdetails" class="dtab-content">
    <div class="card">${infoRows([['Ownership', ownerList],['Tenure', p.tenure === 'leasehold' ? 'Leasehold' : 'Freehold'], ...leaseholdFields,['Monthly rent'+sfx, fmtMoney(dispRent)+'/mo'],['Annual rent'+sfx, fmtMoney(dispRent*12)],['Purchase price'+sfx, fmtMoney(dispPurch)],['Current value'+sfx, fmtMoney(dispValue)],['Gross yield', yld],['Mortgage/mo'+sfx, fmtMoney(dispMort)],['Net/mo'+sfx, fmtMoney(dispRent-dispMort)],['Lender', p.lender||'—']])}</div>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="openEditPropDetailsModal('${id}')">Edit property details</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="openEditOwnershipModal('${id}')">Edit ownership</button>
    <button class="btn" style="margin-top:8px;background:${p.archived?'var(--green-bg)':'var(--amber-bg)'};color:${p.archived?'var(--green)':'var(--amber)'}" onclick="toggleArchiveProp('${id}')">${p.archived?'✓ Restore property':'Archive property'}</button>
    ${p.archived?'<div style="font-size:12px;color:var(--amber);margin-top:6px">Archived — hidden from calculations. Restore to include again.</div>':''}
  </div>`;
  
  const certsTab = `<div id="dtab-certs" class="dtab-content">
    <div style="font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Certificates</div>
    ${propCerts.length ? propCerts.map(c=>`<div class="cert-item" style="cursor:${c.docData?'pointer':'default'}" onclick="${c.docData?'openCertDoc(\''+c.id+'\')':''}"><div class="cert-info"><div class="cert-name">${c.type}${c.type==='EPC'&&c.epcRating?epcBand(c.epcRating):''}</div><div class="cert-meta">Issued ${fmtDate(c.issueDate)} · Expires ${fmtDate(c.expiryDate)}</div>${c.issuer?'<div class="cert-meta">'+c.issuer+'</div>':''}${c.notes?'<div class="cert-meta" style="color:var(--text3)">'+c.notes+'</div>':''}${c.docData?'<div class="cert-meta" style="color:var(--blue);margin-top:3px">📄 Document attached — tap to open</div>':'<div class="cert-meta" style="color:var(--text3);margin-top:3px">No document — upload via Documents tab</div>'}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><span class="badge badge-${certStatus(c.expiryDate)}">${certLabel(c.expiryDate)}</span>${c.docData?'<button class="icon-btn" style="font-size:11px;width:auto;padding:2px 8px;border-radius:var(--radius-sm)" onclick="event.stopPropagation();openCertDoc(\''+c.id+'\')">Open</button>':''}<button class="icon-btn" onclick="event.stopPropagation();deleteCert('${c.id}','${id}')" title="Delete">✕</button></div></div>`).join('') : '<div class="empty"><div class="empty-icon">📋</div>No certificates yet</div>'}
    <button class="btn btn-secondary" style="margin-top:8px;margin-bottom:16px" onclick="openAddCertModal('${id}')">+ Add certificate</button>
  </div>`;
  
  const maintTab = `<div id="dtab-maintenance" class="dtab-content">
    ${propMaint.length ? propMaint.map(m=>`<div class="cert-item" style="cursor:pointer" onclick="editMaint('${m.id}')"><div class="cert-info"><div class="cert-name">${m.desc}</div><div class="cert-meta">${fmtDate(m.date)}${m.cost?' · '+fmtMoney(m.cost):''}</div>${m.notes?'<div class="cert-meta" style="color:var(--text3)">'+m.notes+'</div>':''}${m.resolution?`<div class="cert-meta" style="color:var(--green);margin-top:4px">✓ Resolved ${fmtDate(m.resolvedDate)}: ${m.resolution}</div>`:''}</div><span class="badge badge-${m.status==='open'?'amber':'green'}">${m.status}</span><button class="icon-btn" onclick="event.stopPropagation();deleteMaint('${m.id}','${id}')" title="Delete">✕</button></div>`).join('') : '<div class="empty"><div class="empty-icon">🔧</div>No maintenance issues</div>'}
    <button class="btn btn-secondary" style="margin-top:8px" onclick="openAddMaintModal('${id}')">+ Log issue</button>
  </div>`;
  
  const contactsTab = `<div id="dtab-contacts" class="dtab-content">
    <div class="card"><div class="card-title">Key contacts</div>${infoRows([['Letting agent', p.agentName||p.agent||'—'],['Agent phone', p.agentTel||'—'],['Gas engineer', p.gasEngineer||'—'],['Electrician', p.electrician||'—'],['Solicitor', p.solicitor||'—']])}</div>
    <div class="card" style="margin-top:10px"><div class="card-title">Insurance</div>${infoRows([['Provider', p.insuranceProvider||p.insurance||'—'],['Policy no.', p.insurancePolicyNo||'—'],['Type', p.insuranceType||'—'],['Premium', p.insurancePremium?fmtMoney(p.insurancePremium)+'/yr':'—'],['Renewal', p.insuranceRenewal?fmtDate(p.insuranceRenewal):'—'],['Broker', p.insuranceContact||'—']])}<button class="btn btn-secondary" style="margin-top:10px" onclick="openEditInsuranceModal('${id}')">Edit insurance</button></div>
  </div>`;
  
  const finLogTab = `<div id="dtab-transactions" class="dtab-content"><div class="card">${propTxns.length ? propTxns.map(t=>txnRow(t,`deleteTxn('${t.id}','${id}')`,false)).join('') : '<div class="empty" style="padding:12px 0">No transactions yet</div>'}</div></div>`;
  
  const propDocs = (p.docs || []).filter(d => d.propertyId === id || !d.propertyId);
  const categorizedDocs = { 'Tenancy': [], 'Certificates': [], 'Receipts': [], 'Ownership': [], 'Other': [] };
  propDocs.forEach(doc => { const cat = doc.category || 'Other'; if(categorizedDocs[cat]) categorizedDocs[cat].push(doc); else categorizedDocs['Other'].push(doc); });
  propCerts.forEach(cert => { if(cert.docData) categorizedDocs['Certificates'].push({ id: cert.id, name: `${cert.type} Certificate`, category: 'Certificates', date: cert.issueDate, fileData: cert.docData, fileMime: cert.docMime, isCert: true }); });
  
  const appliancesSection = propApps.length ? `
    <div class="card">
      <div class="card-title">Appliances</div>
      ${propApps.map(a => `<div class="info-row" style="cursor:pointer" onclick="openEditApplianceModal('${a.id}','${id}')"><div><div class="cert-name">${a.name}</div><div class="cert-meta">${a.make} ${a.model} · S/N: ${a.serial}</div></div><button class="icon-btn" onclick="event.stopPropagation();deleteAppliance('${a.id}','${id}')">✕</button></div>`).join('')}
      <button class="btn btn-secondary" style="margin-top:8px" onclick="openAddApplianceModal('${id}')">+ Add appliance</button>
    </div>
  ` : '<div class="card"><div class="card-title">Appliances</div><div class="empty">No appliances logged</div><button class="btn btn-secondary" style="margin-top:8px" onclick="openAddApplianceModal('${id}')">+ Add appliance</button></div>';
  
  const docsTab = `<div id="dtab-documents" class="dtab-content">
    ${appliancesSection}
    <div class="card"><div class="card-title">Upload Document</div><div class="form-field"><label>Category</label><select id="prop-doc-category"><option value="Tenancy">🏠 Tenancy</option><option value="Certificates">✅ Certificates</option><option value="Receipts">💰 Receipts</option><option value="Ownership">📋 Ownership</option><option value="Other">📁 Other</option></select></div><div class="form-field"><label>Document Date</label><input type="date" id="prop-doc-date" value="${new Date().toISOString().slice(0,10)}"></div><div class="form-field"><label>Description (optional)</label><input type="text" id="prop-doc-label" placeholder="e.g. Tenancy agreement"></div><div class="upload-zone" onclick="document.getElementById('prop-doc-file').click()"><p>📎 Tap to choose a file</p><span>PDF, JPG, or PNG</span></div><input type="file" id="prop-doc-file" class="upload-input" accept=".pdf,.jpg,.jpeg,.png" onchange="uploadPropertyDoc('${id}')"><div id="prop-doc-status"></div></div>
    ${Object.entries(categorizedDocs).filter(([_, docs]) => docs.length > 0).map(([category, docs]) => `<div class="card"><div class="card-title">${category}</div>${docs.map(doc => `<div class="info-row" style="cursor:pointer" onclick="openPropertyDoc('${id}', '${doc.id}', '${doc.isCert ? 'cert' : 'doc'}')"><div><div class="cert-name">${doc.name || 'Document'}</div><div class="cert-meta">${fmtDate(doc.date)}</div></div><button class="icon-btn" onclick="event.stopPropagation();deletePropertyDoc('${id}', '${doc.id}', '${doc.isCert ? 'cert' : 'doc'}')">✕</button></div>`).join('')}</div>`).join('')}
    ${propDocs.length === 0 && propCerts.filter(c=>c.docData).length === 0 ? '<div class="empty"><div class="empty-icon">📁</div>No documents yet</div>' : ''}
  </div>`;
  
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-tabs">
      <button class="dtab active" onclick="switchDTab('tenant',this,'${id}')">Tenant</button>
      <button class="dtab" onclick="switchDTab('propdetails',this,'${id}')">Prop Details</button>
      <button class="dtab" onclick="switchDTab('certs',this,'${id}')">Certificates</button>
      <button class="dtab" onclick="switchDTab('maintenance',this,'${id}')">Maintenance</button>

      <button class="dtab" onclick="switchDTab('documents',this,'${id}')">Documents</button>
    </div>
    ${tenantTab}${propDetailsTab}${certsTab}${maintTab}${contactsTab}${finLogTab}${docsTab}`;
}

function openEditTenantModal(propId) {
  const p = getProp(propId);
  openModal(`<div class="modal-title">Edit tenant details</div>
    <div class="form-row"><div class="form-field"><label>Tenant name</label><input type="text" id="et-name" value="${p.tenant||''}"></div><div class="form-field"><label>Current rent (£/mo)</label><input type="number" id="et-rent" value="${p.rent||''}" step="1"></div></div>
    <div class="form-row"><div class="form-field"><label>Lease start</label><input type="date" id="et-lstart" value="${p.leaseStart&&p.leaseStart!=='—'?p.leaseStart:''}"></div><div class="form-field"><label>Lease end</label><input type="date" id="et-lend" value="${p.leaseEnd&&p.leaseEnd!=='—'?p.leaseEnd:''}"></div></div>
    <div class="form-row"><div class="form-field"><label>Deposit</label><input type="text" id="et-deposit" value="${p.deposit||''}"></div><div class="form-field"><label>Email</label><input type="text" id="et-email" value="${p.tenantEmail||''}"></div></div>
    <div class="form-field"><label>Phone</label><input type="text" id="et-phone" value="${p.tenantPhone||''}"></div>
    <button class="btn btn-primary" onclick="saveTenantEdit('${propId}')">Save</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

function saveTenantEdit(propId) {
  const p = getProp(propId);
  p.tenant = document.getElementById('et-name').value||'—';
  p.rent = parseFloat(document.getElementById('et-rent').value)||p.rent;
  p.leaseStart = document.getElementById('et-lstart').value||'—';
  p.leaseEnd = document.getElementById('et-lend').value||'—';
  p.deposit = document.getElementById('et-deposit').value||'—';
  p.tenantEmail = document.getElementById('et-email').value||'—';
  p.tenantPhone = document.getElementById('et-phone').value||'—';
  saveState('props'); closeModal(); renderPropDetailContent(propId); renderAll();
}

function openEditAgentModal(propId) {
  const p = getProp(propId);
  const fee = p.mgmtFee||'';
  const feeVat = p.mgmtFeeVat||'';
  openModal(`<div class="modal-title">Edit letting agent</div>
    <div class="form-row"><div class="form-field"><label>Agent name</label><input type="text" id="ea-name" value="${p.agentName||p.agent||''}"></div><div class="form-field"><label>Agent phone</label><input type="text" id="ea-tel" value="${p.agentTel||''}"></div></div>
    <div class="form-field"><label>Agent email</label><input type="text" id="ea-email" value="${p.agentEmail||''}"></div>
    <div class="form-row"><div class="form-field"><label>Management fee (£/mo)</label><input type="number" id="ea-fee" value="${fee}" step="0.01" placeholder="ex VAT"></div><div class="form-field"><label>Incl. VAT (£/mo)</label><input type="number" id="ea-feevat" value="${feeVat}" step="0.01" placeholder="inc VAT" oninput="eaCalcFee()"></div></div>
    <div id="ea-hint" style="font-size:12px;color:var(--text2);margin-bottom:8px"></div>
    <button class="btn btn-primary" onclick="saveAgentEdit('${propId}')">Save</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

function eaCalcFee() {
  const vat = parseFloat(document.getElementById('ea-feevat')?.value||0);
  if(vat > 0) {
    const exVat = (vat/1.2).toFixed(2);
    const feeEl = document.getElementById('ea-fee');
    if(feeEl && !feeEl.value) feeEl.value = exVat;
    const hint = document.getElementById('ea-hint');
    if(hint) hint.textContent = `Ex VAT: £${exVat}/mo (20% VAT = £${(vat-vat/1.2).toFixed(2)})`;
  }
}

function saveAgentEdit(propId) {
  const p = getProp(propId);
  p.agentName = document.getElementById('ea-name').value||'—';
  p.agent = p.agentName;
  p.agentTel = document.getElementById('ea-tel').value||'—';
  p.agentEmail = document.getElementById('ea-email').value||'—';
  p.mgmtFee = parseFloat(document.getElementById('ea-fee').value)||0;
  p.mgmtFeeVat = parseFloat(document.getElementById('ea-feevat').value)||0;
  saveState('props'); closeModal(); renderPropDetailContent(propId);
}

function openAddRentHistoryModal(propId) {
  openModal(`<div class="modal-title">Add rent record</div>
    <div class="form-row"><div class="form-field"><label>Monthly rent (£)</label><input type="number" id="rh-amount" step="1" placeholder="e.g. 1450"></div><div class="form-field"><label>Tenant</label><input type="text" id="rh-tenant" placeholder="Tenant name"></div></div>
    <div class="form-row"><div class="form-field"><label>Start date</label><input type="date" id="rh-start"></div><div class="form-field"><label>End date</label><input type="date" id="rh-end"></div></div>
    <div class="form-field"><label>Notes</label><input type="text" id="rh-notes" placeholder="e.g. Initial tenancy, renewal +5%"></div>
    <button class="btn btn-primary" onclick="saveRentHistory('${propId}')">Save</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

function saveRentHistory(propId) {
  const amt = parseFloat(document.getElementById('rh-amount').value)||0;
  if(!amt){alert('Please enter a rent amount.');return;}
  if(!state.rentHistory) state.rentHistory=[];
  state.rentHistory.push({id:uid(),propId,amount:amt,tenant:document.getElementById('rh-tenant').value,startDate:document.getElementById('rh-start').value,endDate:document.getElementById('rh-end').value||null,notes:document.getElementById('rh-notes').value});
  saveState('rentHistory'); closeModal(); renderPropDetailContent(propId);
}

function renderFinance() {
  const period = state.dashPeriod || 'ytd';
  const {start, end, label} = getPeriodRange(period);
  const allTxns = state.filterProp ? state.txns.filter(t=>t.prop===state.filterProp) : state.txns;
  const ftxns = allTxns.filter(t=>{
    if(!t.date) return false;
    if(t.periodStart && t.periodEnd && t.periodStart !== '' && t.periodEnd !== '') {
      const ps = new Date(t.periodStart);
      const pe = new Date(t.periodEnd + 'T23:59:59');
      return ps <= end && pe >= start;
    }
    const d = new Date(t.date);
    return d >= start && d <= end;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const typeFilter = state.financeTab;
  const shown = typeFilter==='all' ? ftxns : ftxns.filter(t=>t.type===typeFilter);
  const income = ftxns.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,start,end)/(t.amount||1)),0);
  const expense = ftxns.filter(t=>t.type==='expense').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,start,end)/(t.amount||1)),0);
  const net = income - expense;
  
  const fmtShort = d => d ? d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}) : '';
  const dateRange = `${fmtShort(start)} – ${fmtShort(end)}`;
  
  const periods = [
    {v:'ytd',l:'YTD'},{v:'tytd',l:'Tax YTD'},{v:'curtaxq',l:'Tax Q'},{v:'alltime',l:'All time'},{v:'custom',l:'Custom'}
  ];
  const periodBar = `<div class="toggle-bar" style="margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap">
    ${periods.map(p=>`<button class="toggle-btn ${period===p.v?'active':''}" style="white-space:nowrap;padding:6px 10px" onclick="state.dashPeriod='${p.v}';renderFinance()">${p.l}</button>`).join('')}
  </div>`;
  
  const customPicker = period === 'custom' ? `
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <div class="form-field" style="margin-bottom:0;flex:1"><label>Start</label><input type="date" id="cp-start" value="${state.customPeriod.start || ''}" onchange="setCustomPeriod()"></div>
      <div class="form-field" style="margin-bottom:0;flex:1"><label>End</label><input type="date" id="cp-end" value="${state.customPeriod.end || ''}" onchange="setCustomPeriod()"></div>
    </div>
  ` : '';
  
  document.getElementById('screen-finance').innerHTML = `
    ${periodBar}
    ${customPicker}
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;text-align:center">${dateRange}</div>
    <div class="metrics" style="grid-template-columns:1fr 1fr 1fr">
      <div class="metric"><div class="metric-label">Income</div><div class="metric-value" style="color:var(--green);font-size:18px">${fmtMoney(income)}</div><div class="metric-sub">${ftxns.filter(t=>t.type==='income').length} entries</div></div>
      <div class="metric"><div class="metric-label">Expenses</div><div class="metric-value" style="color:var(--red);font-size:18px">${fmtMoney(expense)}</div><div class="metric-sub">${ftxns.filter(t=>t.type==='expense').length} entries</div></div>
      <div class="metric"><div class="metric-label">Net profit</div><div class="metric-value" style="color:${net>=0?'var(--green)':'var(--red)'};font-size:18px">${net<0?'-':''}${fmtMoney(net)}</div><div class="metric-sub">${label}</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="openAddTxnModal()">+ Add transaction</button>
      <button class="btn btn-primary" style="flex:1" onclick="showMTDExportModal()">📊 MTD Export</button>
    </div>
    <div class="toggle-bar">
      <button class="toggle-btn ${typeFilter==='all'?'active':''}" onclick="setFinTab('all')">All</button>
      <button class="toggle-btn ${typeFilter==='income'?'active':''}" onclick="setFinTab('income')">Income</button>
      <button class="toggle-btn ${typeFilter==='expense'?'active':''}" onclick="setFinTab('expense')">Expenses</button>
    </div>
    <div class="card">${shown.length ? shown.map(t=>txnRow(t,`deleteTxnGlobal('${t.id}')`,true)).join('') : '<div class="empty">No transactions for this period</div>'}</div>`;
}

function setFinTab(t) { state.financeTab=t; renderFinance(); }
function deleteTxnGlobal(tId) { state.txns=state.txns.filter(t=>t.id!==tId); saveState('txns'); renderFinance(); renderAll(); }

function getCategoriesByType(type) {
  if(type === 'income') {
    return ['rental-income'];
  } else {
    return ['premises', 'repairs', 'financial', 'professional', 'services', 'travel', 'other-allowable'];
  }
}

function openAddTxnModal() {
  const propOpts = state.props.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  const type = 'income';
  const catOptions = getCategoriesByType(type).map(cat => `<option value="${cat}">${CAT_LABELS[cat]}</option>`).join('');
  
  openModal(`<div class="modal-title">Add transaction</div>
    <div class="form-row"><div class="form-field"><label>Property</label><select id="mt-prop">${propOpts}</select></div>
    <div class="form-field"><label>Date received / paid</label><input type="date" id="mt-date"></div></div>
    <div class="form-row"><div class="form-field"><label>Type</label><select id="mt-type" onchange="updateTxnCats()"><option value="income">Income</option><option value="expense">Expense</option></select></div>
    <div class="form-field"><label>Category</label><select id="mt-cat">${catOptions}</select></div></div>
    <div class="form-row"><div class="form-field"><label>Amount (£)</label><input type="number" id="mt-amount" step="0.01"></div><div class="form-field"><label>Description</label><input type="text" id="mt-desc" placeholder="e.g. Monthly rent"></div></div>
    <div id="mt-period-wrap"><div style="font-size:12px;color:var(--blue);background:var(--blue-bg);border:1px solid #B5D4F4;border-radius:var(--radius-sm);padding:6px 10px;margin-bottom:8px">Record the period this payment covers (MTD compliance)</div>
    <div class="form-row"><div class="form-field"><label>Period start</label><input type="date" id="mt-period-start" oninput="mtCalcPeriodEnd()"></div><div class="form-field"><label>Duration</label><select id="mt-period-duration" onchange="mtCalcPeriodEnd()"><option value="">— specify dates below —</option><option value="1">1 month</option><option value="3">3 months</option><option value="6">6 months</option><option value="12">1 year</option><option value="24">2 years</option><option value="36">3 years</option></select></div></div>
    <div class="form-row"><div class="form-field"><label>Period end</label><input type="date" id="mt-period-end"></div><div id="mt-period-hint" style="display:flex;align-items:center;font-size:12px;color:var(--blue);padding-top:18px"></div></div></div>
    <div class="form-field"><label>Supplier / tenant</label><input type="text" id="mt-supplier"></div>
    <button class="btn btn-primary" onclick="saveManualTxn()">Save</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

function updateTxnCats() {
  const type = document.getElementById('mt-type').value;
  const catSel = document.getElementById('mt-cat');
  if(catSel) {
    const cats = getCategoriesByType(type);
    catSel.innerHTML = cats.map(cat => `<option value="${cat}">${CAT_LABELS[cat]}</option>`).join('');
  }
}

function mtCalcPeriodEnd() {
  const startVal = document.getElementById('mt-period-start')?.value;
  const months = parseInt(document.getElementById('mt-period-duration')?.value||'0');
  const hint = document.getElementById('mt-period-hint');
  if(startVal && months > 0) {
    const d = new Date(startVal);
    d.setMonth(d.getMonth() + months);
    d.setDate(d.getDate() - 1);
    const endEl = document.getElementById('mt-period-end');
    if(endEl) endEl.value = d.toISOString().slice(0,10);
    if(hint) hint.textContent = months >= 12 ? `${months/12} yr` : `${months} mo`;
  } else {
    if(hint) hint.textContent = '';
  }
}

function saveManualTxn() {
  const d = document.getElementById('mt-date').value;
  const desc = document.getElementById('mt-desc').value;
  const amt = parseFloat(document.getElementById('mt-amount').value)||0;
  if(!d||!desc||!amt){alert('Please fill in date, description and amount.');return;}
  const cat = document.getElementById('mt-cat').value;
  const periodStart = document.getElementById('mt-period-start')?.value || '';
  const periodEnd = document.getElementById('mt-period-end')?.value || '';
  if(periodStart && !periodEnd) { alert('Please enter period end date'); return; }
  if(!periodStart && periodEnd) { alert('Please enter period start date'); return; }
  if(periodStart && periodEnd && new Date(periodStart) > new Date(periodEnd)) { alert('Period start must be before period end'); return; }
  state.txns.push({
    id:uid(), date:d, type:document.getElementById('mt-type').value, desc,
    prop:document.getElementById('mt-prop').value, cat, amount:amt,
    supplier:document.getElementById('mt-supplier').value,
    periodStart: periodStart, periodEnd: periodEnd
  });
  saveState('txns'); closeModal(); renderFinance(); renderDashboard();
}

    <div class="modal-title">MTD for Income Tax Export</div>

    <div class="form-field"><label>Tax Year</label>
      <select id="mtd-tax-year">${taxYears.map(y => `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}/${y+1}</option>`).join('')}
      </select>
    </div>
    <div class="form-field"><label>Export Type</label>
      <select id="mtd-export-type">
        <option value="full">Full Year Summary</option>
        <option value="quarterly">Quarterly Breakdown</option>
        <option value="csv">CSV Export</option>
      </select>
    </div>
    <div class="form-field" id="mtd-quarter-field" style="display:none"><label>Quarter (for quarterly breakdown)</label>
      <select id="mtd-quarter">
        <option value="1">Q1 (6 Apr - 5 Jul)</option>
        <option value="2">Q2 (6 Jul - 5 Oct)</option>
        <option value="3">Q3 (6 Oct - 5 Jan)</option>
        <option value="4">Q4 (6 Jan - 5 Apr)</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="generateMTDReport()">Generate & Save to Drive</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>
  `);

async function generateMTDReport() {
  const taxYear = parseInt(document.getElementById('mtd-tax-year').value);
  const exportType = document.getElementById('mtd-export-type').value;
  const quarter = parseInt(document.getElementById('mtd-quarter')?.value || 1);
  
  const start = new Date(taxYear, 3, 6);
  const end = new Date(taxYear + 1, 3, 5, 23, 59);
  
  const yearTxns = state.txns.filter(t => {
    if(!t.date) return false;
    if(t.periodStart && t.periodEnd && t.periodStart !== '' && t.periodEnd !== '') {
      const ps = new Date(t.periodStart);
      const pe = new Date(t.periodEnd + 'T23:59:59');
      return ps <= end && pe >= start;
    }
    const d = new Date(t.date);
    return d >= start && d <= end;
  });
  
  let content = '', filename = '', mimeType = 'text/plain';
  
  if(exportType === 'csv') {
    const rows = [['Date','Description','Property','Category','Type','Amount (£)','Period Start','Period End']];
    yearTxns.forEach(t => {
      const p = getProp(t.prop);
      const apportioned = apportionedAmount(t, start, end);
      rows.push([t.date, t.desc, p?.name || t.prop, CAT_LABELS[t.cat] || t.cat, t.type === 'income' ? 'Income' : 'Expense', (t.type === 'expense' ? -apportioned : apportioned).toFixed(2), t.periodStart || '', t.periodEnd || '']);
    });
    content = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
    filename = `MTD_TaxYear_${taxYear}-${taxYear+1}_${new Date().toISOString().slice(0,10)}.csv`;
    mimeType = 'text/csv';
  } else if(exportType === 'quarterly') {
    const quarters = [1,2,3,4].map(q => {
      let qs, qe;
      if(q===1){qs=new Date(taxYear,3,6);qe=new Date(taxYear,6,5,23,59);}
      else if(q===2){qs=new Date(taxYear,6,6);qe=new Date(taxYear,9,5,23,59);}
      else if(q===3){qs=new Date(taxYear,9,6);qe=new Date(taxYear+1,0,5,23,59);}
      else{qs=new Date(taxYear+1,0,6);qe=new Date(taxYear+1,3,5,23,59);}
      const qt = yearTxns.filter(t => {
        if(t.periodStart && t.periodEnd && t.periodStart !== '' && t.periodEnd !== '') {
          const ps = new Date(t.periodStart);
          const pe = new Date(t.periodEnd + 'T23:59:59');
          return ps <= qe && pe >= qs;
        }
        const d = new Date(t.date);
        return d >= qs && d <= qe;
      });
      const inc = qt.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,qs,qe)/(t.amount||1)),0);
      const fin = qt.filter(t=>t.type==='expense'&&t.cat==='financial').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,qs,qe)/(t.amount||1)),0);
      const oth = qt.filter(t=>t.type==='expense'&&t.cat!=='financial').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,qs,qe)/(t.amount||1)),0);
      const qLabels = ['', '6 Apr – 5 Jul', '6 Jul – 5 Oct', '6 Oct – 5 Jan', '6 Jan – 5 Apr'];
      return `\n${qLabels[q]}\n${'─'.repeat(40)}\nGross income: £${inc.toFixed(2)}\nFinance costs: £${fin.toFixed(2)}\nOther expenses: £${oth.toFixed(2)}\nNet profit: £${(inc-fin-oth).toFixed(2)}\n`;
    }).join('');
    content = `PROPERTY PORTFOLIO – MTD QUARTERLY REPORT\nTax year ${taxYear}/${taxYear+1}\nGenerated: ${new Date().toLocaleDateString('en-GB')}\n${'═'.repeat(50)}\n${quarters}`;
    filename = `MTD_Quarterly_${taxYear}-${taxYear+1}_${new Date().toISOString().slice(0,10)}.txt`;
  } else {
    const gross = yearTxns.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,start,end)/(t.amount||1)),0);
    const finance = yearTxns.filter(t=>t.type==='expense'&&t.cat==='financial').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,start,end)/(t.amount||1)),0);
    const other = yearTxns.filter(t=>t.type==='expense'&&t.cat!=='financial').reduce((s,t)=>s+txnShare(t)*(apportionedAmount(t,start,end)/(t.amount||1)),0);
    content = `PROPERTY PORTFOLIO – MTD FOR INCOME TAX\nFull tax year ${taxYear}/${taxYear+1}\nGenerated: ${new Date().toLocaleDateString('en-GB')}\n${'─'.repeat(48)}\n\nUK PROPERTY INCOME\n  Gross rental income: £${gross.toFixed(2)}\n\nALLOWABLE EXPENSES\n  Residential finance costs: £${finance.toFixed(2)}\n  Other allowable expenses: £${other.toFixed(2)}\n\nSUMMARY\n  Total expenses: £${(finance+other).toFixed(2)}\n  Net profit / (loss): £${(gross-finance-other).toFixed(2)}\n\n${'─'.repeat(48)}\nTRANSACTION COUNT: ${yearTxns.length} (${yearTxns.filter(t=>t.type==='income').length} income, ${yearTxns.filter(t=>t.type==='expense').length} expense)\n\nNOTE: This report is for reference only. Submit via HMRC-approved MTD software for official filing.`;
    filename = `MTD_FullYear_${taxYear}-${taxYear+1}_${new Date().toISOString().slice(0,10)}.txt`;
  }
  
  if(gAccessToken && gDriveFolderIds.root) {
    try {
      const reportsFolder = await findOrCreateFolder('Tax Reports', gDriveFolderIds.root);
      const blob = new Blob([content], { type: mimeType });
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [reportsFolder] })], { type: 'application/json' }));
      form.append('file', blob);
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      showToast('✓ MTD report saved to Drive (Tax Reports folder)');
    } catch(e) {
      console.warn('Drive save failed:', e);
      showToast('⚠ Report saved locally only', true);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
      a.download = filename;
      a.click();
    }
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
    a.download = filename;
    a.click();
    showToast('Report downloaded (not signed in to Drive)');
  }
  closeModal();
}

function renderMaintenance() {
  const fpIds = (state.filterProp?[state.filterProp]:state.props.map(p=>p.id));
  const filter = state.maintFilter || 'open';
  const shown = state.maint.filter(m => fpIds.includes(m.propId) && (filter==='all' || m.status===filter)).sort((a,b)=>b.date.localeCompare(a.date));
  const openCount = state.maint.filter(m=>fpIds.includes(m.propId)&&m.status==='open').length;
  
  document.getElementById('screen-maintenance').innerHTML = `
    <div class="metrics" style="grid-template-columns:1fr 1fr"><div class="metric"><div class="metric-label">Open</div><div style="font-size:22px;color:var(--amber)">${openCount}</div></div></div>
    <div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn btn-primary" style="flex:1" onclick="openAddMaintModal(null)">+ Log issue</button></div>
    <div class="toggle-bar"><button class="toggle-btn ${filter==='open'?'active':''}" onclick="state.maintFilter='open';renderMaintenance()">Open</button><button class="toggle-btn ${filter==='resolved'?'active':''}" onclick="state.maintFilter='resolved';renderMaintenance()">Resolved</button><button class="toggle-btn ${filter==='all'?'active':''}" onclick="state.maintFilter='all';renderMaintenance()">All</button></div>
    ${shown.map(m => {

      return `<div class="card"><div class="flex-row"><div><div class="fw5-14" style="cursor:pointer" onclick="editMaint('${m.id}')">${m.desc}</div><div class="text-sm">${p?.name||'?'} · ${fmtDate(m.date)}</div>${m.resolution?`<div class="text-sm" style="color:var(--green);margin-top:4px">✓ Resolved ${fmtDate(m.resolvedDate)}: ${m.resolution}</div>`:''}</div><span class="badge badge-${m.status==='open'?'amber':'green'}">${m.status}</span></div>${m.cost>0?`<div class="text-sm">Cost: ${fmtMoney(m.cost)}</div>`:''}${m.notes?`<div class="text-sm">${m.notes}</div>`:''}<div class="gap-8" style="margin-top:8px"><button class="btn btn-secondary" style="flex:1" onclick="editMaint('${m.id}')">Edit</button><button class="btn" style="flex:1;background:var(--red-bg);color:var(--red)" onclick="deleteMaintGlobal('${m.id}')">Delete</button></div></div>`;
    }).join('') || '<div class="empty">No issues</div>'}`;
}

function toggleResolvedFieldsInModal(status) {
  const wrap = document.getElementById('mm-resolved-wrap');
  if(wrap) wrap.style.display = status === 'resolved' ? 'block' : 'none';
}

function saveMaintWithResolution() {
  const status = document.getElementById('mm-status').value;
  const maintItem = {
    id: uid(),
    propId: document.getElementById('mm-prop').value,
    desc: document.getElementById('mm-desc').value,
    date: document.getElementById('mm-date').value,
    status: status,
    priority: document.getElementById('mm-priority').value,
    cost: parseFloat(document.getElementById('mm-cost').value) || 0,
    contractor: document.getElementById('mm-contractor').value,
    notes: document.getElementById('mm-notes').value,
    resolution: '',
    resolvedDate: ''
  };
  if(status === 'resolved') {
    maintItem.resolution = document.getElementById('mm-resolution').value;
    maintItem.resolvedDate = document.getElementById('mm-resolved-date').value;
  }
  state.maint.push(maintItem);
  saveState('maint');
  closeModal();
  renderMaintenance();
  renderAll();
}

function editMaint(id) {
  const m = state.maint.find(x=>x.id===id);
  if(!m) return;
  const propOpts = state.props.map(p=>`<option value="${p.id}"${p.id===m.propId?' selected':''}>${p.name}</option>`).join('');
  openModal(`<div class="modal-title">Edit issue</div>
    <div class="form-field"><label>Property</label><select id="em-prop">${propOpts}</select></div>
    <div class="form-field"><label>Description</label><input type="text" id="em-desc" value="${m.desc.replace(/"/g, '&quot;')}"></div>

function deleteOwner(id) {
