<html lang="en">
<head>

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --border2: #CEC9BE;
  --text: #1A1916;
  --text2: #6B6760;
  --text3: #A09D98;
  --green: #2D5A27;
  --green-bg: #EAF2E8;
  --red: #8B2020;
  --red-bg: #F5EAEA;
  --amber: #7A4A0A;
  --amber-bg: #FAF0E0;
  --blue: #1A3A5C;
  --blue-bg: #E8F0F8;
  --purple: #3D2B6B;
  --purple-bg: #EEEAF5;
  --teal: #1A4A40;
  --teal-bg: #E6F2F0;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 15px; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
#header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); flex: 1; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); padding-bottom: calc(var(--nav-h) + 16px); }
#nav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; safe-area-inset-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--text3); padding: 8px 4px; transition: color .15s; }
.nav-btn.active { color: var(--text); }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; letter-spacing: .02em; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
.section-label { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 8px; }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.metric-value {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: -.02em;
  margin-bottom: 3px;
}
.metric-sub { font-size: 12px; color: var(--text2); }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-grey { background: var(--surface2); color: var(--text2); }
.alert-strip {  background: var(--red-bg);  border: 1px solid #E8A0A0;  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--red);
}
.alert-strip-amber {  background: var(--amber-bg); border-color: #E8C878;  color: var(--amber);
}
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.info-val { font-size: 14px; text-align: right; }
.fw5-14 { font-size: 14px; font-weight: 500; }
.fw5-13 { font-size: 13px; font-weight: 500; }
.fw5-11-blue { font-size: 11px; font-weight: 500; color: var(--blue); }
.label-xs {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.label-xs-mb {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 3px;
}
.prop-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; gap: 12px; align-items: center; }
.prop-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.prop-name { font-size: 15px; font-weight: 500; }
.prop-addr { font-size: 13px; color: var(--text2); margin-top: 1px; }
#prop-detail { position: fixed; inset: 0; z-index: 150; background: var(--bg); display: none; flex-direction: column; }
#prop-detail.open { display: flex; }
#detail-header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }
.prop-arrow { font-size: 18px; color: var(--text3); }
.prop-certs { display: flex; flex-wrap: wrap; gap: 6px; }
.back-btn { font-size: 15px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; }
#detail-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 32px; }
#login-screen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
#login-screen.visible { display: flex; }
.detail-tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 16px; scrollbar-width: none; }
.dtab { font-size: 13px; font-weight: 500; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; }
.dtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.toggle-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.toggle-btn {
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.toggle-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
.dtab-content { display: none; }
.dtab-content.active { display: block; }
.txn-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.txn-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.txn-body { flex: 1; min-width: 0; }
.txn-desc { font-size: 14px; font-weight: 500; }
.txn-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
.txn-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
.txn-income { color: var(--green); }
.txn-expense { color: var(--red); }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 28px 16px; text-align: center; cursor: pointer; background: var(--surface2); margin-bottom: 10px; }
.upload-zone p { font-size: 14px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.upload-input { display: none; }
.form-field { margin-bottom: 12px; }
.form-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 4px; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-sm-edit {
  font-size: 12px;
  padding: 4px 10px;
  width: auto;
  margin-top: 0;
}
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { padding: 20px; text-align: center; font-size: 14px; color: var(--text2); }
.cert-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.cert-info { flex: 1; }
.cert-name { font-size: 14px; font-weight: 500; }
.cert-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.alert { background: var(--amber-bg); border: 1px solid #E8C878; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: var(--amber); }
#modal { position: fixed; inset: 0; z-index: 300; display: none; flex-direction: column; justify-content: flex-end; }
#modal.open { display: flex; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
.modal-panel { position: relative; background: var(--surface); border-radius: 20px 20px 0 0; padding: 16px 16px 40px; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
.empty { text-align: center; padding: 32px 16px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.toast { position: fixed; bottom: calc(var(--nav-h) + 8px); right: 12px; z-index: 90; font-size: 11px; padding: 6px 12px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.toast.show { opacity: 1; }
.flex-row { display: flex; justify-content: space-between; align-items: center; }
.gap-8 { display: flex; gap: 8px; }
.text-sm { font-size: 12px; color: var(--text2); }
</style>
</head>
<body>

<div id="login-screen" class="visible">

  <div style="font-size:14px;color:var(--text2);margin-bottom:40px;text-align:center">Sign in to sync your data with Google Drive</div>

</div>

<div id="toast" class="toast"></div>

<div id="app" style="display:none">
  <div id="header">
    <div id="header-title">Portfolio</div>
    <select id="prop-select" onchange="setFilterProp(this.value)" style="font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);max-width:110px;"><option value="">All props</option></select>
    <select id="owner-select" onchange="setOwnerMode(this.value)" style="font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);max-width:110px;"><option value="">All owners</option></select>
    <button onclick="signOut()" title="Sign out" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;">⇤</button>
  </div>
  <div id="content">
    <div id="screen-dashboard" class="screen active"></div>
    <div id="screen-properties" class="screen"></div>
    <div id="screen-finance" class="screen"></div>
    <div id="screen-maintenance" class="screen"></div>
    <div id="screen-docs" class="screen"></div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showScreen('dashboard',this)"><span class="nav-icon">⌂</span><span class="nav-label">Overview</span></button>
    <button class="nav-btn" onclick="showScreen('properties',this)"><span class="nav-icon">⊞</span><span class="nav-label">Properties</span></button>
    <button class="nav-btn" onclick="showScreen('finance',this)"><span class="nav-icon">£</span><span class="nav-label">Finance</span></button>
    <button class="nav-btn" onclick="showScreen('maintenance',this)"><span class="nav-icon">🔧</span><span class="nav-label">Maintenance</span></button>
    <button class="nav-btn" onclick="showScreen('docs',this)"><span class="nav-icon">📄</span><span class="nav-label">Documents</span></button>
  </div>
</div>

<div id="prop-detail">
  <div id="detail-header">
    <button class="back-btn" onclick="closePropDetail()">← Back</button>
    <div style="flex:1;font-weight:500" id="detail-prop-name"></div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="modal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-panel">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function fmtMoney(n) { return '£' + Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) {
  if (!d || d === '—') return '—';
  const parts = d.split('-');
  if (parts.length !== 3) return '—';
  const year = parseInt(parts[0]);
  const month = parseInt(parts[1]) - 1;
  const day = parseInt(parts[2]);
  if (isNaN(year) || isNaN(month) || isNaN(day)) return '—';
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthStr = monthNames[month];
  if (!monthStr) return '—';
  return `${String(day).padStart(2, '0')} ${monthStr} ${String(year).slice(-2)}`;
}
function daysUntil(d) { return Math.round((new Date(d)-new Date())/(1000*60*60*24)); }
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}
function certStatus(expiry) {
  if(!expiry) return 'grey';
  const d = daysUntil(expiry);
  if(d < 0) return 'red';
  if(d < 60) return 'amber';
  return 'green';
}  
function certLabel(expiry) {
  if(!expiry) return 'No date';
  const d = daysUntil(expiry);
  if(d < 0) return 'Expired';
  if(d < 60) return d+'d left';
  return 'Valid';
}
function getProp(id) { return state.props.find(p=>p.id===id); }
function getOwnerShare(prop) {
  if(!state.shareMode || !state.selectedOwner) return 1;
  const ownerEntry = (prop.owners||[]).find(o=>o.ownerId===state.selectedOwner);
  if(ownerEntry) return ownerEntry.share/100;
  return 0;
}
function sumTxns(txns, type, cat, start, end) {
  // cat: null = all categories, 'financial' = financial only, 'other' = non-financial only
  return txns
    .filter(t => {
      if(t.type !== type) return false;
      if(cat === null) return true;
      if(cat === 'financial') return t.cat === 'financial';
      return t.cat !== 'financial';
    })
    .reduce((s, t) => s + txnShare(t, apportionedAmount(t, start, end)), 0);
}
function shareOf(prop, value) { return state.shareMode ? value * getOwnerShare(prop) : value; }
function txnShare(txn, amountOverride = null) {
  const amount = amountOverride !== null ? amountOverride : txn.amount;
  if (!state.shareMode) return amount;
  const p = getProp(txn.prop);
  return amount * getOwnerShare(p || {ownershipShare: 100});
}

function infoRow(l,v){return '<div class="info-row"><span class="info-label">'+l+'</span><span class="info-val">'+v+'</span></div>';}

function showToast(msg, isError) {

}

// Get first meaningful word from property name (e.g., "14 Maple Close" -> "Maple")
function propFirstWord(propId) {
  const p = getProp(propId);
  if(!p) return 'Unknown';
  const words = p.name.replace(/[^a-zA-Z0-9 ]/g, '').trim().split(/\s+/);
  // Find first word that is not a number
  const alphaWord = words.find(w => isNaN(parseInt(w)));
  return alphaWord || words[0] || 'Property';
}

// Build filename: Property_YYMM_Category_FirstWordOfDescription.ext
function buildDocumentFilename(propId, category, description, fileExt, documentDate) {
  const prop = getProp(propId);
  let date = new Date();
  if (documentDate) {
    date = new Date(documentDate);
    if (isNaN(date.getTime())) {
      date = new Date();
    }
  }
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const yy = String(date.getFullYear()).slice(2);
  const propertyShort = propFirstWord(propId);
  const descWords = (description || 'document').trim().split(/\s+/);
  const firstWord = descWords[0].replace(/[^a-zA-Z0-9]/g, '');
  return `${propertyShort}_${yy}${mm}_${category}_${firstWord}${fileExt}`;
}

async function driveRequest(url, options={}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers||{}) }
  });
  if(!res.ok) throw new Error(`Drive API ${res.status}`);
  return res.json();
}

async function findOrCreateFolder(name, parentId) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if(result.files && result.files.length > 0) return result.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function findDataFile() {
  if(!gDriveFolderIds.root) return null;
  const q = `name='${DATA_FILENAME}' and '${gDriveFolderIds.root}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  return result.files && result.files.length > 0 ? result.files[0].id : null;
}

async function loadFromDrive() {
  const fileId = await findDataFile();
  if(!fileId) return false;
  gDriveDataFileId = fileId;
  const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { 'Authorization': 'Bearer ' + gAccessToken }
  });
  if(!response.ok) throw new Error('Failed to load');
  const data = await response.json();
  if(data.props) state.props = data.props;
  if(data.txns) state.txns = data.txns;
  if(data.certs) state.certs = data.certs;
  if(data.appliances) state.appliances = data.appliances;
  if(data.maint) state.maint = data.maint;
  if(data.owners) state.owners = data.owners;
  if(data.rentHistory) state.rentHistory = data.rentHistory;
  return true;
}

async function saveToDriveWithRetry(attempt = 1) {
  if(!gAccessToken) return false;
  
  const data = {
    props: state.props, txns: state.txns, certs: state.certs,
    appliances: state.appliances, maint: state.maint, owners: state.owners,
    rentHistory: state.rentHistory, version: '2.0', lastSaved: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  
  try {
    if(gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH', headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DATA_FILENAME, parents: [gDriveFolderIds.root] })], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + gAccessToken }, body: form
      });
      const created = await res.json();
      gDriveDataFileId = created.id;
    }
    showToast('✓ Saved');
    return true;
  } catch(e) {
    if(attempt < MAX_SAVE_RETRIES) {
      const delay = Math.pow(2, attempt) * 1000;
      showToast(`⚠ Retry ${attempt}/${MAX_SAVE_RETRIES}...`, true);
      await new Promise(resolve => setTimeout(resolve, delay));
      return saveToDriveWithRetry(attempt + 1);
    }
    showToast('⚠ Save failed', true);
    return false;
  }
}

function debouncedSave() {
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    if(DRIVE_MODE && gAccessToken) saveToDriveWithRetry();
    else if(!DRIVE_MODE) {
      ['props','txns','certs','appliances','maint','owners','rentHistory'].forEach(k => {
        try { localStorage.setItem('pf-'+k, JSON.stringify(state[k])); } catch(e) {}
      });
    }
  }, 2000);
}

function saveState(key) {
  if(DRIVE_MODE) {
    try { localStorage.setItem('pf-'+key, JSON.stringify(state[key])); } catch(e) {}
    debouncedSave();
  } else {
    try { localStorage.setItem('pf-'+key, JSON.stringify(state[key])); } catch(e) {}
  }
}

function signIn() {
  const btn = document.getElementById('signin-btn');
  const errEl = document.getElementById('login-error');
  if(btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Signing in...'; }
  
  if(typeof google==='undefined' || !google.accounts) {
    if(errEl) { errEl.textContent='Google library not loaded. Refresh.'; errEl.style.display='block'; }
    if(btn) { btn.disabled=false; btn.innerHTML='Sign in with Google'; }
    return;
  }
  
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if(resp.error) {
        if(errEl) { errEl.textContent='Sign-in failed'; errEl.style.display='block'; }
        if(btn) { btn.disabled=false; btn.innerHTML='Sign in with Google'; }
        return;
      }
      gAccessToken = resp.access_token;
      document.getElementById('login-screen').classList.remove('visible');
      document.getElementById('app').style.display = 'flex';
      showToast('Connecting to Drive...');
      
      try {
        gDriveFolderIds.root = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
        const loaded = await loadFromDrive();
        if(!loaded) showToast('Creating new portfolio...');
        else showToast('✓ Loaded from Drive');
        renderAll();
      } catch(e) {
        showToast('⚠ Using local data', true);
        await loadFromLocal();
        renderAll();
      }
    }
  });
  tokenClient.requestAccessToken();
}

function signOut() {
  if(gAccessToken) try { google.accounts.oauth2.revoke(gAccessToken); } catch(e) {}
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.add('visible');
  showToast('Signed out');
}

async function loadFromLocal() {
  const keys = ['props','txns','certs','appliances','maint','owners','rentHistory'];
  keys.forEach(k => { try { const v = localStorage.getItem('pf-'+k); if(v) state[k] = JSON.parse(v); } catch(e) {} });
  state.txns = state.txns.map(t=>({...t, cat: CAT_LEGACY[t.cat]||t.cat}));
}

async function loadState() {
  if(DRIVE_MODE) {
    document.getElementById('login-screen').classList.add('visible');
    const originEl = document.getElementById('login-origin');
    if(originEl) {
      const origin = window.location.origin;
      if(origin==='null'||origin.startsWith('file')) originEl.innerHTML = '⚠ Run via localhost for Drive access';
      else originEl.textContent = 'URL: '+origin;
    }
    return;
  }
  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('app').style.display = 'flex';
  await loadFromLocal();
  renderAll();
}

function currentTaxYear() {
  const now=new Date(), y=now.getFullYear();
  return now>=new Date(y,3,6)?y:y-1;
}

function taxQuarterBounds(taxY) {
  return [
    {q:1,start:new Date(taxY,3,6),end:new Date(taxY,6,5,23,59,59),label:'6 Apr - 5 Jul'},
    {q:2,start:new Date(taxY,6,6),end:new Date(taxY,9,5,23,59,59),label:'6 Jul - 5 Oct'},
    {q:3,start:new Date(taxY,9,6),end:new Date(taxY+1,0,5,23,59,59),label:'6 Oct - 5 Jan'},
    {q:4,start:new Date(taxY+1,0,6),end:new Date(taxY+1,3,5,23,59,59),label:'6 Jan - 5 Apr'},
  ];
}

function currentTaxQuarter() {
  const now=new Date(), taxY=currentTaxYear();
  return taxQuarterBounds(taxY).find(q=>now>=q.start&&now<=q.end)||taxQuarterBounds(taxY)[0];
}
function getPeriodRange(period) {
  const now = new Date(), y = now.getFullYear(), mo = now.getMonth(), d = now.getDate();
  const today = new Date(y, mo, d, 23, 59, 59), taxY = currentTaxYear();
  let start, end, prevStart, prevEnd, label;

  if(period === 'ytd') {
    start = new Date(y, 0, 1);
    end = today;
    prevStart = new Date(y-1, 0, 1);
    prevEnd = new Date(y-1, mo, d, 23, 59, 59);
    label = 'YTD ' + y;

  } else if(period === 'tytd') {
    start = new Date(taxY, 3, 6);
    end = today;
    prevStart = new Date(taxY-1, 3, 6);
    const rawPrevEnd = new Date(taxY-1, mo, d, 23, 59, 59);
    prevEnd = rawPrevEnd > prevStart ? rawPrevEnd : prevStart;
    label = 'Tax YTD ' + taxY + '/' + String(taxY+1).slice(2);

  } else if(period === 'curtaxq') {
    const q = currentTaxQuarter(), qEnd = q.end > today ? today : q.end;
    start = q.start;
    end = qEnd;
    const pq = taxQuarterBounds(taxY-1)[q.q-1];
    prevStart = pq.start;
    prevEnd = pq.end;
    label = 'Tax Q' + q.q;

  } else if(period === 'alltime') {
    const dates = state.txns.map(t => t.date).filter(Boolean).sort();
    start = dates.length ? new Date(dates[0]) : new Date(y, 0, 1);
    end = today;
    prevStart = null;
    prevEnd = null;
    label = 'All time';
} else if(period === 'custom') {
  if(!state.customStartDate || !state.customEndDate) {
    start = new Date(y, 0, 1);
    end = today;
    prevStart = new Date(y-1, 0, 1);
    prevEnd = new Date(y-1, mo, d, 23, 59, 59);
    label = 'YTD ' + y;
  } else {
    const [sy, sm, sd] = state.customStartDate.split('-').map(Number);
    const [ey, em, ed] = state.customEndDate.split('-').map(Number);
    start = new Date(sy, sm-1, sd, 0, 0, 0);
    end = new Date(ey, em-1, ed, 23, 59, 59);
    const duration = end - start;
    prevEnd = new Date(start.getTime() - 1);
    prevStart = new Date(prevEnd.getTime() - duration);
    label = `${fmtDate(state.customStartDate)} – ${fmtDate(state.customEndDate)}`;
  }
 
  } else {
    start = new Date(y, 0, 1);
    end = today;
    prevStart = new Date(y-1, 0, 1);
    prevEnd = new Date(y-1, mo, d, 23, 59, 59);
    label = 'YTD ' + y;
  }

  return {start, end, prevStart, prevEnd, label};
}

function apportionAmount(txn,rangeStart,rangeEnd) {
  if(!txn.periodStart||!txn.periodEnd){const d=new Date(txn.date);return(d>=rangeStart&&d<=rangeEnd)?txn.amount:0;}
  const ps=new Date(txn.periodStart), pe=new Date(txn.periodEnd+'T23:59:59');
  const totalDays=(pe-ps)/86400000+1;
  if(totalDays<=0) return 0;
  const oStart=ps<rangeStart?rangeStart:ps, oEnd=pe>rangeEnd?rangeEnd:pe;
  if(oStart>oEnd) return 0;
  return txn.amount*((oEnd-oStart)/86400000+1)/totalDays;
}

function apportionedAmount(txn,start,end){return apportionAmount(txn,start,end);}

function txnsInRange(start,end){
  const fpIds=state.filterProp?[state.filterProp]:state.props.map(p=>p.id);
  return state.txns.filter(t=>{
    if(!t.date||!fpIds.includes(t.prop)) return false;
    if(t.periodStart&&t.periodEnd){const ps=new Date(t.periodStart),pe=new Date(t.periodEnd+'T23:59:59');return ps<=end&&pe>=start;}
    const d=new Date(t.date);return d>=start&&d<=end;
  });
}
function sumIncome(txns, start, end) {
  return sumTxns(txns, 'income', null, start, end);
}
function sumExpense(txns, start, end) {
  return sumTxns(txns, 'expense', null, start, end);
}
function deltaChip(curr, prev, prevStart, prevEnd) {
  // No previous period to compare against
  if(!prevStart || !prevEnd) return '';
  // No previous value to compare against
  if(prev === 0) return '';
  // Identical values - no meaningful change
  if(curr === prev) return '<span style="font-size:11px;color:var(--text3)">→ no change</span>';

  const diff = curr - prev;
  const pct = ((diff / prev) * 100).toFixed(1);
  const up = diff >= 0;
  const color = up ? 'var(--green)' : 'var(--red)';
  const arrow = up ? '▲' : '▼';
  return `<span style="font-size:11px;color:${color}">${arrow} ${fmtMoney(Math.abs(diff))} (${Math.abs(pct)}%)</span>`;
}

function renderDashboard() {
  const fps = (state.filterProp ? state.props.filter(p=>p.id===state.filterProp) : state.props).filter(p=>state.showArchived||!p.archived);
  const period = state.dashPeriod || 'ytd';
  const {start,end,prevStart,prevEnd,label} = getPeriodRange(period);

  const currTxns = txnsInRange(start, end);
  const prevTxns = txnsInRange(prevStart, prevEnd);
  const income = sumIncome(currTxns,start,end);
  const expense = sumExpense(currTxns,start,end);
  const net = income - expense;
  const prevIncome = sumIncome(prevTxns,prevStart,prevEnd);
  const prevExpense = sumExpense(prevTxns,prevStart,prevEnd);
  const prevNet = prevIncome - prevExpense;
  const fullIncome = currTxns.filter(t=>t.type==='income').reduce((s,t)=>s+apportionedAmount(t,start,end),0);
  const fullExpense = currTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+apportionedAmount(t,start,end),0);
  const fullNet = fullIncome - fullExpense;
  const prevFullIncome = prevTxns.filter(t=>t.type==='income').reduce((s,t)=>s+apportionedAmount(t,prevStart,prevEnd),0);
  const prevFullExpense = prevTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+apportionedAmount(t,prevStart,prevEnd),0);
  const prevFullNet = prevFullIncome - prevFullExpense;

  const showShare = state.shareMode && state.selectedOwner;
  const selectedOwnerName = showShare ? (state.owners.find(o=>o.id===state.selectedOwner)?.name || '') : '';
  const fullRent = fps.filter(p=>p.status==='let').reduce((s,p)=>s+p.rent,0);
  const shareRent = fps.filter(p=>p.status==='let').reduce((s,p)=>s+shareOf(p,p.rent),0);
  const letCount = fps.filter(p=>p.status==='let').length;
  const avgYield = fps.filter(p=>p.value>0).length ? (fps.filter(p=>p.value>0).reduce((s,p)=>s+(p.rent*12/p.value*100),0)/fps.filter(p=>p.value>0).length).toFixed(1) : '—';

  const fpIds = fps.map(p=>p.id);
  const expiredCerts = state.certs.filter(c=>fpIds.includes(c.propId)&&certStatus(c.expiryDate)==='red');
  const warnCerts = state.certs.filter(c=>fpIds.includes(c.propId)&&certStatus(c.expiryDate)==='amber');
  const openMaint = state.maint.filter(m=>fpIds.includes(m.propId)&&m.status==='open');

  let certAlerts = '';
  if(expiredCerts.length) certAlerts += `<div class="alert-strip">⚠ ${expiredCerts.length} certificate${expiredCerts.length>1?'s':''} expired or overdue</div>`;
  if(warnCerts.length) certAlerts += `<div class="alert-strip alert-strip-amber">⏱ ${warnCerts.length} certificate${warnCerts.length>1?'s':''} expiring within 60 days</div>`;

 const periodBar = buildPeriodBar();

 function metricTile(lbl, fullVal, shareVal, prevFull, prevShare, color, sub) {
  const valColor = color || 'var(--text)';
  const comparatorFull = deltaChip(fullVal, prevFull, prevStart, prevEnd);
  const comparatorShare = showShare ? deltaChip(shareVal, prevShare, prevStart, prevEnd) : '';

  if(showShare) {
    return `<div class="metric" style="padding:10px 12px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">${lbl}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 6px">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Full</div>
        <div style="font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:.04em">${selectedOwnerName}</div>
        <div style="font-size:17px;font-weight:300;color:${valColor};letter-spacing:-.02em;line-height:1.2">${fmtMoney(fullVal)}</div>
        <div style="font-size:17px;font-weight:300;color:var(--blue);letter-spacing:-.02em;line-height:1.2">${fmtMoney(shareVal)}</div>
        ${comparatorFull || comparatorShare ? `
        <div style="font-size:10px;color:var(--text2);padding-top:2px;line-height:1.3">${comparatorFull}</div>
        <div style="font-size:10px;color:var(--blue);padding-top:2px;line-height:1.3">${comparatorShare}</div>` : ''}
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px">${sub}${prevStart ? ' · vs ' + prevStart.getFullYear() : ''}</div>
    </div>`;
  }

  return `<div class="metric" style="padding:12px 14px">
    <div class="metric-label" style="margin-bottom:4px">${lbl}</div>
    <div style="font-size:22px;font-weight:300;color:${valColor};letter-spacing:-.02em;margin-bottom:3px">${fmtMoney(fullVal)}</div>
    <div class="text-sm">${sub}</div>
    ${comparatorFull ? `<div style="font-size:11px;color:var(--text2);margin-top:3px">${comparatorFull}${prevStart ? ' vs ' + prevStart.getFullYear() : ''}</div>` : ''}
  </div>`;
}
  function rentTile() {
    const sub = `${letCount} of ${fps.length} let`;
    if(showShare) {
      return `<div class="metric" style="padding:10px 12px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Rent pcm</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 6px">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Full</div>
          <div style="font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:.04em">${selectedOwnerName}</div>
          <div style="font-size:17px;font-weight:300;letter-spacing:-.02em;line-height:1.2">${fmtMoney(fullRent)}</div>
          <div style="font-size:17px;font-weight:300;color:var(--blue);letter-spacing:-.02em;line-height:1.2">${fmtMoney(shareRent)}</div>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">${sub} · ${label}</div>
      </div>`;
    }
    return `<div class="metric" style="padding:12px 14px">
      <div class="metric-label" style="margin-bottom:4px">Rent pcm</div>
      <div style="font-size:22px;font-weight:300;letter-spacing:-.02em;margin-bottom:3px">${fmtMoney(fullRent)}</div>
      <div class="text-sm">${sub} · ${label}</div>
    </div>`;
  }

  function certBadgeRow(propId) {
    return ['Gas Safety','EPC','EICR','Insurance'].map(key => {
      const p = getProp(propId);
      let st, expiry, extra = '';
      if(key === 'Insurance') {
        expiry = p?.insuranceRenewal ? fmtDate(p.insuranceRenewal) : '—';
        st = p?.insuranceRenewal ? certStatus(p.insuranceRenewal) : 'grey';
      } else {
        const c = state.certs.find(c => c.propId===propId && c.type===key);
        st = c ? certStatus(c.expiryDate) : 'grey';
        expiry = c ? fmtDate(c.expiryDate) : '—';
        if(key==='EPC' && c?.epcRating) extra = ` · Band ${c.epcRating}`;
      }
      const lbl = key==='Gas Safety' ? 'Gas' : key;
      return `<div style="flex:1;min-width:0">
        <div class="label-xs" style="margin-bottom:3px">${lbl}</div>
        <span class="badge badge-${st}" style="font-size:11px">${expiry}${extra}</span>
      </div>`;
    }).join('');
  }

  const propCards = fps.map(p => {
    const ownerShare = getOwnerShare(p);
    const fullRentP = p.rent;
    const shareRentP = shareOf(p, p.rent);
    const dispValue = p.value;
    const yld = dispValue > 0 ? ((fullRentP*12)/dispValue*100).toFixed(1)+'%' : '—';

    const certRow = certBadgeRow(p.id);
    const propTxns = state.txns.filter(t=>t.prop===p.id&&t.date&&new Date(t.date)>=start&&new Date(t.date)<=end);
    const ptFullIncome = propTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const ptFullAgentFees = propTxns.filter(t=>t.type==='expense'&&t.cat==='professional').reduce((s,t)=>s+t.amount,0);
    const ptFullPremises = propTxns.filter(t=>t.type==='expense'&&t.cat==='premises').reduce((s,t)=>s+t.amount,0);
    const ptFullOther = propTxns.filter(t=>t.type==='expense'&&!['professional','premises'].includes(t.cat)).reduce((s,t)=>s+t.amount,0);
    const ptFullNet = ptFullIncome - ptFullAgentFees - ptFullPremises - ptFullOther;

    const ptShareIncome = ptFullIncome * ownerShare;
    const ptShareFees = ptFullAgentFees * ownerShare;
    const ptSharePremises = ptFullPremises * ownerShare;
    const ptShareOther = ptFullOther * ownerShare;
    const ptShareNet = ptShareIncome - ptShareFees - ptSharePremises - ptShareOther;

    const shareBadge = p.owners && p.owners.length>1 ? `<span class="badge badge-blue" style="margin-left:4px">${p.owners.length} owners</span>` : '';
    const rentDisplay = showShare && ownerShare < 1
      ? `<div class="fw5-14">${fmtMoney(fullRentP)}</div><div class="fw5-11-blue">${fmtMoney(shareRentP)} ${selectedOwnerName}</div>`
      : `<div class="fw5-14">${fmtMoney(fullRentP)}</div>`;
    function finRow(label, fullVal, shareVal, isIncome) {
      const color = isIncome ? 'var(--green)' : (fullVal > 0 ? 'var(--red)' : 'var(--text3)');
      const prefix = isIncome ? '' : (fullVal > 0 ? '-' : '');
      const sharePrefix = isIncome ? '' : '-';
      return `<div>
        <div class="label-xs-mb">${label}</div>
        <div style="font-size:13px;font-weight:500;color:${color}">${fullVal > 0 || isIncome ? prefix+fmtMoney(fullVal) : '—'}</div>
        ${showShare && ownerShare < 1 ? `<div class="fw5-11-blue">${fullVal > 0 || isIncome ? sharePrefix+fmtMoney(shareVal) : '—'}</div>` : ''}
      </div>`;
    }

    return `<div class="card" style="cursor:pointer" onclick="openPropDetail('${p.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap">${p.name}${shareBadge}</div>
          <div class="text-sm">${p.address}</div>
        </div>
        ${p.archived?'<span class="badge badge-grey">Archived</span>':'<span class="badge badge-'+(p.status==='let'?'green':'amber')+'">'+(p.status==='let'?'Let':'Vacant')+'</span>'}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px">
        <div>
          <div class="label-xs-mb">Rent pcm${showShare&&ownerShare<1?' (full / share)':''}</div>
          ${rentDisplay}
        </div>
        <div><div class="label-xs-mb">Yield</div><div class="fw5-14">${yld}</div></div>
        ${finRow('Income', ptFullIncome, ptShareIncome, true)}
        ${finRow('Agent fees', ptFullAgentFees, ptShareFees, false)}
        ${finRow('Mgmt costs', ptFullPremises, ptSharePremises, false)}
        ${finRow('Other costs', ptFullOther, ptShareOther, false)}
        <div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:8px;margin-top:2px">
          <div class="label-xs-mb">Net income${showShare&&ownerShare<1?' (full / share)':''}</div>
          <div style="font-size:15px;font-weight:500;color:${ptFullNet>=0?'var(--green)':'var(--red)'}">${ptFullNet<0?'-':''}${fmtMoney(ptFullNet)}</div>
          ${showShare && ownerShare < 1 ? `<div style="font-size:12px;font-weight:500;color:var(--blue)">${ptShareNet<0?'-':''}${fmtMoney(ptShareNet)} ${selectedOwnerName}</div>` : ''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">${certRow}</div>
    </div>`;
  }).join('');

  const fullAgentFees = currTxns.filter(t=>t.type==='expense'&&t.cat==='professional').reduce((s,t)=>s+apportionedAmount(t,start,end),0);
  const netIncomeVal = fullIncome - fullAgentFees;
  const netIncomePct = fullIncome > 0 ? ((netIncomeVal/fullIncome)*100).toFixed(1) : '—';
  const profitPct = fullIncome > 0 ? ((fullNet/fullIncome)*100).toFixed(1) : '—';

  document.getElementById('screen-dashboard').innerHTML = `
    ${periodBar}
    ${showShare ? `<div style="font-size:12px;color:var(--blue);background:var(--blue-bg);border:1px solid #B5D4F4;border-radius:var(--radius-sm);padding:6px 12px;margin-bottom:10px">Showing full · <strong>${selectedOwnerName}'s share</strong> in blue</div>` : ''}
    <div class="metrics" style="grid-template-columns:1fr 1fr 1fr">
      ${metricTile('Income', fullIncome, income, prevFullIncome, prevIncome, 'var(--green)', label)}
      ${metricTile('Expenses', fullExpense, expense, prevFullExpense, prevExpense, 'var(--red)', label)}
      ${metricTile('Net', fullNet, net, prevFullNet, prevNet, fullNet>=0?'var(--green)':'var(--red)', label)}
    </div>
    <div class="metrics" style="grid-template-columns:1fr 1fr 1fr 1fr;margin-top:0">
      ${rentTile()}
      <div class="metric" style="padding:10px 12px">
        <div class="metric-label" style="margin-bottom:4px">Net income %</div>
        <div style="font-size:20px;font-weight:300;color:${netIncomePct!=='—'&&parseFloat(netIncomePct)>=0?'var(--green)':'var(--red)'};letter-spacing:-.02em">${netIncomePct!=='—'?netIncomePct+'%':'—'}</div>
        <div class="text-sm">Income less agent fees</div>
      </div>
      <div class="metric" style="padding:10px 12px">
        <div class="metric-label" style="margin-bottom:4px">Profit %</div>
        <div style="font-size:20px;font-weight:300;color:${profitPct!=='—'&&parseFloat(profitPct)>=0?'var(--green)':'var(--red)'};letter-spacing:-.02em">${profitPct!=='—'?profitPct+'%':'—'}</div>
        <div class="text-sm">Net after all costs</div>
      </div>
      <div class="metric" style="padding:10px 12px">
        <div class="metric-label" style="margin-bottom:4px">Avg yield</div>
        <div style="font-size:20px;font-weight:300;letter-spacing:-.02em">${avgYield}${avgYield!=='—'?'%':''}</div>
        <div class="text-sm">Across ${fps.filter(p=>p.value>0).length} propert${fps.filter(p=>p.value>0).length===1?'y':'ies'}</div>
      </div>
    </div>
    ${openMaint.length?`<div class="alert-strip alert-strip-amber" style="margin-bottom:10px">🔧 ${openMaint.length} open maintenance issue${openMaint.length>1?'s':''}</div>`:''}
    ${certAlerts}
    ${propCards}`;
}

// PROPERTIES SCREEN
// ============================================
function renderProperties() {
  const fps = (state.filterProp ? state.props.filter(p=>p.id===state.filterProp) : state.props).filter(p=>state.showArchived||!p.archived);
  const archivedCount = state.props.filter(p=>p.archived).length;
  const period = state.dashPeriod || 'ytd';
  const {start, end, label} = getPeriodRange(period);
  const showShare = state.shareMode && state.selectedOwner;
  const selectedOwnerName = showShare ? (state.owners.find(o=>o.id===state.selectedOwner)?.name || '') : '';

  const expCatDefs = [
    ['premises','Premises costs'],
    ['repairs','Repairs & maintenance'],
    ['financial','Financial costs'],
    ['professional','Professional fees'],
    ['services','Cost of services'],
    ['travel','Travel costs'],
    ['other-allowable','Other allowable expenses'],
  ];

  function txnCatTotals(propId, start, end) {
    const txns = state.txns.filter(t=>t.prop===propId && t.date && new Date(t.date)>=start && new Date(t.date)<=end);
    const totals = Object.fromEntries(Object.keys(CAT_LABELS).map(k=>[k,0]));
    txns.forEach(t=>{ if(t.cat in totals) totals[t.cat]+=t.amount; });
    return totals;
  }

  const archiveToggle = archivedCount > 0 ? `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:10px">
    <span style="font-size:13px;color:var(--text2)">${archivedCount} archived propert${archivedCount===1?'y':'ies'}</span>
    <button class="btn btn-secondary" onclick="state.showArchived=!state.showArchived;renderProperties()">${state.showArchived?'Hide archived':'Show archived'}</button>
  </div>` : '';
  
  document.getElementById('screen-properties').innerHTML = archiveToggle + fps.map(p=>{
    const ownerShare = getOwnerShare(p);
    const fullRentP = p.rent;
    const shareRentP = shareOf(p, p.rent);
    const dispValue = p.value;
    const yield_pct = dispValue>0 ? ((fullRentP*12)/dispValue*100).toFixed(1) : '0.0';

    const catFull = txnCatTotals(p.id, start, end);
    const catShare = Object.fromEntries(Object.entries(catFull).map(([k,v])=>[k,v*ownerShare]));

    const fullIncome = catFull['rental-income'];
    const fullExpenses = Object.entries(catFull).filter(([k])=>k!=='rental-income').reduce((s,[,v])=>s+v,0);
    const fullNet = fullIncome - fullExpenses;
    const shareIncome = catShare['rental-income'];
    const shareExpenses = Object.entries(catShare).filter(([k])=>k!=='rental-income').reduce((s,[,v])=>s+v,0);
    const shareNet = shareIncome - shareExpenses;

    const certBadges = state.certs.filter(c=>c.propId===p.id).slice(0,3).map(c=>{
      const rating = c.type==='EPC'&&c.epcRating ? ` Band ${c.epcRating}` : '';
      return `<span class="badge badge-${certStatus(c.expiryDate)}">${c.type}${rating}</span>`;
    }).join('');
    const colHeader = showShare && ownerShare < 1 ? `
      <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;padding:4px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px">
        <span></span>
        <span style="font-size:10px;color:var(--text2);text-align:right;text-transform:uppercase;letter-spacing:.04em">Full</span>
        <span style="font-size:10px;color:var(--blue);text-align:right;text-transform:uppercase;letter-spacing:.04em">${selectedOwnerName}</span>
      </div>` : '';
    function catRow(label, fullVal, shareVal, isIncome) {
      const col = isIncome ? 'var(--green)' : (fullVal>0 ? 'var(--red)' : 'var(--text3)');
      const pre = isIncome ? '' : (fullVal>0 ? '-' : '');
      const hasVal = isIncome ? true : fullVal > 0;
      if(showShare && ownerShare < 1) {
        return `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
          <span class="text-sm">${label}</span>
          <span style="font-size:12px;font-weight:500;color:${col};text-align:right">${hasVal?pre+fmtMoney(fullVal):'—'}</span>
          <span style="font-size:12px;font-weight:500;color:var(--blue);text-align:right">${hasVal?(isIncome?'':pre)+fmtMoney(shareVal):'—'}</span>
        </div>`;
      }
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
        <span class="text-sm">${label}</span>
        <span style="font-size:12px;font-weight:500;color:${col}">${hasVal?pre+fmtMoney(fullVal):'—'}</span>
      </div>`;
    }

    const rentDisplay = showShare && ownerShare < 1
      ? `<div class="fw5-13">${fmtMoney(fullRentP)} <span class="fw5-11-blue">/ ${fmtMoney(shareRentP)} ${selectedOwnerName}</span></div>`
      : `<div class="fw5-13">${fmtMoney(fullRentP)}</div>`;

    const netRow = showShare && ownerShare < 1
      ? `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:7px 0">
          <span class="fw5-13">Net income</span>
          <span style="font-size:13px;font-weight:500;color:${fullNet>=0?'var(--green)':'var(--red)'};text-align:right">${fullNet<0?'-':''}${fmtMoney(fullNet)}</span>
          <span style="font-size:13px;font-weight:500;color:var(--blue);text-align:right">${shareNet<0?'-':''}${fmtMoney(shareNet)}</span>
        </div>`
      : `<div class="flex-row" style="padding:7px 0">
          <span class="fw5-13">Net income</span>
          <span style="font-size:14px;font-weight:500;color:${fullNet>=0?'var(--green)':'var(--red)'}">${fullNet<0?'-':''}${fmtMoney(fullNet)}</span>
        </div>`;

    const incomeRow = showShare && ownerShare < 1
      ? `<div style="display:grid;grid-template-columns:1fr 80px 80px;gap:4px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="fw5-13">Rental income</span>
          <span style="font-size:13px;font-weight:500;color:var(--green);text-align:right">${fmtMoney(fullIncome)}</span>
          <span style="font-size:13px;font-weight:500;color:var(--blue);text-align:right">${fmtMoney(shareIncome)}</span>
        </div>`
      : `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="fw5-13">Rental income</span>
          <span style="font-size:13px;font-weight:500;color:var(--green)">${fmtMoney(fullIncome)}</span>
        </div>`;

    return `<div class="prop-item" onclick="openPropDetail('${p.id}')" style="flex-direction:column;align-items:stretch;gap:0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="prop-dot" style="background:${p.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="prop-name">${p.name}</div>
          <div class="prop-addr">${p.address}</div>
        </div>
        <span class="badge badge-${p.status==='let'?'green':'amber'}">${p.status==='let'?'Let':'Vacant'}</span>
        <div class="prop-arrow">›</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px">
        <div>
          <div class="label-xs-mb">Rent pcm</div>
          ${rentDisplay}
        </div>
        <div><div class="label-xs-mb">Yield</div><div class="fw5-13">${yield_pct}%</div></div>
        <div><div class="label-xs-mb">Period</div><div class="text-sm">${label}</div></div>
      </div>
      <div>
        ${colHeader}
        ${incomeRow}
        ${expCatDefs.map(([k,l])=>catRow(l, catFull[k], catShare[k], false)).join('')}
        ${netRow}
      </div>
      ${certBadges?`<div class="prop-certs" style="margin-top:4px;padding-top:8px;border-top:1px solid var(--border)">${certBadges}</div>`:''}
    </div>`;
  }).join('') + `<button class="btn btn-secondary" style="margin-top:8px" onclick="openAddPropModal()">+ Add property</button>`;
}

// ============================================
// PROPERTY DETAIL
// ============================================
function openPropDetail(id) {
  const p = getProp(id);
  if(!p) return;
  document.getElementById('detail-prop-name').textContent = p.name;
  document.getElementById('prop-detail').classList.add('open');
  renderPropDetailContent(id);
}

function closePropDetail() { document.getElementById('prop-detail').classList.remove('open'); }

function switchDTab(name, btn, propId) {
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dtab-content').forEach(c=>c.classList.remove('active'));

function renderFinance() {
  const period = state.dashPeriod || 'ytd';
  const {start, end, label} = getPeriodRange(period);
  const allTxns = state.filterProp ? state.txns.filter(t=>t.prop===state.filterProp) : state.txns;
  const ftxns = allTxns.filter(t=>{
    if(!t.date) return false;
    const d = new Date(t.date);
    return d >= start && d <= end;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const typeFilter = state.financeTab;
  const shown = typeFilter==='all' ? ftxns : ftxns.filter(t=>t.type===typeFilter);
  const income = ftxns.filter(t=>t.type==='income').reduce((s,t)=>s+txnShare(t),0);
  const expense = ftxns.filter(t=>t.type==='expense').reduce((s,t)=>s+txnShare(t),0);
  const net = income - expense;

  const fmtShort = d => d ? d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}) : '';
  const dateRange = `${fmtShort(start)} – ${fmtShort(end)}`;

        <div class="metric-value" style="color:var(--green);font-size:18px">${fmtMoney(income)}</div>
        <div class="metric-sub">${ftxns.filter(t=>t.type==='income').length} entries</div>
      </div>
      <div class="metric">
        <div class="metric-label">Expenses</div>
        <div class="metric-value" style="color:var(--red);font-size:18px">${fmtMoney(expense)}</div>
        <div class="metric-sub">${ftxns.filter(t=>t.type==='expense').length} entries</div>
      </div>
      <div class="metric">
        <div class="metric-label">Net profit</div>
        <div class="metric-value" style="color:${net>=0?'var(--green)':'var(--red)'};font-size:18px">${net<0?'-':''}${fmtMoney(net)}</div>
        <div class="metric-sub">${label}</div>
      </div>
    </div>

      ${shown.length ? shown.map(t=>txnRow(t,`deleteTxnGlobal('${t.id}')`,true)).join('') : '<div class="empty">No transactions for this period</div>'}
    </div>`;
}

function getTaxYearForMTD(date) {
  const d = new Date(date);
  const y = d.getFullYear();
  const cutoff = new Date(y, 3, 6);
  return d >= cutoff ? y : y - 1;
}

async function generateMTDReport() {
  const taxYear = parseInt(document.getElementById('mtd-tax-year').value);
  const exportType = document.getElementById('mtd-export-type').value;
  const today = new Date().toISOString().slice(0, 10);

  const start = new Date(taxYear, 3, 6);
  const end = new Date(taxYear + 1, 3, 5, 23, 59);

  const yearTxns = state.txns.filter(t => {
    if(!t.date) return false;
    if(t.periodStart && t.periodEnd && t.periodStart !== '' && t.periodEnd !== '') {
      const ps = new Date(t.periodStart);
      const pe = new Date(t.periodEnd + 'T23:59:59');
      return ps <= end && pe >= start;
    }
    const d = new Date(t.date);
    return d >= start && d <= end;
  });

  let content = '', filename = '', mimeType = 'text/plain';

  if(exportType === 'csv') {
    const headers = ['Date','Description','Property','Category','Type','Amount (£)','Period Start','Period End'];
    if(state.shareMode) headers.push('Owner Share Amount (£)');
    const rows = [headers];

    yearTxns.forEach(t => {
      const p = getProp(t.prop);
      const apportioned = apportionedAmount(t, start, end);
      const signed = (t.type === 'expense' ? -1 : 1) * apportioned;
      const row = [
        t.date, t.desc, p?.name || t.prop, CAT_LABELS[t.cat] || t.cat,
        t.type === 'income' ? 'Income' : 'Expense',
        signed.toFixed(2),
        t.periodStart || '', t.periodEnd || ''
      ];
      if(state.shareMode) row.push(((t.type === 'expense' ? -1 : 1) * txnShare(t, apportioned)).toFixed(2));
      rows.push(row);
    });

    content = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
    filename = `MTD_TaxYear_${taxYear}-${taxYear+1}_${today}.csv`;
    mimeType = 'text/csv';

  } else if(exportType === 'quarterly') {
    const quarterBounds = taxQuarterBounds(taxYear);
    const quarterLabels = ['6 Apr – 5 Jul', '6 Jul – 5 Oct', '6 Oct – 5 Jan', '6 Jan – 5 Apr'];

    const quarters = quarterBounds.map((bounds, i) => {
      const qs = bounds.start, qe = bounds.end;
      const qt = yearTxns.filter(t => {
        if(t.periodStart && t.periodEnd && t.periodStart !== '' && t.periodEnd !== '') {
          const ps = new Date(t.periodStart);
          const pe = new Date(t.periodEnd + 'T23:59:59');
          return ps <= qe && pe >= qs;
        }
        const d = new Date(t.date);
        return d >= qs && d <= qe;
      });

      const inc = sumTxns(qt, 'income',  null,        qs, qe);
      const fin = sumTxns(qt, 'expense', 'financial', qs, qe);
      const oth = sumTxns(qt, 'expense', 'other',     qs, qe);
      const totalExpenses = fin + oth;
      const netProfit = inc - totalExpenses;

      return `\nQ${i+1} ${quarterLabels[i]}\n${'─'.repeat(40)}\nGross income: £${inc.toFixed(2)}\nFinance costs: £${fin.toFixed(2)}\nOther expenses: £${oth.toFixed(2)}\nTotal expenses: £${totalExpenses.toFixed(2)}\nNet profit: £${netProfit.toFixed(2)}\n`;
    }).join('');

    content = `PROPERTY PORTFOLIO – MTD QUARTERLY REPORT\nTax year ${taxYear}/${taxYear+1}\nGenerated: ${new Date().toLocaleDateString('en-GB')}\n${'═'.repeat(50)}\n${quarters}`;
    filename = `MTD_Quarterly_${taxYear}-${taxYear+1}_${today}.txt`;

  } else {
    const gross   = sumTxns(yearTxns, 'income',  null,        start, end);
    const finance = sumTxns(yearTxns, 'expense', 'financial', start, end);
    const other   = sumTxns(yearTxns, 'expense', 'other',     start, end);
    const totalExpenses = finance + other;
    const netProfit = gross - totalExpenses;

    content = `PROPERTY PORTFOLIO – MTD FOR INCOME TAX\nFull tax year ${taxYear}/${taxYear+1}\nGenerated: ${new Date().toLocaleDateString('en-GB')}\n${'─'.repeat(48)}\n\nUK PROPERTY INCOME\n  Gross rental income: £${gross.toFixed(2)}\n\nALLOWABLE EXPENSES\n  Residential finance costs: £${finance.toFixed(2)}\n  Other allowable expenses: £${other.toFixed(2)}\n\nSUMMARY\n  Total expenses: £${totalExpenses.toFixed(2)}\n  Net profit / (loss): £${netProfit.toFixed(2)}\n\n${'─'.repeat(48)}\nTRANSACTION COUNT: ${yearTxns.length} (${yearTxns.filter(t=>t.type==='income').length} income, ${yearTxns.filter(t=>t.type==='expense').length} expense)\n\nNOTE: This report is for reference only. Submit via HMRC-approved MTD software for official filing.`;
    filename = `MTD_FullYear_${taxYear}-${taxYear+1}_${today}.txt`;
  }

  if(gAccessToken && gDriveFolderIds.root) {
    try {
      const reportsFolder = await findOrCreateFolder('Tax Reports', gDriveFolderIds.root);
      const blob = new Blob([content], { type: mimeType });
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [reportsFolder] })], { type: 'application/json' }));
      form.append('file', blob);
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      showToast('✓ MTD report saved to Drive (Tax Reports folder)');
    } catch(e) {
      console.warn('Drive save failed:', e);
      showToast('⚠ Report saved locally only', true);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
      a.download = filename;
      a.click();
    }
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
    a.download = filename;
    a.click();
    showToast('Report downloaded (not signed in to Drive)');
  }
  closeModal();
}

let pendingUploadFile = null;
let pendingUploadData = null;
  
function getFileIcon(mimeType) {
  if(!mimeType) return 'DOC';
  if(mimeType.includes('pdf')) return 'PDF';
  if(mimeType.includes('image')) return 'IMG';
  if(mimeType.includes('word')) return 'DOC';
  if(mimeType.includes('excel')) return 'XLS';
  return 'DOC';
}

function renderUnifiedDocs() {
  const allDocs = [];
  
  state.props.forEach(prop => {
    if(prop.docs && prop.docs.length) {
      prop.docs.forEach(doc => {
        allDocs.push({ 
          ...doc, 
          propertyName: prop.name, 
          propertyId: prop.id, 
          source: 'prop',
          fileData: doc.fileData,
          fileMime: doc.fileMime
        });
      });
    }
    if(prop.tenancyDocs && prop.tenancyDocs.length) {
      prop.tenancyDocs.forEach(doc => {
        allDocs.push({ 
          ...doc, 
          propertyName: prop.name, 
          propertyId: prop.id, 
          source: 'tenancy', 
          category: 'Tenancy',
          fileData: doc.docData || doc.fileData,
          fileMime: doc.docMime || doc.fileMime
        });
      });
    }
  });
  
  state.certs.forEach(cert => {
    if(cert.docData) {
      const prop = getProp(cert.propId);
      allDocs.push({
        id: cert.id, 
        name: `${cert.type} Certificate`, 
        category: 'Certificate', 
        date: cert.issueDate,
        propertyName: prop?.name || 'Unknown', 
        propertyId: cert.propId, 
        source: 'cert',
        fileData: cert.docData,
        fileMime: cert.docMime
      });
    }
  });
  
  allDocs.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  
  const grouped = {};
  allDocs.forEach(doc => {
    if(!grouped[doc.propertyId]) grouped[doc.propertyId] = { name: doc.propertyName, docs: [] };
    grouped[doc.propertyId].docs.push(doc);
  });
  
  const hasPendingProp = !!state.pendingDocPropId;
  const propertyOptions = state.props.filter(p => !p.archived).map(p =>
    `<option value="${p.id}" ${(state.pendingDocPropId || state.filterProp) === p.id ? 'selected' : ''}>${p.name}</option>`
  ).join('');
  state.pendingDocPropId = null;

  const categoryOptions = `
    <option value="Tenancy">Tenancy</option>
    <option value="Compliance">Compliance</option>
    <option value="Receipts">Receipts</option>
    <option value="Rent Statements">Rent Statements</option>
    <option value="Legal">Legal</option>
    <option value="Other">Other</option>
  `;
  
  const docListHtml = Object.keys(grouped).length === 0 ? 
    '<div class="empty"><div style="font-size:32px;margin-bottom:8px;color:var(--text3)">[ ]</div>No documents yet</div>' :
    Object.values(grouped).map(group => `
      <div style="margin-bottom:20px">
        <div class="section-label" style="margin:0 0 8px 0">${group.name}</div>
        ${group.docs.map(doc => `
          <div class="cert-item" style="cursor:pointer" onclick="openUnifiedDoc('${doc.propertyId}', '${doc.id}', '${doc.source}')">
            <div class="cert-info">
              <div class="cert-name">${doc.name || 'Document'}</div>
              <div class="cert-meta">${doc.category || 'Document'} · ${fmtDate(doc.date)}</div>
              <div class="cert-meta" style="color:var(--blue);margin-top:2px">Click to open</div>
            </div>
            <button class="icon-btn" onclick="event.stopPropagation();deleteUnifiedDoc('${doc.propertyId}', '${doc.id}', '${doc.source}')">✕</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  
  document.getElementById('screen-docs').innerHTML = `
    <div class="section-label">Unified Document Management</div>
    <div class="card">
      <div class="form-field"><label>Property</label><select id="doc-property">${propertyOptions}</select></div>
      <div class="form-field"><label>Category</label>
        <select id="doc-category">${categoryOptions}</select>
      </div>
      <div class="form-field"><label>Document Date</label><input type="date" id="doc-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-field"><label>Description</label><input type="text" id="doc-description" placeholder="e.g. Gas safety certificate"></div>
      <div class="upload-zone" onclick="document.getElementById('doc-file-input').click()"><p>Tap to choose a file</p><span>PDF, JPG, or PNG</span></div>
      <input type="file" id="doc-file-input" class="upload-input" accept=".pdf,.jpg,.jpeg,.png" onchange="prepareUnifiedUpload()">
      <div id="upload-status"></div>
      <button class="btn btn-primary" id="save-doc-btn" style="margin-top:12px" onclick="savePendingDocument()">Save Document</button>
    </div>
    <div class="section-label">Document Library</div>
    <div id="document-list">${docListHtml}</div>
  `;

  if(hasPendingProp) {
    requestAnimationFrame(() => {
      const uploadZone = document.querySelector('.upload-zone');
      if(uploadZone) uploadZone.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
}

function prepareUnifiedUpload() {
  const file = document.getElementById('doc-file-input').files[0];
  if(!file) return;
  
  pendingUploadFile = file;
  const statusDiv = document.getElementById('upload-status');
  statusDiv.innerHTML = '<div class="alert" style="background:var(--blue-bg);color:var(--blue);margin-top:10px">File selected. Fill in the details and click Save Document.</div>';
}

async function savePendingDocument() {
  if(!pendingUploadFile) {
    showToast('Please select a file first', true);
    return;
  }
  
  const propId = document.getElementById('doc-property').value;
  const category = document.getElementById('doc-category').value;
  const docDate = document.getElementById('doc-date').value;
  const description = document.getElementById('doc-description').value.trim();
  
  if(!description) {
    showToast('Please enter a description', true);
    return;
  }
  
  const statusDiv = document.getElementById('upload-status');
  statusDiv.innerHTML = '<div class="loading-box"><span class="spinner"></span> Processing...</div>';
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const mime = pendingUploadFile.type || 'application/pdf';
    const ext = mime === 'application/pdf' ? '.pdf' : (mime.includes('png') ? '.png' : '.jpg');
    const filename = buildDocumentFilename(propId, category, description, ext, docDate);
    
    const prop = getProp(propId);
    if(!prop.docs) prop.docs = [];
    prop.docs.push({ 
      id: uid(), 
      name: filename, 
      category: category, 
      date: docDate, 
      description: description,
      fileData: base64, 
      fileMime: mime,
      propertyId: propId
    });
    saveState('props');
    
    // Save to Drive with proper folder structure
    if(gAccessToken && gDriveFolderIds.root) {
      try {
        const folderName = propFirstWord(propId);
        let propFolderId = await findOrCreateFolder(folderName, gDriveFolderIds.root);
        let catFolderId = await findOrCreateFolder(category, propFolderId);
        
        const bytes = atob(base64);
        const byteArray = new Uint8Array(bytes.length);
        for(let i = 0; i < bytes.length; i++) byteArray[i] = bytes.charCodeAt(i);
        const blob = new Blob([byteArray], { type: mime });
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [catFolderId] })], { type: 'application/json' }));
        form.append('file', blob);
        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + gAccessToken },
          body: form
        });
        showToast('✓ Saved to Drive');
      } catch(e) { console.warn('Drive save failed:', e); }
    }
    
    statusDiv.innerHTML = '<div class="alert" style="background:var(--green-bg);color:var(--green);margin-top:10px">✓ Document saved</div>';
    setTimeout(() => statusDiv.innerHTML = '', 2000);
    
    pendingUploadFile = null;
    document.getElementById('doc-file-input').value = '';
    document.getElementById('doc-description').value = '';
    renderUnifiedDocs();
  };
  reader.readAsDataURL(pendingUploadFile);
}

function openUnifiedDoc(propId, docId, source) {
  const prop = getProp(propId);
  let doc = null;
  if(source === 'cert') { 
    doc = state.certs.find(c => c.id === docId); 
  } else if(source === 'tenancy') { 
    doc = prop?.tenancyDocs?.find(d => d.id === docId); 
  } else { 
    doc = prop?.docs?.find(d => d.id === docId); 
  }
  
  if(!doc || !doc.fileData) { 
    showToast('Document data not found', true); 
    return; 
  }
  
  try {
    const bytes = atob(doc.fileData);
    const byteArray = new Uint8Array(bytes.length);
    for(let i = 0; i < bytes.length; i++) byteArray[i] = bytes.charCodeAt(i);
    const blob = new Blob([byteArray], { type: doc.fileMime || 'application/pdf' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  } catch(e) { 
    alert('Could not open document'); 
  }
}

function deleteUnifiedDoc(propId, docId, source) {
  if(!confirm('Delete this document?')) return;
  if(source === 'cert') {
    state.certs = state.certs.filter(c => c.id !== docId);
    saveState('certs');
  } else if(source === 'tenancy') {
    const prop = getProp(propId);
    if(prop) prop.tenancyDocs = prop.tenancyDocs?.filter(d => d.id !== docId) || [];
    saveState('props');
  } else {
    const prop = getProp(propId);
    if(prop) prop.docs = prop.docs?.filter(d => d.id !== docId) || [];
    saveState('props');
  }
  renderUnifiedDocs();
  showToast('Document deleted');
}

function openAddApplianceModal(propId) {
  openModal(`<div class="modal-title">Add appliance</div>
    <div class="form-field"><label>Name</label><input type="text" id="app-name"></div>
    <div class="form-row"><div class="form-field"><label>Make</label><input type="text" id="app-make"></div><div class="form-field"><label>Model</label><input type="text" id="app-model"></div></div>
    <div class="form-field"><label>Serial number</label><input type="text" id="app-serial"></div>
    <div class="form-field"><label>Location</label><input type="text" id="app-location"></div>
    <div class="form-field"><label>Notes</label><input type="text" id="app-notes"></div>
    <button class="btn btn-primary" onclick="saveAppliance('${propId}')">Save</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>`);
}

function saveAppliance(propId) {
  state.appliances.push({ id: uid(), propId, name: document.getElementById('app-name').value, make: document.getElementById('app-make').value, model: document.getElementById('app-model').value, serial: document.getElementById('app-serial').value, location: document.getElementById('app-location').value, notes: document.getElementById('app-notes').value });
  saveState('appliances'); closeModal(); if(propId) renderPropDetailContent(propId);
}

function openEditOwnershipModal(propId) {
  const p = getProp(propId);
  const owners = state.owners.map(o=>{const entry=(p.owners||[]).find(x=>x.ownerId===o.id);return `<div class="form-row"><div class="form-field"><label>${o.name}</label><input type="number" id="own-${o.id}" value="${entry?entry.share:0}" min="0" max="100" step="0.1" oninput="updateOwnerTotal()"></div><div style="padding-top:18px">%</div></div>`;}).join('');
  openModal(`<div class="modal-title">Ownership</div>${owners}<div id="own-total-msg" style="margin:8px 0;padding:6px;border-radius:8px;background:var(--surface2)"></div><button class="btn btn-primary" onclick="saveOwnership('${propId}')">Save</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>`);
  updateOwnerTotal();
}

function updateOwnerTotal() {
  let total = 0;
  state.owners.forEach(o=>{total+=parseFloat(document.getElementById('own-'+o.id)?.value||0);});
  const msg = document.getElementById('own-total-msg');
  if(!msg) return;
  const ok = Math.abs(total-100)<0.1;
  msg.innerHTML = `Total: ${total.toFixed(1)}%${ok?' ✓':' — must equal 100%'}`;
  msg.style.background = ok ? 'var(--green-bg)' : 'var(--amber-bg)';
}

function saveOwnership(propId) {
  const p = getProp(propId);
  const owners = state.owners.map(o=>({ownerId:o.id,share:parseFloat(document.getElementById('own-'+o.id).value||0)})).filter(x=>x.share>0);
  const total = owners.reduce((s,o)=>s+o.share,0);
  if(owners.length && Math.abs(total-100)>1){alert('Total must be 100%');return;}
  p.owners = owners;
  p.ownershipShare = owners[0]?.share||100;
  saveState('props'); closeModal(); renderPropDetailContent(propId); renderAll();
}

function openEditInsuranceModal(propId) {
  const p = getProp(propId);
  openModal(`<div class="modal-title">Insurance</div>
    <div class="form-field"><label>Provider</label><input type="text" id="ins-provider" value="${p.insuranceProvider||p.insurance||''}"></div>
    <div class="form-field"><label>Policy number</label><input type="text" id="ins-policy" value="${p.insurancePolicyNo||''}"></div>
    <div class="form-row"><div class="form-field"><label>Premium (£/yr)</label><input type="number" id="ins-premium" value="${p.insurancePremium||''}"></div><div class="form-field"><label>Renewal</label><input type="date" id="ins-renewal" value="${p.insuranceRenewal||''}"></div></div>
    <button class="btn btn-primary" onclick="saveInsurance('${propId}')">Save</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>`);
}

function saveInsurance(propId) {
  const p = getProp(propId);
  p.insuranceProvider = document.getElementById('ins-provider').value;
  p.insurancePolicyNo = document.getElementById('ins-policy').value;
  p.insurancePremium = parseFloat(document.getElementById('ins-premium').value)||0;
  p.insuranceRenewal = document.getElementById('ins-renewal').value;
  saveState('props'); closeModal(); renderPropDetailContent(propId);
}

function toggleArchiveProp(id) {
  const p = getProp(id);
  p.archived = !p.archived;
  saveState('props'); renderPropDetailContent(id); renderAll();
}

function deleteCert(certId, propId) {
  if(confirm('Delete certificate?')) {
    state.certs = state.certs.filter(c=>c.id!==certId);
    saveState('certs'); renderPropDetailContent(propId); renderAll();
  }
}

function deleteAppliance(appId, propId) {
  if(confirm('Delete appliance?')) {
    state.appliances = state.appliances.filter(a=>a.id!==appId);
    saveState('appliances'); renderPropDetailContent(propId);
  }
}

function deleteTxn(tId, propId) {
  if(confirm('Delete transaction?')) {
    state.txns = state.txns.filter(t=>t.id!==tId);
    saveState('txns'); renderPropDetailContent(propId); renderAll();
  }
}

function openModal(html) { document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

loadState();
</script>
</body>
</html>
