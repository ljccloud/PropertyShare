<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --border2: #CEC9BE;
  --text: #1A1916;
  --text2: #6B6760;
  --text3: #A09D98;
  --green: #2D5A27;
  --green-bg: #EAF2E8;
  --red: #8B2020;
  --red-bg: #F5EAEA;
  --amber: #7A4A0A;
  --amber-bg: #FAF0E0;
  --blue: #1A3A5C;
  --blue-bg: #E8F0F8;
  --purple: #3D2B6B;
  --purple-bg: #EEEAF5;
  --teal: #1A4A40;
  --teal-bg: #E6F2F0;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --header-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Inter', sans-serif; color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* Header */
#header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
#header-title { font-size: 18px; font-weight: 600; color: var(--text); flex: 1; letter-spacing: -0.3px; }
.filter-select { font-size: 12px; font-weight: 500; padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface2); color: var(--text2); cursor: pointer; flex-shrink: 0; outline: none; }

/* Content */
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); padding-bottom: calc(var(--nav-h) + 16px); }

/* Navigation */
#nav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--text3); padding: 8px 4px; transition: color .15s; }
.nav-btn.active { color: var(--text); }
.nav-icon { font-size: 18px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; letter-spacing: .02em; }

/* Screens */
.screen { display: none; padding: 16px; }
.screen.active { display: block; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
.section-label { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin: 20px 0 12px; }

/* Metrics */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-value { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }

/* Badges */
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-grey { background: var(--surface2); color: var(--text2); }

/* Info Rows */
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.info-val { font-size: 14px; text-align: right; font-weight: 500; }

/* Property Items */
.prop-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color .15s; }
.prop-item:hover, .prop-item:active { border-color: var(--border2); }
.prop-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
.prop-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.prop-info { flex: 1; }
.prop-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.prop-addr { font-size: 13px; color: var(--text2); margin-top: 2px; }
.prop-status { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.status-let { background: var(--green-bg); color: var(--green); }
.status-vacant { background: var(--amber-bg); color: var(--amber); }
.prop-certs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

/* Certificate Status */
.cert-status { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; display: inline-block; }
.cert-valid { background: var(--green-bg); color: var(--green); }
.cert-warning { background: var(--amber-bg); color: var(--amber); }
.cert-expired { background: var(--red-bg); color: var(--red); }
.cert-missing { background: var(--surface2); color: var(--text3); }

/* Reference Grid */
.ref-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
.ref-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.ref-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.ref-value { font-size: 13px; font-weight: 500; }

/* Transaction Rows */
.txn-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.txn-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.txn-body { flex: 1; min-width: 0; }
.txn-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.txn-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.txn-income { color: var(--green); }
.txn-expense { color: var(--red); }

/* Forms */
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-family: inherit; font-size: 14px; -webkit-appearance: none; appearance: none; outline: none; }
.form-field input:focus, .form-field select:focus { border-color: var(--border2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Buttons */
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 4px; transition: opacity .1s; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--red-bg); color: var(--red); }
.btn-sm { padding: 8px 12px; font-size: 13px; width: auto; }
.icon-btn-sm { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: transform .1s; }
.icon-btn-sm:active { transform: scale(0.94); }

/* Bottom Sheet */
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); z-index: 1000; max-height: 85vh; overflow-y: auto; }
.bottom-sheet.open { transform: translateY(0); }
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 999; display: none; }
.sheet-overlay.open { display: block; }
.sheet-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto; }
.sheet-content { padding: 8px 20px 32px; }
.sheet-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.3px; }

/* Detail Tabs */
.detail-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 16px; scrollbar-width: none; }
.detail-tabs::-webkit-scrollbar { display: none; }
.dtab { font-size: 13px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s; }
.dtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.dtab-content { display: none; }
.dtab-content.active { display: block; }

/* Login Screen */
.login-screen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
.login-screen.visible { display: flex; }
.login-card { background: var(--surface); border-radius: 20px; padding: 32px 24px; text-align: center; max-width: 320px; width: 100%; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 16px; right: 16px; background: var(--text); color: white; padding: 12px 16px; border-radius: 30px; text-align: center; font-size: 14px; font-weight: 500; z-index: 1500; animation: slideUp 0.3s ease; pointer-events: none; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Utilities */
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-amber { color: var(--amber); }
.flex { display: flex; }
.justify-between { justify-content: space-between; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.text-center { text-align: center; }
.w-100 { width: 100%; }

@media (min-width: 600px) {
  #content, #nav { max-width: 680px; margin: 0 auto; }
  .metrics { grid-template-columns: repeat(4, 1fr); }
  .ref-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>

  if (!date) return null;

  if (!expiryDate) return 'missing';

  if (days < 0) return 'expired';
  if (days < 60) return 'warning';
  return 'valid';
}

  if (status === 'valid') return 'cert-valid';

  if (!expiryDate) return 'Not set';

  if (days < 60) return `${days} days left (${formatDate(expiryDate)})`;

function checkGoogleReady() {
  if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
    googleReady = true;
    const btn = document.getElementById('signin-btn');
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
  } else {
    setTimeout(checkGoogleReady, 200);
  }
}

function signIn() {
  const btn = document.getElementById('signin-btn');
  const statusDiv = document.getElementById('login-status');
  
  if (!googleReady) {
    if (statusDiv) statusDiv.textContent = 'Google services loading...';
    setTimeout(signIn, 500);
    return;
  }
  
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
  
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (response) => {
        if (response.error) {
          if (statusDiv) statusDiv.textContent = 'Error: ' + response.error;
          if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
          return;
        }
        gAccessToken = response.access_token;
        document.getElementById('login-screen').classList.remove('visible');
        showToast('Loading from Drive...');
        await initDrive();
        renderDashboard();
      }
    });
    client.requestAccessToken();
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in with Google'; }
  }
}

function signOut() {
  if (gAccessToken && google.accounts) google.accounts.oauth2.revoke(gAccessToken);
  gAccessToken = null;
  gDriveDataFileId = null;
  gDriveFolderIds = {};
  document.getElementById('login-screen').classList.add('visible');
  showToast('Signed out');
}

async function driveRequest(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(options.headers || {}) }
  });
  if (!res.ok) throw new Error(`Drive API ${res.status}`);
  return res.json();
}

async function findOrCreateFolder(name, parentId) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
  const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if (result.files && result.files.length > 0) return result.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return created.id;
}

async function initDrive() {
  try {
    const rootId = await findOrCreateFolder(DRIVE_FOLDER_NAME, 'root');
    gDriveFolderIds.root = rootId;
    const q = `name='${DATA_FILENAME}' and '${rootId}' in parents and trashed=false`;
    const result = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
    
    if (result.files && result.files.length > 0) {
      gDriveDataFileId = result.files[0].id;
      const data = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveDataFileId}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + gAccessToken }
      }).then(r => r.json());
      if (data.properties) state.properties = data.properties;
      if (data.transactions) state.transactions = data.transactions;
      if (data.maintenance) state.maintenance = data.maintenance;
      if (data.certificates) state.certificates = data.certificates;
      if (data.owners) state.owners = data.owners;
      if (data.rentHistory) state.rentHistory = data.rentHistory;
      showToast('Loaded from Drive');
    } else {
      showToast('New portfolio created');
      await saveToDrive();
    }
  } catch (e) {
    console.error('Drive init error:', e);
    showToast('Drive error - using local data', true);
  }
  renderDashboard();
}

async function saveToDrive() {
  if (!gAccessToken) return;
  const data = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance, certificates: state.certificates, owners: state.owners, rentHistory: state.rentHistory };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  try {
    if (gDriveDataFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveDataFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DATA_FILENAME, parents: [gDriveFolderIds.root || 'root'] })], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + gAccessToken },
        body: form
      });
      const created = await res.json();
      gDriveDataFileId = created.id;
    }
  } catch (e) { console.error('Drive save error:', e); }
}

function getPropertyCertStatus(propertyId, certType) {
  const cert = state.certificates.find(c => c.propertyId === propertyId && c.type === certType);
  if (!cert) return { status: 'missing', text: 'Missing', class: 'cert-missing' };
  const status = getCertStatus(cert.expiryDate);
  const text = status === 'valid' ? `Valid: ${formatDate(cert.expiryDate)}` : status === 'warning' ? `${daysUntil(cert.expiryDate)} days left` : `Expired ${formatDate(cert.expiryDate)}`;
  const cls = status === 'valid' ? 'cert-valid' : status === 'warning' ? 'cert-warning' : 'cert-expired';
  return { status, text, class: cls, expiry: cert.expiryDate };
}

function setPeriodToMonth() {
  const today = new Date();
  const start = new Date(today.getFullYear(), today.getMonth(), 1);
  const end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  const startInput = document.getElementById('new-period-start');
  const endInput = document.getElementById('new-period-end');
  if (startInput) startInput.value = start.toISOString().split('T')[0];
  if (endInput) endInput.value = end.toISOString().split('T')[0];
  const hint = document.getElementById('period-hint');
  if (hint) hint.innerHTML = '✓ Set to current month - covers 1st to last day';
}

function setPeriodToQuarter() {
  const today = new Date();
  const quarter = Math.floor(today.getMonth() / 3);
  const start = new Date(today.getFullYear(), quarter * 3, 1);
  const end = new Date(today.getFullYear(), (quarter + 1) * 3, 0);
  const startInput = document.getElementById('new-period-start');
  const endInput = document.getElementById('new-period-end');
  if (startInput) startInput.value = start.toISOString().split('T')[0];
  if (endInput) endInput.value = end.toISOString().split('T')[0];
  const hint = document.getElementById('period-hint');
  if (hint) hint.innerHTML = '✓ Set to current quarter (3 months)';
}

function setPeriodToYear() {
  const today = new Date();

  const end = new Date(today.getFullYear(), 11, 31);
  const startInput = document.getElementById('new-period-start');

function togglePeriodFields(category) {
  const periodSection = document.getElementById('period-section');
  if (!periodSection) return;
  
  const needsPeriod = [
    'rent', 'management_fees', 'insurance', 'financial', 
    'service_charges', 'ground_rent', 'utilities', 'council_tax',
    'professional_fees', 'repairs'
  ];
  
  if (needsPeriod.includes(category)) {
    periodSection.style.display = 'block';
    autoSetPeriodForCategory(category);
  } else {
    periodSection.style.display = 'none';
  }
}

function autoSetPeriodForCategory(category) {
  const startInput = document.getElementById('new-period-start');
  const endInput = document.getElementById('new-period-end');
  const dateInput = document.getElementById('new-date');
  const hint = document.getElementById('period-hint');
  
  if (!startInput || !endInput || !dateInput) return;
  if (startInput.value && endInput.value) return;
  
  const paymentDate = new Date(dateInput.value);
  const year = paymentDate.getFullYear();
  const month = paymentDate.getMonth();
  
  switch(category) {
    case 'rent':
    case 'management_fees':
      startInput.value = new Date(year, month, 1).toISOString().split('T')[0];
      endInput.value = new Date(year, month + 1, 0).toISOString().split('T')[0];
      if (hint) hint.innerHTML = '💡 Rental income/management fees - typically covers the calendar month';
      break;
    case 'insurance':
      startInput.value = paymentDate.toISOString().split('T')[0];
      const endDate = new Date(year + 1, month, paymentDate.getDate() - 1);
      endInput.value = endDate.toISOString().split('T')[0];
      if (hint) hint.innerHTML = '💡 Insurance - typically covers 12 months from start date';
      break;
    case 'financial':
      startInput.value = new Date(year, month, 1).toISOString().split('T')[0];
      endInput.value = new Date(year, month + 1, 0).toISOString().split('T')[0];
      if (hint) hint.innerHTML = '💡 Mortgage interest - covers the month of payment';
      break;
    case 'service_charges':
    case 'ground_rent':
      startInput.value = new Date(year, 0, 1).toISOString().split('T')[0];
      endInput.value = new Date(year, 11, 31).toISOString().split('T')[0];
      if (hint) hint.innerHTML = '💡 Service charges/ground rent - adjust dates if quarterly or annual';
      break;
    default:
      if (hint) hint.innerHTML = '💡 Select the period this expense relates to for accurate tax apportionment';
  }
}

  document.getElementById('screen-mtd').innerHTML = `

      <div class="flex gap-2"><select id="mtd-year-select" class="form-select" onchange="setMTDYear(this.value)">${taxYears.map(y => `<option value="${y}" ${mtdYear === y ? 'selected' : ''}>${y}/${y+1} Tax Year</option>`).join('')}</select></div>
    </div>
    <div class="card"><div class="card-title">Annual Summary</div><div id="mtd-summary">Loading...</div></div>

    <div class="card" style="background: var(--amber-bg);"><div class="card-title">Important</div><div class="text-secondary" style="font-size: 13px;">These exports are for reference. Use MTD-compatible software for HMRC filing.</div></div>
  `;
  updateMTDSummary();

function setMTDYear(year) { mtdYear = parseInt(year); updateMTDSummary(); }

function updateMTDSummary() {
  const yearStart = new Date(mtdYear, 3, 6);
  const yearEnd = new Date(mtdYear + 1, 3, 5);
  const yearTxns = state.transactions.filter(t => {
    const d = new Date(t.date);
    return d >= yearStart && d <= yearEnd;
  });
  const income = yearTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = yearTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const financeCosts = yearTxns.filter(t => t.type === 'expense' && t.category === 'financial').reduce((s, t) => s + t.amount, 0);
  
  document.getElementById('mtd-summary').innerHTML = `
    <div class="ref-grid"><div class="ref-item"><div class="ref-label">Gross Income</div><div class="ref-value text-green">${formatMoney(income)}</div></div>
    <div class="ref-item"><div class="ref-label">Total Expenses</div><div class="ref-value text-red">${formatMoney(expenses)}</div></div>
    <div class="ref-item"><div class="ref-label">Finance Costs</div><div class="ref-value">${formatMoney(financeCosts)}</div></div>
    <div class="ref-item"><div class="ref-label">Net Profit</div><div class="ref-value ${income - expenses >= 0 ? 'text-green' : 'text-red'}">${formatMoney(income - expenses)}</div></div></div>
    <button class="btn btn-secondary mt-2" onclick="exportMTDData()">Export MTD Data</button>
  `;
  
  const quarters = [
    { name: 'Q1 (6 Apr - 5 Jul)', start: new Date(mtdYear, 3, 6), end: new Date(mtdYear, 6, 5), due: '7 Aug' },
    { name: 'Q2 (6 Jul - 5 Oct)', start: new Date(mtdYear, 6, 6), end: new Date(mtdYear, 9, 5), due: '7 Nov' },
    { name: 'Q3 (6 Oct - 5 Jan)', start: new Date(mtdYear, 9, 6), end: new Date(mtdYear + 1, 0, 5), due: '7 Feb' },
    { name: 'Q4 (6 Jan - 5 Apr)', start: new Date(mtdYear + 1, 0, 6), end: new Date(mtdYear + 1, 3, 5), due: '7 May' }
  ];
  
  document.getElementById('mtd-quarters').innerHTML = quarters.map((q, i) => {
    const qTxns = state.transactions.filter(t => {
      const d = new Date(t.date);
      return d >= q.start && d <= q.end;
    });
    const qIncome = qTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const qExpenses = qTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    return `<div class="card"><div class="flex justify-between"><div class="card-title">${q.name}</div><span class="badge badge-blue">Due ${q.due}</span></div>
      <div class="ref-grid"><div class="ref-item"><div class="ref-label">Income</div><div class="ref-value text-green">${formatMoney(qIncome)}</div></div>
      <div class="ref-item"><div class="ref-label">Expenses</div><div class="ref-value text-red">${formatMoney(qExpenses)}</div></div>
      <div class="ref-item"><div class="ref-label">Net</div><div class="ref-value ${qIncome - qExpenses >= 0 ? 'text-green' : 'text-red'}">${formatMoney(qIncome - qExpenses)}</div></div>
      <div class="ref-item"><div class="ref-label">Transactions</div><div class="ref-value">${qTxns.length}</div></div></div>
      <button class="btn btn-secondary btn-sm mt-2" onclick="exportQuarterData(${i+1})">Export Q${i+1}</button>
    </div>`;
  }).join('');
}

function exportMTDData() {
  const data = { taxYear: `${mtdYear}/${mtdYear+1}`, generated: new Date().toISOString(), transactions: state.transactions };
  downloadJSON(data, `mtd-${mtdYear}-${mtdYear+1}.json`);
}

function exportQuarterData(quarter) { exportMTDData(); }

  `;

function uploadDocument(input) {
  const file = input.files[0];
  if (!file) return;
  const name = document.getElementById('doc-name').value || file.name;
  const category = document.getElementById('doc-cat').value;
  const reader = new FileReader();
  reader.onload = (e) => {
    state.documents.push({ id: generateId(), name, category, data: e.target.result, type: file.type, date: new Date().toISOString() });
    saveState();
    renderDocs();
    showToast('Document saved');
  };
  reader.readAsDataURL(file);
}

function deleteDocument(id) {
  state.documents = state.documents.filter(d => d.id !== id);
  saveState();
  renderDocs();
  showToast('Document deleted');
}

        ${p.agentEmail ? infoRow('Agent Email', `<a href="mailto:${escapeHtml(p.agentEmail)}" style="color: var(--blue);">${escapeHtml(p.agentEmail)}</a>`) : ''}
        ${infoRow('Gas Engineer', p.gasEngineer || '—')}
        ${p.gasEngineerPhone ? infoRow('Gas Engineer Phone', p.gasEngineerPhone) : ''}
        ${infoRow('Electrician', p.electrician || '—')}
        ${p.electricianPhone ? infoRow('Electrician Phone', p.electricianPhone) : ''}

        <div class="txn-row">
          <div class="txn-icon" style="background: ${t.type === 'income' ? 'var(--green-bg)' : 'var(--red-bg)'}">${t.type === 'income' ? '↓' : '↑'}</div>
          <div class="txn-body"><div class="txn-desc">${escapeHtml(t.description)}</div><div class="txn-meta">${formatDate(t.date)} · ${escapeHtml(t.category)}${t.periodStart ? ` · ${formatDate(t.periodStart)} to ${formatDate(t.periodEnd)}` : ''}</div></div>

        </div>
      `).join('')}
      ${transactions.length === 0 ? '<div class="card text-center">No transactions</div>' : ''}
      <button class="btn btn-secondary" style="margin-top: 12px" onclick="showAddTransactionForProperty('${id}'); closePropDetail();">+ Add Transaction</button>
    </div>
  `;
}

function switchTab(tabName, btn) {
  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.dtab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`dt-${tabName}`).classList.add('active');
}

function showSheet(title, contentHtml, onConfirm = null) {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  const sheetContent = document.getElementById('sheet-content');
  sheetContent.innerHTML = `<div class="sheet-title">${escapeHtml(title)}</div>${contentHtml}<div class="flex gap-2" style="margin-top: 20px;"><button class="btn btn-secondary" onclick="closeSheet()">Cancel</button>${onConfirm ? `<button class="btn btn-primary" id="sheet-confirm-btn">Confirm</button>` : ''}</div>`;
  sheet.classList.add('open');
  overlay.classList.add('open');
  if (onConfirm) document.getElementById('sheet-confirm-btn').onclick = onConfirm;
}

function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
}

function showQuickActions() {
  showSheet('Quick Actions', `
    <button class="btn btn-primary mb-2" onclick="showAddProperty(); closeSheet();">🏠 Add Property</button>
    <button class="btn btn-primary mb-2" onclick="showAddTransaction(); closeSheet();">💰 Add Transaction</button>
    <button class="btn btn-primary mb-2" onclick="showAddMaintenance(); closeSheet();">🔧 Log Maintenance</button>
    <button class="btn btn-primary mb-2" onclick="showAddCertificateForProperty(null); closeSheet();">📋 Add Certificate</button>
    <button class="btn btn-primary" onclick="exportData(); closeSheet();">📤 Export Data</button>
  `);
}

function showSettings() {
  showSheet('Settings', `
    <div class="card"><div class="card-title">Google Drive</div>
      ${!gAccessToken ? '<button class="btn btn-primary" onclick="signIn(); closeSheet();">🔐 Sign in to Drive</button>' : '<button class="btn btn-secondary" onclick="signOut(); closeSheet();">🚪 Sign out of Drive</button>'}
    </div>
    <div class="card"><div class="card-title">Data Management</div>
      <button class="btn btn-secondary mb-2" onclick="exportData()">📤 Export Data</button>
      <button class="btn btn-danger" onclick="confirmReset()">⚠️ Reset All Data</button>
    </div>
    <div class="card"><div class="card-title">About</div>
      <div class="text-secondary" style="font-size: 13px;">Version 2.0 - Complete Edition</div>
      <div class="text-secondary" style="font-size: 12px; margin-top: 4px;">Data stored locally and optionally in Google Drive</div>
    </div>
  `);
}

function showSearch() {
  const properties = state.properties.filter(p => !p.archived);
  showSheet('Search', `
    <div class="form-group"><input type="text" id="search-input" class="form-input" placeholder="Search properties..." oninput="performSearch(this.value)"></div>
    <div id="search-results"></div>
  `);
}

function performSearch(query) {
  if (!query.trim()) return;
  const results = state.properties.filter(p => p.name.toLowerCase().includes(query.toLowerCase()) || p.address.toLowerCase().includes(query.toLowerCase()));
  document.getElementById('search-results').innerHTML = results.map(p => `<div class="prop-item" onclick="showPropertyDetail('${p.id}'); closeSheet();"><div class="prop-dot" style="background: ${p.color}"></div><div><div class="prop-name">${escapeHtml(p.name)}</div><div class="prop-addr">${escapeHtml(p.address)}</div></div></div>`).join('') || '<div class="text-center" style="padding: 20px;">No results</div>';
}

function exportData() {
  const data = { properties: state.properties, transactions: state.transactions, maintenance: state.maintenance, certificates: state.certificates, owners: state.owners, rentHistory: state.rentHistory };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `portfolio-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Data exported');
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function confirmReset() {
  if (confirm('⚠️ WARNING: This will delete ALL your data. This cannot be undone. Are you sure?')) {
    localStorage.clear();
    location.reload();
  }
}
